  { cat: "Produktpolitik", q: "Nenne 5 Funktionen der Produktverpackung.", a: "Schutz (vor Witterung), Distribution (Stapel-/Transportfähigkeit), Identifizierung (Erkennungseffekt), Differenzierung (Unterscheidung von anderen Produkten) und Information (Nennung von Produktdaten) – daneben auch Selbstpräsentation, Verkaufsaufforderung, Image und Gebrauch." },
  { cat: "Produktpolitik", q: "Welche drei Servicevarianten gibt es beim Hardware-Service?", a: "Bring-in-Service: der Kunde bringt das defekte Gerät zur Servicestelle. Desk-to-desk-Service: das defekte Gerät wird direkt am Arbeitsplatz durch ein funktionsfähiges ausgetauscht. Hotline-Service: technische Beratung per Telefon oder E-Mail." },

  // Preispolitik
  { cat: "Preispolitik", q: "Was ist der Unterschied zwischen langfristiger und kurzfristiger Preisuntergrenze?", a: "Langfristige Preisuntergrenze = gesamte Stückkosten – der Preis muss langfristig alle Kosten decken, sonst entsteht Verlust. Kurzfristige Preisuntergrenze = variable Stückkosten – kurzfristig kann der Preis aus Wettbewerbsgründen darauf gesenkt werden, wobei dann die fixen Kosten nicht gedeckt werden (Verlust in Höhe der Fixkosten)." },
  { cat: "Preispolitik", q: "Was ist Total Cost of Ownership (TCO)?", a: "Ein Abrechnungsverfahren, das neben den Anschaffungskosten (Kauf, Lieferung, Installation) auch alle Kosten der späteren Nutzung erfasst (Energie, Wartung, Reparatur, Entsorgung) – hilft Kunden/Investoren, die tatsächlichen Gesamtkosten eines Investitionsguts abzuschätzen." },
  { cat: "Preispolitik", q: "Was ist der Unterschied zwischen Hochpreis- und Niedrigpreisstrategie?", a: "Hochpreisstrategie (Premiumpolitik): Preis wird im Vergleich zur Konkurrenz hoch angesetzt, z.B. für Qualitätsführerschaft oder Markenstrategie. Niedrigpreisstrategie (Promotionspolitik): Preis wird niedriger angesetzt, z.B. um Kostenführerschaft anzustreben, Konkurrenz zu verdrängen oder preisorientierte Kunden anzusprechen." },
  { cat: "Preispolitik", q: "Was unterscheidet Preisführer, Preisfolger und Preiskämpfer?", a: "Preisführer: hat den größten Marktanteil und verlangt den höchsten Preis. Preisfolger: passt seinen Preis laufend dem Preisführer an (meist etwas niedriger). Preiskämpfer: unterbietet Konkurrenten aktiv, um die Preisführerschaft zu erreichen (braucht dafür eine günstige Kostenstruktur)." },
  { cat: "Preispolitik", q: "Was ist der Unterschied zwischen Abschöpfungsstrategie (Skimming) und Marktdurchdringungsstrategie (Penetration)?", a: "Abschöpfungsstrategie: hoher Anfangspreis, der später gesenkt wird – eignet sich für innovative Produkte, um die Entwicklungskosten je Käufergruppe maximal abzuschöpfen. Marktdurchdringungsstrategie: niedriger Einführungspreis, der später angehoben wird – dient dem Markteintritt bzw. der Abschreckung von Konkurrenten (Markteintrittsbarriere)." },
  { cat: "Preispolitik", q: "Welche fünf Arten der Preisdifferenzierung gibt es?", a: "Räumlich (nach Absatzgebieten), zeitlich (nach Absatzzeiten), persönlich (nach Abnehmergruppen, z.B. Erwachsene/Kinder), verdeckt (nach Aufmachung) und mengenmäßig (nach Abnahmemenge) – jeweils dasselbe Produkt zu unterschiedlichen Preisen." },
  { cat: "Preispolitik", q: "Was ist der Unterschied zwischen Bruttosystem und Nettosystem bei der Preisstellung?", a: "Bruttosystem: der Verkäufer kalkuliert intern Rabattaufschläge ein und gewährt diese dann als Rabattabschläge – der Kunde empfindet das als besonderen Vorteil, der Verkäufer bleibt flexibel. Nettosystem: von vornherein werden Staffelpreise als Festpreise je Abnahmemenge angeboten – der Kunde vertraut auf gerechte, knapp kalkulierte Preise." },
  { cat: "Preispolitik", q: "Was ist der Unterschied zwischen Skonto und Bonus?", a: "Skonto: Nachlass für eine verkürzte Zahlungsfrist – bringt dem Kunden einen Preisvorteil und dem Verkäufer schnellere Liquidität. Bonus: eine Prämie für einen erreichten Mindestumsatz innerhalb eines Zeitraums." },

  // Kommunikationspolitik
  { cat: "Kommunikationspolitik", q: "Welche 5 Hauptbestandteile hat die Kommunikationspolitik?", a: "Werbung (Mediawerbung), Verkaufsförderung (Sales Promotion), Öffentlichkeitsarbeit (Public Relations), Direktwerbung und persönlicher Verkauf." },
  { cat: "Kommunikationspolitik", q: "Was besagt die AIDA-Formel bei der Werbeplanung?", a: "Attention (Aufmerksamkeit auf das Produkt lenken), Interest (Interesse wecken), Desire (Wunsch nach Besitz erzeugen) und Action (die Kaufhandlung auslösen) – die vier Stufen, die Werbung beim Kunden idealerweise durchläuft." },
  { cat: "Kommunikationspolitik", q: "Was besagt die KISS-Formel, und worauf achtet sie konkret?", a: "'Keep It Short and Simple' – der beste Weg, AIDA zu erreichen. Sie achtet auf Wahrheit (Vertrauensverlust vorbeugen), Klarheit (Verständlichkeit beim ersten Kontakt), Wirksamkeit (maximale Wirkung erzielen) und Wirtschaftlichkeit (kostengünstigste Umsetzung)." },
  { cat: "Kommunikationspolitik", q: "Nenne 3 Vorteile von Online-Werbung gegenüber Printmedien und 2 Vorteile umgekehrt.", a: "Online: schneller verfügbar, räumlich/zeitlich unabhängig (24h weltweit), nachträglich anpassbar, oft kostengünstiger. Print/Offline: erreicht auch nicht internetaffine Kunden, funktioniert ohne Internetzugriff und wird von manchen als übersichtlicher/besser lesbar empfunden." },
  { cat: "Kommunikationspolitik", q: "Wie berechnet man den Werbeerfolg in Prozent?", a: "Werbeerfolg (%) = Werbebedingter Umsatzzuwachs geteilt durch Werbekosten, mal 100 – setzt den durch Werbung erzielten Mehrumsatz ins Verhältnis zu den dafür aufgewendeten Kosten." },
  { cat: "Kommunikationspolitik", q: "Was ist der Unterschied zwischen Werbung und Verkaufsförderung (Sales Promotion)?", a: "Werbung soll den Kunden zum Point of Sale (PoS) locken und zum Kauf allgemein anregen. Verkaufsförderung gibt dem Kunden dort durch besondere, kurzfristige und außergewöhnliche Anreize (z.B. Preisnachlass, Coupons, Proben) den letzten konkreten Anstoß zur Kaufhandlung." },
  { cat: "Kommunikationspolitik", q: "Was ist der Unterschied zwischen Werbung und Öffentlichkeitsarbeit (Public Relations)?", a: "Werbung richtet sich konkret an bereits vorhandene oder mögliche Kunden und bewirbt Produkte. Öffentlichkeitsarbeit richtet sich dagegen an die gesamte Öffentlichkeit (auch Mitarbeiter) und bezieht sich ausschließlich auf das Unternehmen, nicht auf einzelne Produkte – Ziel ist u.a. der Aufbau einer Vertrauensbasis (Good Will)." },
  { cat: "Kommunikationspolitik", q: "Was ist Direktwerbung, und was ist ihr zentraler Vorteil?", a: "Die zielgenaue, persönliche Ansprache eines einzelnen Zielkunden (z.B. per Brief oder E-Mail/Direct Mail). Vorteil: geringere Streuverluste (Personen, die die Werbung erreicht, aber nicht zur Zielgruppe gehören) und dadurch geringere Werbekosten im Vergleich zu klassischer Media-Werbung." },

  // Distributionspolitik & Recht
  { cat: "Distribution & Recht", q: "Was ist der Unterschied zwischen physischer und akquisitorischer Distribution?", a: "Physische Distribution (Logistik): Lagersysteme und Transportmittel. Akquisitorische Distribution (Verkauf): Absatzwege sowie Absatzmittler und Absatzhelfer – also alle Entscheidungen vom Hersteller bis zum Verwender." },
  { cat: "Distribution & Recht", q: "Was ist der Unterschied zwischen direktem und indirektem Absatz?", a: "Direkter Absatz: vom Hersteller unmittelbar an den Verwender, z.B. E-Commerce (B2B/B2C). Indirekter Absatz: über Zwischenstufen durch selbständige Absatzmittler, z.B. den Einzelhandel." },
  { cat: "Distribution & Recht", q: "Was regelt das Gesetz gegen unlauteren Wettbewerb (UWG)?", a: "Es soll fairen Wettbewerb zwischen Unternehmen sicherstellen und Kunden vor irreführenden Angaben schützen. Verboten sind u.a. Ausnutzung geschäftlicher Unerfahrenheit, unzulässige Werbemittel (Lockvogelangebote, Schneeballsystem), Anschwärzen von Konkurrenten und irreführende Werbung (z.B. falsche Angaben zu Preis, Ware oder Unternehmen)." },
  { cat: "Distribution & Recht", q: "Wie lange sind Marke, Geschmacksmuster, Gebrauchsmuster und Patent jeweils (mindestens) geschützt?", a: "Marke: 10 Jahre, gegen Gebühr beliebig oft um 10 Jahre verlängerbar. Geschmacksmuster: 5 Jahre, verlängerbar bis max. 20 Jahre. Gebrauchsmuster ('kleines Patent'): 3 Jahre, verlängerbar bis max. 10 Jahre. Patent: 20 Jahre, NICHT verlängerbar." },
  { cat: "Distribution & Recht", q: "Welches Widerrufsrecht hat ein Verbraucher bei Kredit-, Haustür- und Fernabsatzgeschäften?", a: "In allen drei Fällen hat der Verbraucher innerhalb von 2 Wochen das Recht, ohne Begründung zu widerrufen und die Ware auf Kosten und Gefahr des Verkäufers zurückzuschicken. Bei irreführender/unwahrer Werbung besteht sogar ein Rücktrittsrecht innerhalb von 6 Monaten." },
  { cat: "Distribution & Recht", q: "Was ist der Unterschied zwischen einem Konzern und einer Fusion?", a: "Beim Konzern bleibt die rechtliche Selbständigkeit (Firmenname) jedes Unternehmens erhalten, obwohl ein Unternehmen die Mehrheit übernimmt (z.B. VW kauft Porsche – beide Marken bleiben). Bei einer Fusion geht die rechtliche Selbständigkeit mindestens eines Unternehmens verloren – die Unternehmen verschmelzen zu einem (z.B. EDEKA kauft Tengelmann, die Marke verschwindet)." },
  { cat: "Distribution & Recht", q: "Was ist der Unterschied zwischen einer Kooperation und einem Unternehmenszusammenschluss?", a: "Bei einer Kooperation (z.B. Joint Venture, Arbeitsgemeinschaft, Kartell) bleibt die wirtschaftliche Selbständigkeit im Wesentlichen erhalten, mit gewissen vertraglichen Einschränkungen. Bei einem Unternehmenszusammenschluss (Konzern/Fusion) verliert das übernommene Unternehmen dagegen seine wirtschaftliche Selbständigkeit (Entscheidungsfreiheit) vollständig." },
  { cat: "Distribution & Recht", q: "Was sind die Hauptaufgaben des Bundeskartellamts?", a: "Fusionskontrolle (prüft, ob durch eine Fusion eine zu starke Marktkonzentration entsteht) und Missbrauchsaufsicht (prüft, ob zwischen Unternehmen unerlaubtes abgestimmtes Verhalten vorliegt). Bei Fehlverhalten kann es Verhalten untersagen, Verträge für unwirksam erklären oder Geldstrafen verhängen – überstimmt werden kann es nur durch den Bundeswirtschaftsminister (Ministerklausel) oder das Europäische Kartellamt." },
];


const DECK_HEX_EXPLANATION = [
  { cat: "Grundlagen", q: "Was ist das Hexadezimalsystem, und warum wird es in der IT häufig verwendet?", a: "Ein Zahlensystem zur Basis 16 mit den Ziffern 0-9 und A-F (für die Werte 10-15). Es wird oft genutzt, weil sich Binärzahlen damit sehr kompakt darstellen lassen (4 Bit = genau 1 Hexziffer) – z.B. bei MAC-Adressen, IPv6-Adressen, Farbcodes oder Speicheradressen." },
  { cat: "Grundlagen", q: "Welche Dezimalwerte haben die Hexadezimalziffern A bis F?", a: "A=10, B=11, C=12, D=13, E=14, F=15. Die Ziffern 0-9 haben wie gewohnt ihren normalen Wert." },
  { cat: "Grundlagen", q: "Wie ist der Stellenwert (die Positionswertigkeit) einer Hexadezimalzahl aufgebaut?", a: "Jede Stelle steht für eine Potenz von 16, von rechts nach links steigend: 16⁰=1, 16¹=16, 16²=256, 16³=4096, … – genau wie im Dezimalsystem die Stellen für Zehnerpotenzen stehen." },
  { cat: "Grundlagen", q: "Wie rechnet man eine Hexadezimalzahl in eine Dezimalzahl um?", a: "Jede Ziffer mit ihrem Stellenwert (16^Position) multiplizieren und die Ergebnisse addieren. Beispiel: 2F = 2×16¹ + 15×16⁰ = 32 + 15 = 47." },
  { cat: "Grundlagen", q: "Wie rechnet man eine Dezimalzahl in eine Hexadezimalzahl um?", a: "Fortgesetzte Division durch 16: Die Zahl durch 16 teilen, den Rest notieren, den Quotienten erneut durch 16 teilen usw., bis 0 erreicht ist. Die Reste von unten nach oben gelesen ergeben die Hex-Ziffern. Beispiel: 200 : 16 = 12 Rest 8; 12 : 16 = 0 Rest 12 (C) → von unten gelesen: C8." },
  { cat: "Grundlagen", q: "Welchen Zusammenhang gibt es zwischen Hexadezimal- und Binärzahlen?", a: "Jede Hexadezimalziffer entspricht genau 4 Bit (ein 'Nibble'), da 16 = 2⁴. Eine Binärzahl lässt sich deshalb von rechts in 4er-Gruppen aufteilen, wobei jede Gruppe direkt einer Hexziffer entspricht (z.B. 1010 = A)." },
  { cat: "Grundlagen", q: "Welche Schreibweisen kennzeichnen Hexadezimalzahlen üblicherweise?", a: "Häufig das Präfix 0x (z.B. 0x2F, vor allem in Programmiersprachen), ein nachgestelltes h (z.B. 2Fh), oder – wie in der Netzwerktechnik bei MAC-/IPv6-Adressen – gar kein Präfix, da der Kontext eindeutig ist." },
  { cat: "Grundlagen", q: "Nenne 3 typische Einsatzbereiche von Hexadezimalzahlen in der IT.", a: "MAC-Adressen (12 Hexziffern), IPv6-Adressen (Hexblöcke), Farbcodes in HTML/CSS (#RRGGBB), sowie Speicheradressen und Fehler-/Statuscodes." },
];

function generateHexPracticeCards(n) {
  const cards = [];
  for (let i = 0; i < n; i++) {
    const digits = Math.random() < 0.5 ? 2 : 3;
    const min = Math.pow(16, digits - 1);
    const max = Math.pow(16, digits) - 1;
    const val = Math.floor(Math.random() * (max - min + 1)) + min;
    const hex = val.toString(16).toUpperCase();
    const digitArr = hex.split("");
    const terms = digitArr.map((d, idx) => {
      const power = digitArr.length - 1 - idx;
      const digitVal = parseInt(d, 16);
      return `${d}(${digitVal})×16^${power}`;
    });
    cards.push({
      cat: "Übung: Hex → Dezimal",
      q: `Wandle die Hexadezimalzahl ${hex} in eine Dezimalzahl um.`,
      a: `${hex} = ${terms.join(" + ")} = ${val}`,
    });
  }
  return cards;
}

let DECK_HEX = [...DECK_HEX_EXPLANATION, ...generateHexPracticeCards(20)];

function regenerateHexPracticeCards() {
  const fresh = generateHexPracticeCards(20);
  DECK_HEX.splice(DECK_HEX_EXPLANATION.length, DECK_HEX.length - DECK_HEX_EXPLANATION.length, ...fresh);
}

const TABS = [
  { id: "nwt", label: "Netzwerktechnik", deck: DECK_NWT },
  { id: "prog", label: "Programmieren", deck: DECK_PROG },
  { id: "linux", label: "Linux", deck: DECK_LINUX },
  { id: "pm", label: "Projektmanagement", deck: DECK_PM },
  { id: "marketing", label: "Marketing", deck: DECK_MARKETING },
  { id: "hex", label: "Hexadezimal", deck: DECK_HEX },
];
TABS.forEach(t => { t.categories = [...new Set(t.deck.map(c => c.cat))]; });

// per-tab state
const state = {};
TABS.forEach(t => {
  state[t.id] = {
    activeCats: new Set(t.categories),
    order: t.deck.map((_, i) => i),
    pos: 0,
    flipped: false,
    known: {},
    quiz: null,
  };
});

let activeTab = TABS[0].id;
let showMenu = false;
let touchStartX = null;
let mode = "cards";

function currentTab() { return TABS.find(t => t.id === activeTab); }
function currentState() { return state[activeTab]; }

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuizQuestions(tab, activeCats) {
  if (tab.id === "hex") regenerateHexPracticeCards();
  const filtered = tab.deck.filter(c => activeCats.has(c.cat));
  const pool = filtered.length >= 4 ? filtered : tab.deck;
  const questions = filtered.map(card => {
    if (tab.id === "hex" && card.cat === "Übung: Hex → Dezimal") {
      const hexMatch = card.q.match(/Hexadezimalzahl (\w+) in/);
      const valMatch = card.a.match(/=\s*(\d+)\s*$/);
      const correctVal = valMatch ? parseInt(valMatch[1], 10) : 0;
      const wrongVals = new Set();
      let attempts = 0;
      while (wrongVals.size < 3 && attempts < 50) {
        attempts++;
        const offset = Math.floor(Math.random() * 40) + 1;
        const sign = Math.random() < 0.5 ? -1 : 1;
        const candidate = correctVal + sign * offset;
        if (candidate >= 0 && candidate !== correctVal) wrongVals.add(candidate);
      }
      const optionVals = shuffleArray([correctVal, ...wrongVals]);
      return { cat: card.cat, q: card.q, options: optionVals.map(String), correctIndex: optionVals.indexOf(correctVal) };
    }
    const correct = card.a;
    const candidates = [...new Set(pool.map(c => c.a).filter(a => a !== correct))];
    const wrongs = shuffleArray(candidates).slice(0, 3);
    const options = shuffleArray([correct, ...wrongs]);
    return { cat: card.cat, q: card.q, options, correctIndex: options.indexOf(correct) };
  });
  return shuffleArray(questions);
}

function buildQuiz(tabId) {
  const tab = TABS.find(t => t.id === tabId);
  const st = state[tabId];
  const questions = buildQuizQuestions(tab, st.activeCats);
  st.quiz = { questions, pos: 0, selected: null, answered: false, score: 0, skipped: 0, wrongList: [], skippedList: [], finished: questions.length === 0 };
}

function getCategoryStats(quiz) {
  const catTotals = {};
  quiz.questions.forEach(q => { catTotals[q.cat] = (catTotals[q.cat] || 0) + 1; });
  const wrongByCategory = {};
  quiz.wrongList.forEach(w => { wrongByCategory[w.cat] = (wrongByCategory[w.cat] || 0) + 1; });
  const skippedByCategory = {};
  (quiz.skippedList || []).forEach(s => { skippedByCategory[s.cat] = (skippedByCategory[s.cat] || 0) + 1; });
  const stats = Object.keys(catTotals).map(cat => {
    const total = catTotals[cat];
    const wrong = wrongByCategory[cat] || 0;
    const skippedC = skippedByCategory[cat] || 0;
    const correct = total - wrong - skippedC;
    return { cat, total, correct, wrong, skipped: skippedC };
  });
  stats.sort((a, b) => a.correct / a.total - b.correct / b.total);
  return stats;
}

function filteredIndices(tab, st) {
  return tab.deck.map((c, i) => ({ ...c, i })).filter(c => st.activeCats.has(c.cat)).map(c => c.i);
}

function renderTabs() {
  const row = document.getElementById("tabRow");
  row.innerHTML = "";
  TABS.forEach(t => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (t.id === activeTab ? " active" : "");
    btn.textContent = t.label;
    btn.onclick = () => {
      activeTab = t.id;
      if (mode === "quiz" && !state[t.id].quiz) buildQuiz(t.id);
      renderAll();
    };
    row.appendChild(btn);
  });
}

function renderCatPanel() {
  const panel = document.getElementById("catPanel");
  panel.className = "cat-panel" + (showMenu ? " open" : "");
  panel.innerHTML = "";
  const tab = currentTab();
  const st = currentState();
  tab.categories.forEach(cat => {
    const active = st.activeCats.has(cat);
    const count = tab.deck.filter(c => c.cat === cat).length;
    const chip = document.createElement("button");
    chip.className = "chip" + (active ? " active" : "");
    chip.textContent = `${cat} (${count})`;
    chip.onclick = () => {
      if (st.activeCats.has(cat)) st.activeCats.delete(cat);
      else st.activeCats.add(cat);
      if (st.activeCats.size === 0) st.activeCats.add(cat);
      st.order = filteredIndices(tab, st);
      st.pos = 0;
      st.flipped = false;
      if (mode === "quiz") buildQuiz(activeTab);
      renderAll();
    };
    panel.appendChild(chip);
  });
}

function renderCard() {
  const tab = currentTab();
  const st = currentState();
  const total = st.order.length;
  const emptyEl = document.getElementById("emptyState");
  const cardArea = document.getElementById("cardArea");

  if (total === 0) {
    emptyEl.style.display = "block";
    cardArea.style.display = "none";
    return;
  }
  emptyEl.style.display = "none";
  cardArea.style.display = "block";

  const cardIdx = st.order[st.pos];
  const card = tab.deck[cardIdx];

  document.getElementById("progressFill").style.width = `${((st.pos + 1) / total) * 100}%`;
  const knownCount = st.order.filter(i => st.known[i] === "known").length;
  const unknownCount = st.order.filter(i => st.known[i] === "unknown").length;
  let label = `Karte ${st.pos + 1} / ${total}`;
  if (knownCount > 0 || unknownCount > 0) {
    label += `  ·  ✓ ${knownCount} · ✗ ${unknownCount}`;
  }
  document.getElementById("progressLabel").textContent = label;

  document.getElementById("catLabelFront").textContent = card.cat;
  document.getElementById("qText").textContent = card.q;
  document.getElementById("aText").textContent = card.a;

  const flipInner = document.getElementById("flipInner");
  flipInner.classList.toggle("flipped", st.flipped);

  document.getElementById("btnPrev").disabled = st.pos === 0;
  document.getElementById("btnNext").disabled = st.pos === total - 1;
}

function renderAll() {
  renderTabs();
  renderCatPanel();
  document.getElementById("modeCardsBtn").classList.toggle("active-cards", mode === "cards");
  document.getElementById("modeQuizBtn").classList.toggle("active-quiz", mode === "quiz");
  if (mode === "cards") {
    document.getElementById("cardArea").style.display = "block";
    document.getElementById("quizArea").style.display = "none";
    renderCard();
  } else {
    document.getElementById("cardArea").style.display = "none";
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("quizArea").style.display = "block";
    renderQuiz();
  }
}

function renderQuiz() {
  const st = currentState();
  const quiz = st.quiz;
  const progressLabel = document.getElementById("quizProgressLabel");
  const progressFill = document.getElementById("quizProgressFill");
  const qCard = document.getElementById("quizQuestionCard");
  const optionsCol = document.getElementById("quizOptions");
  const nextBtn = document.getElementById("quizNextBtn");
  const resultBox = document.getElementById("quizResultBox");

  if (!quiz || quiz.questions.length === 0) {
    qCard.style.display = "none";
    optionsCol.innerHTML = "";
    nextBtn.style.display = "none";
    document.getElementById("quizSkipBtn").style.display = "none";
    resultBox.style.display = "none";
    progressLabel.textContent = "";
    progressFill.style.width = "0%";
    document.getElementById("emptyState").style.display = "block";
    document.getElementById("emptyState").textContent = "Keine Fragen in der Auswahl.";
    return;
  }
  document.getElementById("emptyState").style.display = "none";

  if (quiz.finished) {
    qCard.style.display = "none";
    optionsCol.innerHTML = "";
    nextBtn.style.display = "none";
    document.getElementById("quizSkipBtn").style.display = "none";
    progressLabel.textContent = "";
    progressFill.style.width = "100%";
    resultBox.style.display = "flex";
    document.getElementById("quizResultScore").textContent = `${quiz.score} / ${quiz.questions.length} richtig`;
    const skippedEl = document.getElementById("quizResultSkipped");
    if (quiz.skipped > 0) {
      skippedEl.style.display = "block";
      skippedEl.textContent = `${quiz.skipped} übersprungen`;
    } else {
      skippedEl.style.display = "none";
    }
    document.getElementById("quizResultPct").textContent = `${Math.round((quiz.score / quiz.questions.length) * 100)}%`;

    const summaryBox = document.getElementById("quizSummaryBox");
    summaryBox.innerHTML = "";
    const catStats = getCategoryStats(quiz);
    if (catStats.length >= 2) {
      const title = document.createElement("div");
      title.className = "wrong-list-title";
      title.textContent = "Zusammenfassung nach Thema:";
      summaryBox.appendChild(title);
      catStats.forEach(s => {
        const ratio = s.correct / s.total;
        const row = document.createElement("div");
        row.className = "summary-row";
        row.innerHTML = `<div class="summary-cat-name"></div><div class="summary-bar-track"><div class="summary-bar-fill"></div></div><div class="summary-cat-count"></div>`;
        row.children[0].textContent = s.cat;
        const fill = row.querySelector(".summary-bar-fill");
        fill.style.width = `${ratio * 100}%`;
        fill.style.background = ratio < 0.5 ? "#E06666" : ratio < 0.8 ? "#F2A65A" : "#4FD1C5";
        row.children[2].textContent = `${s.correct}/${s.total}`;
        summaryBox.appendChild(row);
      });
      const weakest = catStats[0];
      if (weakest.correct / weakest.total < 1) {
        const focus = document.createElement("div");
        focus.className = "summary-focus";
        focus.textContent = "Fokussiere dich als nächstes auf: " + weakest.cat;
        summaryBox.appendChild(focus);
      }
    }

    const wrongListEl = document.getElementById("quizWrongList");
    wrongListEl.innerHTML = "";
    if (quiz.wrongList.length > 0) {
      const title = document.createElement("div");
      title.className = "wrong-list-title";
      title.textContent = "Zum Nacharbeiten:";
      wrongListEl.appendChild(title);
      quiz.wrongList.forEach(w => {
        const item = document.createElement("div");
        item.className = "wrong-item";
        item.innerHTML = `<div class="wrong-q"></div><div class="wrong-your"></div><div class="wrong-correct"></div>`;
        item.children[0].textContent = w.q;
        item.children[1].textContent = "Deine Antwort: " + w.yourAnswer;
        item.children[2].textContent = "Richtig: " + w.correct;
        wrongListEl.appendChild(item);
      });
    }
    return;
  }

  resultBox.style.display = "none";
  qCard.style.display = "flex";
  const q = quiz.questions[quiz.pos];
  progressFill.style.width = `${((quiz.pos + 1) / quiz.questions.length) * 100}%`;
  progressLabel.textContent = `Frage ${quiz.pos + 1} / ${quiz.questions.length}   ·   Punkte: ${quiz.score}`;
  document.getElementById("quizCatLabel").textContent = q.cat;
  document.getElementById("quizQText").textContent = q.q;

  optionsCol.innerHTML = "";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    let variant = "";
    if (quiz.answered) {
      if (i === q.correctIndex) variant = " correct";
      else if (i === quiz.selected) variant = " wrong";
      else variant = " dim";
    }
    btn.className = "option-btn" + variant;
    btn.textContent = opt;
    btn.disabled = quiz.answered;
    btn.onclick = () => selectAnswer(i);
    optionsCol.appendChild(btn);
  });

  nextBtn.style.display = quiz.answered ? "block" : "none";
  nextBtn.textContent = quiz.pos + 1 >= quiz.questions.length ? "Ergebnis anzeigen" : "Weiter";
  document.getElementById("quizSkipBtn").style.display = quiz.answered ? "none" : "block";
}

function selectAnswer(optionIndex) {
  const st = currentState();
  const quiz = st.quiz;
  if (!quiz || quiz.answered) return;
  const q = quiz.questions[quiz.pos];
  const isCorrect = optionIndex === q.correctIndex;
  quiz.selected = optionIndex;
  quiz.answered = true;
  if (isCorrect) {
    quiz.score++;
  } else {
    quiz.wrongList.push({ cat: q.cat, q: q.q, yourAnswer: q.options[optionIndex], correct: q.options[q.correctIndex] });
  }
  renderQuiz();
}

function nextQuestion() {
  const st = currentState();
  const quiz = st.quiz;
  if (!quiz) return;
  quiz.pos++;
  if (quiz.pos >= quiz.questions.length) {
    quiz.finished = true;
  } else {
    quiz.selected = null;
    quiz.answered = false;
  }
  renderQuiz();
}

function skipQuestion() {
  const st = currentState();
  const quiz = st.quiz;
  if (!quiz) return;
  const q = quiz.questions[quiz.pos];
  quiz.skipped = (quiz.skipped || 0) + 1;
  quiz.skippedList = quiz.skippedList || [];
  quiz.skippedList.push({ cat: q.cat, q: q.q });
  quiz.pos++;
  if (quiz.pos >= quiz.questions.length) {
    quiz.finished = true;
  } else {
    quiz.selected = null;
    quiz.answered = false;
  }
  renderQuiz();
}

document.getElementById("quizNextBtn").onclick = nextQuestion;
document.getElementById("quizSkipBtn").onclick = skipQuestion;
document.getElementById("quizRestartBtn").onclick = () => {
  buildQuiz(activeTab);
  renderQuiz();
};
document.getElementById("modeCardsBtn").onclick = () => {
  mode = "cards";
  renderAll();
};
document.getElementById("modeQuizBtn").onclick = () => {
  mode = "quiz";
  if (!state[activeTab].quiz) buildQuiz(activeTab);
  renderAll();
};

function next() {
  const st = currentState();
  if (st.pos < st.order.length - 1) { st.pos++; st.flipped = false; renderCard(); }
}
function prev() {
  const st = currentState();
  if (st.pos > 0) { st.pos--; st.flipped = false; renderCard(); }
}
function shuffle() {
  const st = currentState();
  const isHex = activeTab === "hex";
  if (isHex) { regenerateHexPracticeCards(); st.known = {}; }
  const arr = st.order.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  st.order = arr;
  st.pos = 0;
  st.flipped = false;
  renderCard();
}
function mark(kind) {
  const st = currentState();
  const cardIdx = st.order[st.pos];
  st.known[cardIdx] = kind;
  renderCard();
  setTimeout(next, 150);
}

document.getElementById("menuBtn").onclick = () => {
  showMenu = !showMenu;
  document.getElementById("menuBtn").textContent = "Themen " + (showMenu ? "▲" : "▼");
  renderCatPanel();
};
document.getElementById("flipCard").onclick = () => {
  const st = currentState();
  st.flipped = !st.flipped;
  renderCard();
};
document.getElementById("btnPrev").onclick = prev;
document.getElementById("btnNext").onclick = next;
document.getElementById("btnShuffle").onclick = shuffle;
document.getElementById("btnReset").onclick = () => {
  const st = currentState();
  if (activeTab === "hex") regenerateHexPracticeCards();
  st.pos = 0;
  st.flipped = false;
  st.known = {};
  renderCard();
};
document.getElementById("btnUnknown").onclick = () => mark("unknown");
document.getElementById("btnKnown").onclick = () => mark("known");

const stage = document.querySelector(".stage");
stage.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
stage.addEventListener("touchend", e => {
  if (touchStartX == null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -50) next();
  if (dx > 50) prev();
  touchStartX = null;
});

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  if (e.key === "ArrowLeft") prev();
  if (e.key === " ") { e.preventDefault(); const st = currentState(); st.flipped = !st.flipped; renderCard(); }
});

renderAll();
</script>
</body>
</html>
