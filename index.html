<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karteikarten · Abschlussprüfung</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0F1720;
    color: #E8ECEF;
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    padding: 20px 16px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .page { width: 100%; max-width: 640px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .title { font-family: ui-monospace, 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; letter-spacing: .3px; }
  .subtitle { font-size: 12px; color: #7C8B99; margin-top: 1px; }
  .menu-btn {
    background: #151F29; border: 1px solid #26313C; color: #B7C2CC;
    border-radius: 8px; padding: 8px 12px; font-size: 12.5px; cursor: pointer; font-family: inherit;
  }
  .tab-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
    flex: 1; min-width: 100px; border: 1px solid #26313C; border-radius: 10px; padding: 10px 0;
    font-size: 13px; cursor: pointer; font-family: inherit; background: #151F29; color: #B7C2CC; transition: all .15s ease;
  }
  .tab-btn.active { background: #4FD1C5; color: #0F1720; border-color: #4FD1C5; font-weight: 700; }
  .cat-panel { display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; padding: 12px; background: #131C25; border: 1px solid #1E2933; border-radius: 12px; }
  .cat-panel.open { display: flex; }
  .chip { border: 1px solid #26313C; background: #151F29; color: #7C8B99; border-radius: 20px; padding: 6px 12px; font-size: 12.5px; cursor: pointer; font-family: inherit; transition: all .15s ease; }
  .chip.active { background: #4FD1C520; border-color: #4FD1C5; color: #4FD1C5; }
  .progress-row { margin-bottom: 18px; }
  .progress-track { height: 4px; background: #1C2733; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#4FD1C5,#3AB8AC); transition: width .3s ease; }
  .progress-label { margin-top: 8px; font-size: 12.5px; color: #7C8B99; font-family: ui-monospace, monospace; }
  .stage { display: flex; justify-content: center; }
  .flip-card { width: 100%; height: 320px; cursor: pointer; perspective: 1600px; }
  .flip-inner { position: relative; width: 100%; height: 100%; transition: transform .5s cubic-bezier(.4,.2,.2,1); transform-style: preserve-3d; }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .face { position: absolute; inset: 0; border-radius: 18px; padding: 28px 26px; display: flex; flex-direction: column; justify-content: space-between; backface-visibility: hidden; overflow-y: auto; }
  .face-front { background: #151F29; border: 1px solid #26313C; }
  .face-back { background: linear-gradient(160deg,#1B3A38,#152229); border: 1px solid #2E5854; transform: rotateY(180deg); }
  .cat-label { font-family: ui-monospace, monospace; font-size: 11.5px; letter-spacing: 1px; text-transform: uppercase; color: #F2A65A; font-weight: 600; }
  .cat-label-dark { font-family: ui-monospace, monospace; font-size: 11.5px; letter-spacing: 1px; text-transform: uppercase; color: #4FD1C5; font-weight: 600; }
  .q-text { font-size: 21px; line-height: 1.45; font-weight: 500; color: #EDF1F3; }
  .a-text { font-size: 17px; line-height: 1.5; font-weight: 400; color: #DCEAE8; }
  .hint { font-size: 11.5px; color: #5C6A75; font-family: ui-monospace, monospace; }
  .hint-dark { font-size: 11.5px; color: #5C8A85; font-family: ui-monospace, monospace; }
  .mark-row { display: flex; gap: 10px; margin-top: 16px; }
  .mark-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: #151F29; border: 1px solid; color: #DCE3E8; border-radius: 10px; padding: 11px 0; font-size: 13.5px; cursor: pointer; font-family: inherit; }
  .controls { display: flex; gap: 10px; margin-top: 18px; justify-content: center; }
  .nav-btn { background: #151F29; border: 1px solid #26313C; color: #E8ECEF; border-radius: 10px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; transition: all .15s ease; }
  .nav-btn:hover:not(:disabled) { background: #1C2733; }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .empty { color: #7C8B99; margin-top: 60px; text-align: center; }
  svg.icon { width: 16px; height: 16px; }
  .mode-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .mode-btn { flex: 1; border: 1px solid #26313C; border-radius: 10px; padding: 9px 0; font-size: 13px; cursor: pointer; font-family: inherit; background: #151F29; color: #B7C2CC; transition: all .15s ease; }
  .mode-btn.active-cards { background: #4FD1C5; color: #0F1720; border-color: #4FD1C5; font-weight: 700; }
  .mode-btn.active-quiz { background: #F2A65A; color: #0F1720; border-color: #F2A65A; font-weight: 700; }
  .quiz-card { width: 100%; background: #151F29; border: 1px solid #26313C; border-radius: 18px; padding: 24px 24px 20px; margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px; }
  .options-col { width: 100%; display: flex; flex-direction: column; gap: 10px; }
  .option-btn { text-align: left; padding: 14px 16px; border-radius: 12px; font-size: 14.5px; line-height: 1.45; cursor: pointer; font-family: inherit; color: #E8ECEF; background: #151F29; border: 1px solid #26313C; transition: all .15s ease; }
  .option-btn.correct { background: #1B3A2E; border-color: #4FD1C5; color: #B7F5E8; }
  .option-btn.wrong { background: #3A1F1F; border-color: #E06666; color: #F5C4C4; }
  .option-btn.dim { background: #131A22; border-color: #1E2933; color: #5C6A75; }
  .next-btn { width: 100%; margin-top: 16px; padding: 13px 0; border-radius: 10px; border: 1px solid #F2A65A; background: #F2A65A20; color: #F2A65A; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .skip-btn { width: 100%; margin-top: 16px; padding: 12px 0; border-radius: 10px; border: 1px solid #26313C; background: transparent; color: #7C8B99; font-size: 13.5px; cursor: pointer; font-family: inherit; }
  .result-skipped { font-size: 12.5px; color: #7C8B99; }
  .result-box { width: 100%; background: #151F29; border: 1px solid #26313C; border-radius: 18px; padding: 28px 26px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .result-score { font-size: 22px; font-weight: 700; color: #E8ECEF; }
  .result-pct { font-size: 14px; color: #4FD1C5; font-family: ui-monospace, monospace; margin-bottom: 8px; }
  .wrong-list { width: 100%; margin-top: 10px; display: flex; flex-direction: column; gap: 12px; }
  .wrong-list-title { font-size: 12.5px; color: #7C8B99; font-family: ui-monospace, monospace; margin-bottom: 2px; }
  .summary-box { width: 100%; margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
  .summary-row { display: flex; align-items: center; gap: 8px; }
  .summary-cat-name { font-size: 12px; color: #B7C2CC; width: 130px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .summary-bar-track { flex: 1; height: 6px; background: #1C2733; border-radius: 4px; overflow: hidden; }
  .summary-bar-fill { height: 100%; border-radius: 4px; transition: width .3s ease; }
  .summary-cat-count { font-size: 11.5px; color: #7C8B99; font-family: ui-monospace, monospace; width: 34px; text-align: right; flex-shrink: 0; }
  .summary-focus { font-size: 12.5px; color: #F2A65A; margin-top: 4px; font-weight: 600; }
  .wrong-item { background: #131A22; border: 1px solid #1E2933; border-radius: 10px; padding: 12px 14px; }
  .wrong-q { font-size: 13.5px; color: #DCE3E8; margin-bottom: 6px; }
  .wrong-your { font-size: 12.5px; color: #E06666; margin-bottom: 2px; }
  .wrong-correct { font-size: 12.5px; color: #4FD1C5; }
  .restart-btn { margin-top: 18px; display: flex; align-items: center; gap: 8px; padding: 11px 20px; border-radius: 10px; border: 1px solid #26313C; background: #1C2733; color: #E8ECEF; font-size: 14px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-left">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <circle cx="7" cy="17" r="3" fill="#4FD1C5" />
        <circle cx="27" cy="7" r="3" fill="#F2A65A" />
        <circle cx="27" cy="27" r="3" fill="#F2A65A" />
        <path d="M10 17 H24 M17 17 L24 7 M17 17 L24 27" stroke="#3A4956" stroke-width="1.5" />
        <path d="M10 17 H24" stroke="#4FD1C5" stroke-width="1.5" stroke-dasharray="4 4">
          <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1.2s" repeatCount="indefinite" />
        </path>
      </svg>
      <div>
        <div class="title">Karteikarten</div>
        <div class="subtitle">Abschlussprüfung</div>
      </div>
    </div>
    <button class="menu-btn" id="menuBtn">Themen ▼</button>
  </div>

  <div class="mode-row">
    <button class="mode-btn" id="modeCardsBtn">Karteikarten</button>
    <button class="mode-btn" id="modeQuizBtn">Quiz</button>
  </div>

  <div class="tab-row" id="tabRow"></div>
  <div class="cat-panel" id="catPanel"></div>

  <div id="emptyState" class="empty" style="display:none;">Keine Karten in der Auswahl.</div>

  <div id="cardArea">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>

    <div class="stage">
      <div class="flip-card" id="flipCard">
        <div class="flip-inner" id="flipInner">
          <div class="face face-front">
            <div class="cat-label" id="catLabelFront"></div>
            <div class="q-text" id="qText"></div>
            <div class="hint">Tippen zum Umdrehen</div>
          </div>
          <div class="face face-back">
            <div class="cat-label-dark">Antwort</div>
            <div class="a-text" id="aText"></div>
            <div class="hint-dark">Tippen für Frage</div>
          </div>
        </div>
      </div>
    </div>

    <div class="mark-row">
      <button class="mark-btn" id="btnUnknown" style="border-color:#E0666650;">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#E06666" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Nochmal
      </button>
      <button class="mark-btn" id="btnKnown" style="border-color:#4FD1C550;">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#4FD1C5" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Gewusst
      </button>
    </div>

    <div class="controls">
      <button class="nav-btn" id="btnPrev">‹</button>
      <button class="nav-btn" id="btnShuffle">⇄</button>
      <button class="nav-btn" id="btnReset">↺</button>
      <button class="nav-btn" id="btnNext">›</button>
    </div>
  </div>

  <div id="quizArea" style="display:none;">
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="quizProgressFill" style="background: linear-gradient(90deg,#F2A65A,#D98A3D);"></div></div>
      <div class="progress-label" id="quizProgressLabel"></div>
    </div>

    <div class="quiz-card" id="quizQuestionCard" style="display:none;">
      <div class="cat-label" id="quizCatLabel"></div>
      <div class="q-text" id="quizQText"></div>
    </div>

    <div class="options-col" id="quizOptions"></div>

    <button class="skip-btn" id="quizSkipBtn">Überspringen</button>
    <button class="next-btn" id="quizNextBtn" style="display:none;"></button>

    <div class="result-box" id="quizResultBox" style="display:none;">
      <div class="result-score" id="quizResultScore"></div>
      <div class="result-skipped" id="quizResultSkipped" style="display:none;"></div>
      <div class="result-pct" id="quizResultPct"></div>
      <div class="summary-box" id="quizSummaryBox"></div>
      <div class="wrong-list" id="quizWrongList"></div>
      <button class="restart-btn" id="quizRestartBtn">↺ Neu starten</button>
    </div>
  </div>
</div>

<script>
const DECK_NWT = [
  // Grundlagen
  { cat: "Grundlagen", q: "Welche Hardware-Komponente ermöglicht einem Rechner die Teilnahme am Netzwerk?", a: "Die Netzwerkkarte (NIC – Network Interface Card). Sie trägt die weltweit eindeutige MAC-Adresse und übernimmt das Senden/Empfangen von Frames auf Schicht 1+2. Ohne NIC (oder eine WLAN-Antenne als drahtloses Pendant) hat ein Rechner keinen physischen Zugang zum Netz." },
  { cat: "Grundlagen", q: "Was macht ein Repeater?", a: "Er erhöht die Reichweite eines gesendeten Signals, indem er es regeneriert und weiterschickt. Er arbeitet rein auf Schicht 1 (Bitübertragung) und interpretiert die Daten dabei nicht – er ist also kein 'intelligentes' Gerät wie ein Switch." },
  { cat: "Grundlagen", q: "Was macht ein Router?", a: "Er ermöglicht den Datenaustausch zwischen unterschiedlichen Netzwerken (Routing). Er arbeitet auf Schicht 3, wählt anhand der Ziel-IP und seiner Routingtabelle den passenden Weg und trennt dabei Broadcast-Domänen voneinander." },
  { cat: "Grundlagen", q: "Switch vs. AccessPoint – was ist der Unterschied?", a: "Beide sind Kopplungselemente auf Schicht 2 innerhalb eines Netzes. Switch: drahtgebundene Verbindung (Kupfer/Glasfaser). AccessPoint: drahtlose Verbindung (WLAN) für Endgeräte ohne Ethernet-Anschluss." },
  { cat: "Grundlagen", q: "Was sind Protokolle und welche Protokollfamilie wird meist verwendet?", a: "Protokolle sind verbindliche Regeln für die Kommunikation im Netzwerk (z.B. Format, Ablauf, Fehlerbehandlung). Heute dominierende Protokollfamilie: TCP/IP; früher u.a. auch IPX/SPX (Novell) oder NetBIOS gebräuchlich." },
  { cat: "Grundlagen", q: "Wozu braucht ein Betriebssystem einen Treiber im Netzwerkkontext?", a: "Der Treiber bildet die LLC-Teilschicht (Logical Link Control) und verbindet die Netzwerkkarte mit dem Betriebssystem. Ohne ihn könnte das Betriebssystem die Hardware der NIC nicht ansprechen und keine Daten senden/empfangen." },
  { cat: "Grundlagen", q: "Ist ein Server ein Endgerät?", a: "Ja, Server zählen zu den Endgeräten – genau wie PC, Tablet, Telefon oder Drucker. Der Unterschied zu Kopplungselementen (Switch, Router, AccessPoint) ist, dass Endgeräte Dienste anbieten oder in Anspruch nehmen, nicht primär Daten weiterleiten." },

  // Klassifikation
  { cat: "Klassifikation", q: "Was kennzeichnet ein LAN?", a: "Ein Local Area Network ist auf einen Standort begrenzt (ggf. sogar nur einen Raum) und nutzt keine Verbindungen von Telekommunikations-Drittanbietern. Eingesetzte, nicht-proprietäre Standards: Ethernet (IEEE 802.3) und WLAN (IEEE 802.11)." },
  { cat: "Klassifikation", q: "Was kennzeichnet ein WAN?", a: "Ein Wide Area Network verbindet mehrere LANs verschiedener Standorte eines Unternehmens/einer Organisation, indem Leitungen von Drittanbietern (z.B. Telekommunikationsanbieter) genutzt werden – im Gegensatz zum LAN, das ohne Drittanbieter auskommt." },
  { cat: "Klassifikation", q: "Was ist ein PAN, und welche Standards kommen zum Einsatz?", a: "Ein Personal Area Network hat eine Längenausdehnung von wenigen Metern und verbindet z.B. Smartphone, Kopfhörer oder Peripheriegeräte. Eingesetzte Standards: Bluetooth (IEEE 802.15) und USB." },
  { cat: "Klassifikation", q: "Was ist ein SAN und wie unterscheidet es sich von NAS?", a: "SAN (Storage Area Network): eigenes, schnelles Netzwerk für Speichermedien, die von mehreren Servern gemeinsam verwaltet werden. NAS (Network Attached Storage): ein einzelner, eigenständiger Rechner mit reduziertem Betriebssystem, der ins Netzwerk eingebunden ist und dort Dateien speichert." },
  { cat: "Klassifikation", q: "Nenne die zentralen Merkmale der Client-Server-Architektur.", a: "Server bieten Dienste an (Web, Mail, Datenbank, …) und übernehmen die netzwerkweite Verwaltung von Ressourcen. Eine Anmeldung im Netzwerk ist erforderlich, der Zugriff wird kontrolliert (z.B. Windows Active Directory / Domänenanmeldung). Es entstehen zusätzliche Kosten für dedizierte Server, Serversoftware/Lizenzen und Verwaltungs-Know-how." },
  { cat: "Klassifikation", q: "Was ist charakteristisch für Peer-to-Peer-Netzwerke?", a: "Die Benutzer selbst entscheiden, ob ihr Rechner Dienste anbietet oder in Anspruch nimmt – ein Rechner kann also gleichzeitig Client und Server sein. Es gibt keine zentrale netzwerkweite Verwaltung und keine zusätzlichen Kosten, da jedes aktuelle Betriebssystem Datei-/Druckdienste anbieten kann. Geeignet nur für kleine bzw. private Umgebungen." },

  // Adressierung
  { cat: "Adressierung", q: "Welche 4 Adressarten gibt es im Netzwerk?", a: "MAC-Adresse (Schicht 2, physikalisch), IP-Adresse (Schicht 3, logisch), Port (Schicht 4, Anwendung) und Name (z.B. DNS-Name, für Menschen lesbar)." },
  { cat: "Adressierung", q: "Wie lang ist eine MAC-Adresse und wie wird sie dargestellt?", a: "48 Bit (6 Byte), hexadezimal mit 12 Hexziffern, z.B. C8:5A:CF:B1:80:4C. Alternative Schreibweisen sind C8-5A-CF-B1-80-4C oder C85A.CFB1.804C – jeweils dieselbe Adresse, nur anders gruppiert." },
  { cat: "Adressierung", q: "Wer vergibt die MAC-Adresse und wofür wird sie verwendet?", a: "Der Hersteller der Netzwerkkarte vergibt sie fest (physikalische Adresse), sie ist weltweit eindeutig. Verwendet wird sie ausschließlich zur netzinternen Adressierung auf Schicht 2 – über Netzgrenzen hinweg übernimmt das die IP-Adresse." },
  { cat: "Adressierung", q: "Wie ist eine IPv4-Adresse aufgebaut?", a: "32 Bit, geschrieben als 4 Bytes dezimal, durch Punkte getrennt (z.B. 192.168.20.65). Es handelt sich um eine logische, administrativ zugewiesene Adresse mit hierarchischem Aufbau aus Netzanteil und Hostanteil, die ein Gerät im Netzwerk eindeutig identifiziert." },
  { cat: "Adressierung", q: "Wie ist eine IPv6-Adresse aufgebaut?", a: "128 Bit, hexadezimal, 8 Blöcke à 4 Hexziffern, getrennt durch Doppelpunkte. IPv4 und IPv6 sind nicht kompatibel zueinander, weshalb viele Geräte im Dual-Stack-Betrieb beide Adressarten parallel führen." },
  { cat: "Adressierung", q: "Was bezeichnet ein Port und wie viele Bit hat er?", a: "Ein Port bezeichnet die netzwerkfähige Anwendung auf dem Rechner (Schicht 4) und ist 16 Bit groß. Über die Kombination aus IP-Adresse und Port kann eine konkrete Anwendung auf einem konkreten Gerät eindeutig adressiert werden." },
  { cat: "Adressierung", q: "Wie sind die Portbereiche eingeteilt?", a: "0–1023: well-known Ports für bekannte Standarddienste (z.B. HTTP, DNS). 1024–49151: registered Ports für sonstige Serveranwendungen (z.B. MySQL 3306, Spieleserver). 49152–65535: private/dynamic Ports, die der Client temporär für eine Verbindung wählt." },
  { cat: "Adressierung", q: "Welche well-known Ports gehören zu HTTP, HTTPS und SSH?", a: "HTTP: 80, HTTPS: 443, SSH: 22. Ergänzend wichtig: FTP 20/21, Telnet 23, DNS 53 – alles well-known Ports im Bereich 0–1023." },
  { cat: "Adressierung", q: "Welche Ports nutzen SMTP, POP3 und IMAP?", a: "SMTP (Port 25): Versenden von E-Mails, meist Client→Server bzw. Server→Server. POP3 (Port 110): Empfangen von E-Mails, die dabei i.d.R. vom Server gelöscht werden. IMAP (Port 143): Empfangen von E-Mails, die auf dem Server verbleiben und über mehrere Geräte synchron abrufbar sind." },
  { cat: "Adressierung", q: "Welche Ports nutzt DHCP?", a: "Server: Port 67, Client: Port 68. Die gesamte Kommunikation (Discover/Offer/Request/ACK) läuft dabei zunächst als Broadcast ab, solange der Client noch keine eigene IP-Konfiguration besitzt." },

  // DNS
  { cat: "DNS", q: "Wofür steht DNS und wann wurde es eingeführt?", a: "Domain Name System, 1984 eingeführt – ein weltweites, hierarchisches Namenssystem. Die Hierarchie gliedert sich in Root-Domäne, Top-Level-Domäne (z.B. .de, .com), Hauptdomäne, optionale Subdomäne und schließlich den Rechnernamen." },
  { cat: "DNS", q: "Was entspricht die Hosts-Datei und wo liegt sie unter Windows?", a: "Ein privates Adressbuch (Name → IP-Adresse) auf dem lokalen Rechner, das noch vor einer DNS-Anfrage konsultiert wird. Pfad unter Windows: C:\\windows\\system32\\drivers\\etc\\hosts – Einträge haben die Form 'IP-Adresse Name', z.B. 192.168.217.252 printer." },
  { cat: "DNS", q: "Wie viele Root-DNS-Server gibt es weltweit?", a: "13 – sie bilden die oberste, autoritative Instanz der DNS-Hierarchie (Root-Domäne, gekennzeichnet durch einen abschließenden Punkt)." },
  { cat: "DNS", q: "Was bedeutet 'Nicht autorisierende Antwort' bei nslookup?", a: "Sie zeigt an, dass der angefragte DNS-Server die betreffende Zone nicht selbst verwaltet und daher keine Garantie für die Korrektheit der gelieferten Antwort übernimmt (die Antwort stammt meist aus dessen Cache). Verwaltet der Server die Zone selbst, ist er autoritativ und die Zeile 'Nicht autorisierende Antwort' entfällt." },
  { cat: "DNS", q: "Was macht ein freier DNS-Server wie 8.8.8.8?", a: "Er beantwortet Clientanfragen meist direkt aus seinem Cache, da dort schon die meisten Namensauflösungen vorliegen. Nur in seltenen Fällen müssen autoritative DNS-Server kontaktiert werden. Jede Namensauflösung hat dabei eine vom autoritativen Server festgelegte Gültigkeitsdauer (TTL)." },

  // Konsolenbefehle
  { cat: "Konsolenbefehle", q: "Wofür wird IPCONFIG /ALL genutzt?", a: "Zeigt die erweiterte Netzwerkkonfiguration des Rechners an: u.a. physische (MAC-)Adresse, DHCP-Status, IPv4-/IPv6-Adresse und Subnetzmaske. Ohne /ALL liefert IPCONFIG nur eine verkürzte Übersicht." },
  { cat: "Konsolenbefehle", q: "Wofür wird GETMAC /V genutzt?", a: "Zeigt für alle Netzwerkadapter des Rechners die MAC-Adressen sowie Verbindungsname und Transportname an – auch für Adapter, die gerade nicht aktiv genutzt werden." },
  { cat: "Konsolenbefehle", q: "Wofür wird TRACERT genutzt?", a: "Zeigt die Route (die Kette der passierten Router/Hops) zu einem Zielrechner an, indem es die TTL schrittweise erhöht und die ICMP-Fehlermeldungen (Time Exceeded) der Router auswertet." },
  { cat: "Konsolenbefehle", q: "Wofür wird NETSTAT genutzt?", a: "Zeigt die aktuellen Verbindungen (offene TCP/UDP-Sockets) auf dem lokalen Rechner an – hilfreich, um zu sehen, mit welchen Zielen und Ports der Rechner gerade kommuniziert." },
  { cat: "Konsolenbefehle", q: "Wofür wird ROUTE PRINT genutzt?", a: "Zeigt die lokale Routingtabelle des Clients an, also welche Zielnetze über welches Gateway/welche Schnittstelle erreichbar sind." },

  // IPv4 Klassen
  { cat: "IPv4-Klassen", q: "Welchen Wertebereich hat das 1. Byte bei Klasse A und wie ist sie aufgeteilt?", a: "0–127 (erstes Bit ist immer 0). Aufbau: 1 Byte Netzanteil, 3 Byte Hostanteil, Subnetzmaske 255.0.0.0 (/8). Es gibt 2^7 = 128 Klasse-A-Netze, jedes mit 2^24 Adressen – zur Hälfte aller IPv4-Adressen gehörend." },
  { cat: "IPv4-Klassen", q: "Welchen Wertebereich hat das 1. Byte bei Klasse B und wie ist sie aufgeteilt?", a: "128–191 (erste 2 Bit sind '10'). Aufbau: 2 Byte Netzanteil, 2 Byte Hostanteil, Subnetzmaske 255.255.0.0 (/16). Es gibt 2^14 Klasse-B-Netze mit je 2^16 Adressen – ein Viertel aller IPv4-Adressen." },
  { cat: "IPv4-Klassen", q: "Welchen Wertebereich hat das 1. Byte bei Klasse C und wie ist sie aufgeteilt?", a: "192–223 (erste 3 Bit sind '110'). Aufbau: 3 Byte Netzanteil, 1 Byte Hostanteil, Subnetzmaske 255.255.255.0 (/24), damit 254 nutzbare Rechneradressen (2^8 − 2). Es gibt 2^21 Klasse-C-Netze – ein Achtel aller IPv4-Adressen." },
  { cat: "IPv4-Klassen", q: "Wofür werden Klasse D und Klasse E Adressen verwendet?", a: "Klasse D (erste 4 Bit '1110', 1. Byte 224–239): Multicastadressen, z.B. 224.0.0.5 für OSPF-Router untereinander. Klasse E (erste 4 Bit '1111', 1. Byte 240–255): reserviert, nicht für Rechneradressierung – 255.255.255.255 ist der allgemeine lokale Broadcast." },
  { cat: "IPv4-Klassen", q: "Was ist APIPA und welcher Adressbereich gehört dazu?", a: "Automatic Private IP Addressing – Bereich 169.254.0.0/16. Rechner vergeben sich diese Adresse selbständig (link local), wenn kein DHCP-Server antwortet. Sie ist nur im lokalen Netz gültig und wird nicht geroutet." },
  { cat: "IPv4-Klassen", q: "Welche privaten Adressbereiche gibt es (RFC 1918)?", a: "10.0.0.0/8 (10.0.0.0–10.255.255.255), 172.16.0.0/12 (172.16.0.0–172.31.255.255) und 192.168.0.0/16 (192.168.0.0–192.168.255.255). Diese Adressen werden nicht im Internet geroutet und können in unterschiedlichen privaten Umgebungen mehrfach verwendet werden." },
  { cat: "IPv4-Klassen", q: "Wofür wird NAT benötigt und was ist der Adressbereich für Carrier-NAT?", a: "NAT (Network Address Translation) übersetzt private IP-Adressen in eine öffentliche (meist die des Routers) und umgekehrt, um öffentliche IPv4-Adressen einzusparen. Für ein zusätzliches, providerseitiges NAT (doppeltes NAT) ist der Bereich 100.64.0.0/10 reserviert." },
  { cat: "IPv4-Klassen", q: "Wie wird die Netzadresse aus IP-Adresse und Subnetzmaske berechnet?", a: "IP-Adresse und Subnetzmaske werden binär mit logischem UND verknüpft (0 UND 0 = 0, 0 UND 1 = 0, 1 UND 1 = 1). Beispiel: 97.30.234.77 UND 255.0.0.0 ergibt binär 01100001.00000000.00000000.00000000, also die Netzadresse 97.0.0.0." },
  { cat: "IPv4-Klassen", q: "Was ist die Bedeutung von UNICAST, MULTICAST, BROADCAST und ANYCAST?", a: "Unicast: Paket an genau einen Rechner. Multicast: Paket an eine definierte Gruppe von Rechnern (z.B. alle Router). Broadcast: Paket an alle Rechner im Netz (bei IPv6 nicht mehr vorhanden). Anycast: eine global gültige IP, die je nach Region in unterschiedliche tatsächliche IPs übersetzt wird (z.B. Google DNS 8.8.8.8 → nächstgelegener Server)." },

  // Subnetting
  { cat: "Subnetting", q: "Was ist das Ziel von Subnetting?", a: "Ein großes Netz wird in mehrere gleich große kleinere Netze unterteilt, um Adressen zu sparen. Dabei werden Hostbits als zusätzliche Netzbits verwendet – je mehr Bits abgezweigt werden, desto mehr (aber kleinere) Subnetze entstehen." },
  { cat: "Subnetting", q: "Wie berechnet man die Anzahl der Subnetze und Hosts beim Subnetting?", a: "Anzahl Subnetze = 2^(Anzahl Subnetting-Bits). Anzahl nutzbarer Hostadressen pro Subnetz = 2^(verbleibende Hostbits) − 2, da die erste Adresse im Subnetz immer die Netzadresse und die letzte immer die Broadcastadresse ist." },
  { cat: "Subnetting", q: "Was ist die 'Magic Number' beim Subnetting?", a: "Der Dezimalwert des niedrigstwertigen gesetzten Bits der Subnetzmaske im letzten relevanten Byte (z.B. bei 255.255.255.192 ist es 64). Er gibt die Sprunggröße zwischen den Netzadressen der einzelnen Subnetze an (hier also 64er-Sprünge: 0, 64, 128, 192)." },
  { cat: "Subnetting", q: "Netzadresse, 1./letzte Rechneradresse und Broadcast für 192.168.30.96/28?", a: "Subnetzmaske /28 = 255.255.255.240, Magic Number 16, Netzgröße 16 Adressen. Netzadresse: 192.168.30.96. 1. Rechner: 192.168.30.97. Letzter Rechner: 192.168.30.110. Broadcast: 192.168.30.111 (14 nutzbare Hosts)." },
  { cat: "Subnetting", q: "Wie lautet die Netzadresse von 172.18.10.69/26?", a: "172.18.10.64. Bei /26 bleiben 6 Hostbits, also 64er-Sprünge im letzten Byte (0, 64, 128, 192). 69 liegt zwischen 64 und 128, die Netzadresse ist daher 172.18.10.64 (binär: 172.18.10.01000101 UND 11000000 = 172.18.10.01000000)." },
  { cat: "Subnetting", q: "Wie viele Hostbits werden mindestens für 2 nutzbare Rechneradressen benötigt?", a: "2 Hostbits (2^2 − 2 = 2 nutzbare Adressen). Sonderfall /31: wird für reine Transportnetze (z.B. Router-zu-Router-Verbindungen) verwendet, ganz ohne separate Netz- und Broadcastadresse." },

  // DHCP
  { cat: "DHCP", q: "Wofür steht DHCP und welche Parameter werden vergeben?", a: "Dynamic Host Configuration Protocol – automatische Vergabe der IP-Konfiguration (stateful DHCP). Vergeben werden u.a. IP-Adresse, Subnetzmaske, Standardgateway, DNS-Server, Domänenname, Zeitserver (NTP) sowie die Leasetime (Gültigkeitsdauer der Zuweisung)." },
  { cat: "DHCP", q: "Wie lautet der DHCP-Ablauf (4 Schritte)?", a: "Discover (Client sucht per Broadcast einen DHCP-Server) → Offer (Server bietet eine IP-Konfiguration per Broadcast an) → Request (Client nimmt das Angebot per Broadcast an) → ACK (Server bestätigt per Broadcast). Alle vier Schritte laufen als Broadcast (MAC FFFF.FFFF.FFFF, IPv4 255.255.255.255)." },
  { cat: "DHCP", q: "Welche Geräte haben im Regelfall statische statt dynamische IP-Adressen?", a: "Router, Server und Drucker – also Geräte, die dauerhaft unter derselben Adresse erreichbar sein müssen (z.B. damit DNS-Einträge oder Standardgateway-Angaben stabil bleiben)." },
  { cat: "DHCP", q: "Was macht ein DHCP Relay Agent?", a: "Er leitet DHCP-Broadcasts, die im lokalen Netz keinen DHCP-Server finden, als Unicast an einen DHCP-Server in einem anderen Netz weiter. Er wird an der Routerschnittstelle des Netzes ohne eigenen DHCP-Server konfiguriert." },

  // ARP/ICMP
  { cat: "ARP & ICMP", q: "Wofür wird ARP verwendet?", a: "Address Resolution Protocol: ermittelt zu einer bereits bekannten IPv4-Adresse die zugehörige MAC-Adresse im lokalen Netz – notwendig, weil auf Schicht 2 letztlich mit MAC-Adressen adressiert wird." },
  { cat: "ARP & ICMP", q: "Was ist ein ARP Request und was die Ziel-MAC dabei?", a: "Eine Anfrage, die als Broadcast versendet wird; die Ziel-MAC ist dabei FF:FF:FF:FF:FF:FF, da noch nicht bekannt ist, welcher Rechner antworten wird. Der gesuchte Rechner antwortet direkt (unicast) mit einem ARP Reply." },
  { cat: "ARP & ICMP", q: "Was ist Gratuitous ARP?", a: "Ein Rechner gibt unaufgefordert (ohne vorherige Anfrage) seine eigene MAC-Adresse im Netz bekannt, z.B. ein Drucker oder Server nach dem Start – damit können andere Geräte ihre ARP-Tabellen direkt aktualisieren." },
  { cat: "ARP & ICMP", q: "Wofür wird ICMP genutzt?", a: "Internet Control Message Protocol – u.a. Grundlage für PING (Echo Request/Reply) und TRACERT (Time Exceeded) sowie für allgemeine Fehlermeldungen wie 'Destination Unreachable', wenn ein Paket nicht zugestellt werden kann." },
  { cat: "ARP & ICMP", q: "Was übernimmt NDP bei IPv6 anstelle von ARP?", a: "Neighbor Discovery Protocol (NDP), das auf ICMPv6 basiert, übernimmt u.a. die Funktion von ARP (Ermittlung der MAC-Adresse zu einer IPv6-Adresse über Neighbor Solicitation/Advertisement) sowie Router Solicitation/Advertisement zur Netzkonfiguration." },

  // Schichtenmodelle
  { cat: "Schichtenmodelle", q: "Welche 2 relevanten Schichtenmodelle gibt es?", a: "ISO/OSI-Modell (7 Schichten) und TCP/IP-Modell (4 Schichten). Beide unterteilen die Netzwerkkommunikation in hierarchisch angeordnete Teilaufgaben, wobei untere Schichten Dienste für obere Schichten bereitstellen." },
  { cat: "Schichtenmodelle", q: "Auf welcher OSI-Schicht arbeiten Hub/Repeater, Switch/AccessPoint und Router?", a: "Hub/Repeater: nur Schicht 1 (Physical, reine Bitübertragung). Switch/AccessPoint: Schicht 1+2 (Data-Link, MAC-Adressierung). Router/Multi-Layer-Switch: Schicht 1 bis 3 (zusätzlich logische IP-Adressierung und Routing)." },
  { cat: "Schichtenmodelle", q: "Welche OSI-Schichten sind transportorientiert, welche anwendungsorientiert?", a: "Schichten 1–4 (Physical, Data-Link, Network, Transport) sind transportorientiert – sie kümmern sich um den reinen Datentransport. Schichten 5–7 (Session, Presentation, Application) sind anwendungsorientiert und betreffen die eigentliche Nutzung durch Programme/Benutzer." },
  { cat: "Schichtenmodelle", q: "Welche Schichten umfassen LAN-Standards?", a: "Schicht 1 (Physical/Bitübertragung) und Schicht 2 (Data-Link/Datensicherung). Beispiele: Ethernet (IEEE 802.3), WLAN (IEEE 802.11), Bluetooth (IEEE 802.15) mit den jeweiligen Zugriffsverfahren CSMA/CD bzw. CSMA/CA." },
  { cat: "Schichtenmodelle", q: "Was ist die Aufgabe der Transportschicht?", a: "Segmentierung und Zusammenfügen der Nachrichten (mittels Sequenznummern), Namensauflösung über Ports, Flusssteuerung und – je nach Protokoll – zuverlässige Datenübertragung zwischen Endgeräten. Protokolle: TCP (zuverlässig, verbindungsorientiert) und UDP (schnell, verbindungslos)." },
  { cat: "Schichtenmodelle", q: "Was ist die PDU (Protocol Data Unit) der Sicherungsschicht und wie groß ist sie standardmäßig?", a: "Die PDU heißt Frame – ein vollständig adressiertes Datenpaket, das bitweise verschickt wird. Standardgröße: 1500 Byte (Nutzdaten, ohne Ethernet-Header, FCS-Prüfsumme und Präambel)." },
  { cat: "Schichtenmodelle", q: "Nenne den Unterschied zwischen Bandbreite, Throughput und Goodput.", a: "Bandbreite: theoretische maximale Anzahl an Bits pro Sekunde (z.B. Gigabit Ethernet = 1 Gbit/s). Throughput: tatsächlich übertragene Bits pro Sekunde. Goodput: davon nur die reinen Nutzdaten ohne Overhead. Es gilt: Bandbreite > Throughput > Goodput." },
  { cat: "Schichtenmodelle", q: "Was ist der Unterschied zwischen synchroner und asynchroner Übertragung?", a: "Synchron: Sender und Empfänger sind über ein gemeinsames Taktsignal synchronisiert, Bits können jederzeit ohne Vorankündigung gesendet werden. Asynchron: Der Sender kündigt den Beginn einer Nachricht durch ein bestimmtes Bitmuster an, da kein gemeinsamer Takt existiert." },
  { cat: "Schichtenmodelle", q: "Was unterscheidet Simplex, Halbduplex und Vollduplex?", a: "Simplex: Übertragung nur in eine Richtung möglich. Halbduplex: Übertragung in beide Richtungen, aber nicht gleichzeitig (z.B. klassisches Ethernet mit Hub). Vollduplex: beide Richtungen gleichzeitig möglich (z.B. moderne Switch-Verbindungen) – dadurch auch kollisionsfrei." },

  // VLAN
  { cat: "VLAN", q: "Was ist ein VLAN und zu welcher Schicht gehört es?", a: "Ein Virtual LAN unterteilt ein physikalisches Netz am Switch in mehrere logische Netze, unabhängig von der räumlichen/physischen Verkabelung. VLANs gehören zur Schicht 2 und setzen konfigurierbare (managed) Switches voraus." },
  { cat: "VLAN", q: "Können sich VLANs über mehrere Switches oder über L3-Geräte erstrecken?", a: "Über mehrere Switches ja (das VLAN 'reist' über Trunk-Verbindungen mit), über L3-Geräte wie Router jedoch nicht – dort endet die logische Schicht-2-Trennung, und der Übergang zwischen VLANs erfolgt per Routing." },
  { cat: "VLAN", q: "Was ist ein Management VLAN?", a: "Ein eigenes VLAN, das ausschließlich für Infrastrukturgeräte (Switches etc.) reserviert ist. Ein Switch erhält darüber eine eigene IP-Adresse und ist so über das Netz konfigurierbar – getrennt vom Daten- oder Voice-VLAN der normalen Nutzer." },
  { cat: "VLAN", q: "Was ist ein Blackhole VLAN?", a: "Ein VLAN ohne jegliche zugewiesene Schnittstelle. Es wird empfohlen, es als natives VLAN zu verwenden, damit ungewollt untaggte Frames dort landen, statt versehentlich in ein produktives VLAN zu gelangen." },
  { cat: "VLAN", q: "Was ist Trunking und welches Protokoll wird verwendet?", a: "Trunking überträgt Frames mehrerer VLANs über eine einzige physikalische Leitung, z.B. zwischen Switch und Router oder zwischen zwei Switches. Protokoll: IEEE 802.1q – dabei werden die Frames getaggt (mit VLAN-ID markiert) und statt des Standard-Ethernet-II-Headers wird der ETHERNET dot1q-Header verwendet." },

  // Routing
  { cat: "Routing", q: "Wie ist ein Eintrag in der Routingtabelle aufgebaut?", a: "Netz_ID, Subnetzmaske, ip_next_hop / ausgehende Schnittstelle. Anhand dieser Angabe entscheidet der Router, über welchen nächsten Hop bzw. welche eigene Schnittstelle ein Paket zu einem bestimmten Zielnetz weitergeleitet wird." },
  { cat: "Routing", q: "Was ist die Standardroute (default route)?", a: "0.0.0.0 0.0.0.0 – sie passt auf jede beliebige Ziel-IP und wird deshalb nur dann gewählt, wenn keine spezifischere (genauere) Route in der Tabelle existiert." },
  { cat: "Routing", q: "Nach welchem Kriterium wählt der Router die Route, wenn mehrere Netze passen?", a: "Er wählt die Route mit den meisten übereinstimmenden Netzbits, also die spezifischste/genaueste Route. Beispiel: Passt eine Ziel-IP sowohl in 172.20.0.0/19 als auch in die Standardroute 0.0.0.0/0, wird die /19-Route gewählt." },
  { cat: "Routing", q: "Was ist Load Balancing auf Schicht 3?", a: "Gibt es 2 oder mehr gleichwertige (gleich gute) Routen zu einem Zielnetz in der Routingtabelle, verteilt der Router den Datenverkehr gleichmäßig auf sie (Round-Robin-Verfahren), statt nur eine Route zu nutzen." },
  { cat: "Routing", q: "Was ist die Administrative Distanz und nenne Beispielwerte.", a: "Sie bewertet die Vertrauenswürdigkeit der Quelle einer Route. Gibt es zu einem Zielnetz Routen aus verschiedenen Quellen, wird die mit der niedrigsten Administrativen Distanz eingetragen. Werte: Connected 0, statisch 1 (Standard), OSPF 110, RIP 120, 255 = nicht verfügbar (wird verworfen)." },
  { cat: "Routing", q: "Was ist der Unterschied zwischen statischem und dynamischem Routing?", a: "Statisch: der Administrator gibt jede Route fest vor (Zielnetz, Subnetzmaske, Next-Hop) – steigender Aufwand mit wachsender Netzwerkgröße, aber keine zusätzlichen Ressourcen nötig. Dynamisch: Router tauschen ihre bekannten Netze automatisch über ein Routingprotokoll aus – unabhängiger von der Netzwerkgröße, passt sich automatisch an Topologieänderungen an, benötigt aber mehr Ressourcen und eine konfigurierte Sicherheit." },
  { cat: "Routing", q: "Wie ermittelt RIP die beste Route und was ist die Begrenzung?", a: "RIP ist ein Distanzvektor-Protokoll und misst nur die Anzahl der Hops (Router) bis zum Zielnetz, ohne Bandbreite oder Latenz zu berücksichtigen. Maximal erlaubt sind 15 Hops – 16 Hops bedeutet, dass das Netz als nicht erreichbar gilt." },
  { cat: "Routing", q: "Wie ermittelt OSPF die beste Route?", a: "OSPF ist ein Link-State-Protokoll und berechnet Kosten aus einer Kombination von Bandbreite und Entfernung (z.B. 1 Gbit/s-Leitung bei Referenzbandbreite 10 Gbit/s → Kosten 10). Jeder Router kennt das gesamte Netz und berechnet die günstigste Route mit dem Dijkstra-Algorithmus." },
  { cat: "Routing", q: "Nenne 2 Vorteile von OSPF gegenüber RIP.", a: "Die Bandbreite fließt in die Metrik ein (statt nur Hop-Anzahl), das Netz konvergiert nach Änderungen schneller, es gibt keine 15-Hop-Begrenzung, und das Routinggebiet kann in mehrere Areas unterteilt werden, um die Netzlast durch OSPF-Pakete zu reduzieren. Nachteil: höherer Ressourcenbedarf am Router." },

  // IPv6
  { cat: "IPv6", q: "Wie lang ist eine IPv6-Adresse und wie wird sie geschrieben?", a: "128 Bit; geschrieben als 8 Blöcke à 4 Hexziffern, getrennt durch Doppelpunkt (preferred format, ungekürzt mit 32 Hexziffern). In der Praxis wird meist die verkürzte Schreibweise verwendet." },
  { cat: "IPv6", q: "Wie kürzt man 2001:000A:0000:0000:0000:0000:04C0:0001 korrekt?", a: "2001:A::4C0:1. Regeln: führende Nullen innerhalb eines Blocks weglassen (000A → A), und genau einmal in der Adresse einen zusammenhängenden Nullerblock durch einen doppelten Doppelpunkt (::) ersetzen." },
  { cat: "IPv6", q: "Wie lautet die Standardpräfixlänge bei IPv6?", a: "64 Bit (/64). Die ersten 64 Bit bilden dabei das Präfix (die Netzadresse), die restlichen 64 Bit den Identifier (Hostanteil) – z.B. per SLAAC selbst generiert." },
  { cat: "IPv6", q: "Welche IPv6-Adressbereiche gibt es (Global, Link Local, Unique Local)?", a: "Global Unicast: 2000::/3 – im Internet direkt erreichbar (vergleichbar mit öffentlichen IPv4-Adressen). Link Local: FE80::/10 – nur innerhalb des eigenen Netzes gültig, wird von jedem Gerät automatisch generiert. Unique Local: FC00::/7 – 'private' Adressen, die im Internet nicht geroutet werden." },
  { cat: "IPv6", q: "Was ist SLAAC?", a: "Stateless Address Autoconfiguration – der IPv6-Rechner generiert sich sowohl seine link-local- als auch seine global-unicast-Adresse selbständig, ohne zwingend einen DHCPv6-Server zu benötigen. Präfix, Präfixlänge und Gateway erhält er dabei per Router Advertisement." },
  { cat: "IPv6", q: "Was ist der Unterschied zwischen EUI-64-Verfahren und Privacy Extensions?", a: "EUI-64: die 48-Bit-MAC-Adresse wird durch Einfügen von FFFE in der Mitte auf 64 Bit gestreckt (zusätzlich wird das 7. Bit gedreht) – Nachteil: die MAC-Adresse ist im Klartext enthalten, der Rechner bleibt dauerhaft identifizierbar, daher nicht mehr empfohlen. Privacy Extensions: ein 64-Bit-Hashwert aus MAC-Adresse und Zeitstempel, der regelmäßig (spätestens bei jedem Neustart) neu generiert wird – dadurch keine Nachverfolgbarkeit über längere Zeit." },
  { cat: "IPv6", q: "Was ist DAD (Duplicate Address Detection)?", a: "Der Rechner schickt ein Neighbor Solicitation Paket mit seiner eigenen, selbst generierten IPv6-Adresse ins Netz. Kommt keine Antwort (kein Neighbor Advertisement), ist die Adresse im Netz noch nicht vergeben und kann verwendet werden." },
  { cat: "IPv6", q: "Gibt es bei IPv6 noch Broadcasts?", a: "Nein, bei IPv6 gibt es keine Broadcasts mehr. Ihre Funktion wird größtenteils durch Multicast-Adressen übernommen, z.B. ff02::1 für 'alle Rechner im Netz' oder ff02::2 für 'alle Router im Netz'." },

  // ACL & NAT
  { cat: "ACL & NAT", q: "Was ist eine ACL und ab wann spricht man von einer Firewall?", a: "Eine Access Control List enthält Regeln auf Schicht 3 und 4 (IP-Adressen, Protokolle, Ports). Wird sie auf einer Routerschnittstelle aktiviert (Befehl: IP ACCESS-GROUP nummer/name IN/OUT), spricht man von einer Firewall bzw. einem Paketfilter." },
  { cat: "ACL & NAT", q: "Was ist der Unterschied zwischen stateful und stateless ACLs?", a: "Stateless: In beiden Richtungen (IN und OUT) gelten dieselben allgemeinen, unabhängigen Regeln. Stateful: In eine Richtung gelten allgemeine Regeln, in die Gegenrichtung werden nur Antwortpakete zu bereits vorher initiierten Kommunikationen zugelassen (zustandsbezogen)." },
  { cat: "ACL & NAT", q: "Nach welchem Prinzip werden ACL-Einträge (ACEs) abgearbeitet?", a: "Nach dem Whitelist-Prinzip: alles ist verboten, was nicht ausdrücklich erlaubt wurde. Trifft eine Regel (ACE) zu, wird sie angewandt und alle nachfolgenden Einträge ignoriert – deshalb sollten Einträge vom spezifischen zum allgemeinen Fall sortiert werden, sonst kann eine allgemeine DENY-Regel eine später folgende, speziellere PERMIT-Regel unwirksam machen." },
  { cat: "ACL & NAT", q: "Was ist der Unterschied zwischen Standard- und erweiterter ACL?", a: "Standard-ACL: filtert nur nach Absender-IP mit Wildcard-Maske, z.B. für NAT- oder Netzzugriffsberechtigungen. Erweiterte ACL: filtert zusätzlich nach Ziel-IP (mit Wildcard) sowie nach Protokoll (IP, ICMP, TCP, UDP, OSPF, …) und – bei TCP/UDP – nach Quell- und Zielport." },
  { cat: "ACL & NAT", q: "Was ist NAT und wozu dient es?", a: "Network Address Translation übersetzt private IP-Adressen in öffentliche und umgekehrt. Dadurch lässt sich mit wenigen öffentlichen IPv4-Adressen eine große Anzahl privater Geräte ins Internet bringen – öffentliche Adressen werden so eingespart." },
  { cat: "ACL & NAT", q: "Was ist PAT (Port Address Translation)?", a: "Mehrere private Client-Adressen werden im Regelfall auf dieselbe öffentliche Adresse des Routers übersetzt. Die einzelnen Kommunikationen der privaten Clients werden dabei durch unterschiedliche, vom Router vergebene Ports unterschieden." },
  { cat: "ACL & NAT", q: "Was ist der Unterschied zwischen statischem NAT und Port Forwarding?", a: "Statisches NAT: einem Gerät (meist ein Server) mit privater IP wird dauerhaft eine feste öffentliche IP zugeordnet. Port Forwarding: zusätzlich wird ein bestimmter Port fest zugeordnet – so können mehrere Server unter derselben öffentlichen IP, aber unterschiedlichen Ports erreichbar sein." },

  // TCP/UDP
  { cat: "TCP & UDP", q: "Was passiert beim TCP 3-Way-Handshake?", a: "SYN (Client fragt Verbindung an) → SYN, ACK (Server bestätigt und fragt seinerseits an) → ACK (Client bestätigt). Erst danach gilt die Verbindung als aufgebaut und Nutzdaten werden übertragen. Der Abbau erfolgt über einen doppelten 2-Wege-Handshake mit FIN/ACK." },
  { cat: "TCP & UDP", q: "Wofür steht das SYN-, ACK- und FIN-Flag bei TCP?", a: "SYN: Verbindungsanfrage (Verbindungsaufbau). ACK: Bestätigung eines empfangenen Segments. FIN: Anfrage zum Verbindungsabbau. Verbindungsaufbau nutzt die Flag-Folge [SYN]-[SYN,ACK]-[ACK], der Abbau [FIN]-[ACK]-[FIN]-[ACK]." },
  { cat: "TCP & UDP", q: "Wofür stehen die TCP-Flags PSH und URG?", a: "PSH: Daten sollen sofort verschickt bzw. beim Empfänger sofort an die Anwendung weitergegeben werden, statt im Puffer auf mehr Daten zu warten (z.B. wenn keine weiteren Daten folgen). URG: wirkt wie PSH, zusätzlich werden die Daten gegenüber anderen im TCP-Puffer bevorzugt behandelt – typisch bei Telnet/SSH, wo jedes Zeichen sofort verschickt wird." },
  { cat: "TCP & UDP", q: "Was ist die MSS (Maximale Segmentgröße) bei Ethernet/IPv4?", a: "MSS = MTU (bei Ethernet 1500 Byte) minus IP-Header minus TCP-Header. Bei IPv4 ergibt das 1460 Byte (1500 − 20 − 20)." },
  { cat: "TCP & UDP", q: "Was ist der Unterschied zwischen TCP und UDP?", a: "TCP: verbindungsorientiert (3-Way-Handshake), zuverlässig durch Sequenznummern und Bestätigungen, fehlertolerant (erneutes Senden bei Verlust) – dadurch mehr Overhead und langsamer. UDP: verbindungslos, best effort (unzuverlässig), dafür schnell und mit wenig Overhead." },
  { cat: "TCP & UDP", q: "Für welche Anwendungen wird typischerweise UDP genutzt?", a: "Zeitkritische Anwendungen wie Telefonie (VoIP), Videokonferenzen und Streaming, da ein erneutes Senden verlorener Pakete hier nicht sinnvoll wäre. Außerdem lokale Netzwerkverwaltung: DHCP, DNS-Abfrage, NTP, SNMP, TFTP." },
  { cat: "TCP & UDP", q: "Was bewirkt das (Sliding) Window bei TCP?", a: "Es legt eine Obergrenze an Daten fest, die ohne Bestätigung verschickt werden darf, und schützt so den Empfängerpuffer vor Überlauf. Die Fenstergröße kann sich während der Übertragung dynamisch anpassen (daher 'sliding')." },
  { cat: "TCP & UDP", q: "Wie groß ist der TCP-Header im Vergleich zum UDP-Header?", a: "TCP-Header: 20 Byte ohne Optionen (mit Feldern für Sequenz-/Bestätigungsnummer, Fenstergröße, Flags u.a.). UDP-Header: nur 8 Byte (Quellport, Zielport, Länge, Prüfsumme) – das erklärt den geringeren Overhead von UDP." },

  // WLAN
  { cat: "WLAN", q: "Nach welchem Standard ist WLAN genormt und welche Frequenzbereiche gibt es?", a: "IEEE 802.11. Frequenzbereiche: 2,4 GHz (teilt sich das Band mit anderen Technologien wie DECT/Bluetooth), 5 GHz (dringt schlechter durch Hindernisse, aber höhere Übertragungsraten) und neu 6 GHz." },
  { cat: "WLAN", q: "Was ist der Unterschied zwischen BSS und ESS?", a: "BSS (Basic Service Set): genau 1 AccessPoint mit 1 SSID. ESS (Extended Service Set): mehrere APs unter derselben SSID → Roaming zwischen den APs ist möglich (Handover, Roaming-Protokoll IEEE 802.11r)." },
  { cat: "WLAN", q: "Was ist das Hidden-Node-Problem und wie löst CSMA/CA es?", a: "Zwei Geräte erreichen zwar denselben AP, aber nicht sich gegenseitig, und wissen daher nichts von der jeweils anderen Übertragung – es drohen unbemerkte Kollisionen. Lösung durch CSMA/CA (Collision Avoidance): Geräte beantragen beim AP eine Sendeerlaubnis (RTS – Request to Send), der AP erteilt sie mit CTS (Clear to Send); danach kennen alle Teilnehmer die reservierte Zeitspanne und senden nicht dazwischen." },
  { cat: "WLAN", q: "Was ist der Unterschied zwischen autonomem AP und Lightweight AP?", a: "Autonomer AP: führt die Authentifizierung selbständig durch und muss einzeln, eigenständig konfiguriert werden. Lightweight AP: wird zentral über einen WLC (Wireless LAN Controller) konfiguriert und leitet Authentifizierungsanfragen nur an diesen weiter." },
  { cat: "WLAN", q: "Was sendet ein AccessPoint regelmäßig und mit welchen Informationen?", a: "Ein BEACON-Frame – mit seiner MAC-Adresse, der SSID (Netzwerkname), der Authentifizierungsmethode (z.B. WPA2 PSK) und den unterstützten Standards (z.B. 802.11ac). Darüber erkennen Clients das Netz, bevor sie sich verbinden." },

  // Switch
  { cat: "Switch", q: "Auf welcher OSI-Schicht arbeitet ein Switch und was interpretiert er?", a: "Schicht 2 (Datensicherungsschicht) nach Ethernet-Standard IEEE 802.3; er interpretiert MAC-Adressen, um Frames gezielt an den richtigen Port weiterzuleiten." },
  { cat: "Switch", q: "Was macht ein Switch, wenn die Ziel-MAC eines Unicast-Frames unbekannt ist?", a: "Er flutet (flooded) das Frame an alle angeschlossenen Ports außer dem Eingangsport. Antwortet der gesuchte Rechner, lernt der Switch dessen MAC-Adresse und trägt sie mit dem zugehörigen Port in seine MAC-Adressentabelle ein – zusätzlich wird bei jedem eingehenden Frame auch die Absender-MAC geprüft und ggf. eingetragen." },
  { cat: "Switch", q: "Was ist der Unterschied zwischen Store-and-Forward und Cut-Through?", a: "Store-and-Forward: der Switch empfängt das komplette Frame, bevor er es weiterleitet, und prüft dabei die FCS-Prüfsumme – fehlerhafte Frames werden verworfen. Cut-Through (2 Varianten): Fast Forward leitet bereits nach Empfang der Ziel-MAC weiter, Fragment Free erst nach den ersten 64 Byte (damit werden durch Kollisionen zerstörte Pakete erkannt) – beide Varianten sind schneller, aber ohne vollständige Fehlerprüfung." },
  { cat: "Switch", q: "Warum ist ein Switch intern kollisionsfrei?", a: "Er verbindet Quell- und Zielport gezielt miteinander; ist der Zielport bereits belegt, puffert er die Daten statt sie gleichzeitig auf ein gemeinsames Medium zu senden. Der Kollisionsbereich beschränkt sich dadurch auf jeweils 2 Geräte (Switch–Endgerät bzw. Switch–Switch), bei Vollduplex-Betrieb entfallen Kollisionen komplett." },
  { cat: "Switch", q: "Was ist der Unterschied zwischen einem Hub und einem Switch bezüglich der Bandbreite?", a: "Der Switch gibt jedem angeschlossenen Gerät die volle Bandbreite, da er intern jeden Port getrennt bedient. Beim Hub dagegen teilen sich alle angeschlossenen Geräte dieselbe Bandbreite, da er ein Signal einfach an alle Ports dupliziert (1 gemeinsame Kollisionsdomäne)." },
];

const DECK_PROG = [
  // Grundlagen der Programmierung
  { cat: "Grundlagen", q: "Was bedeutet das EVA-Prinzip?", a: "Eingabe → Verarbeitung → Ausgabe. Nach diesem Prinzip arbeiten praktisch alle Programme: Sie nehmen Daten entgegen (z.B. Tastatur), verarbeiten sie im Programm und geben das Ergebnis weiter (z.B. Monitor, an ein anderes Programm)." },
  { cat: "Grundlagen", q: "Was ist ein Algorithmus?", a: "Die abstrakte, schrittweise Formulierung eines Lösungswegs. Er muss ein endlicher, vollständiger Text sein, bei gleichen Eingaben immer das gleiche (richtige) Ergebnis liefern, allgemeingültig auf alle zulässigen Daten anwendbar sein und ein eindeutiges Ende haben." },
  { cat: "Grundlagen", q: "Welche 3 Grundstrukturen braucht jeder Programmentwurf?", a: "Sequenz (Anweisungsfolge, der Reihe nach abgearbeitet), Selektion (Auswahlstruktur/Bedingung, nur unter bestimmten Bedingungen ausgeführt) und Iteration (Wiederholungsstruktur/Schleife, wiederholt sich solange eine Abbruchbedingung erfüllt ist)." },
  { cat: "Grundlagen", q: "Was ist Pseudocode?", a: "Die Formulierung eines Algorithmus in natürlicher oder an eine Programmiersprache angelehnter Sprache, ohne feste Regeln. Er soll Ablauf und Struktur verdeutlichen, unabhängig von der konkreten sprachlichen Umsetzung." },
  { cat: "Grundlagen", q: "Was ist ein Programmablaufplan (PAP) und was ein Struktogramm?", a: "PAP (DIN 66001, Flow Chart): Anweisungen stehen in Kästchen, Pfeile geben die Laufrichtung an. Struktogramm (Nassi-Shneiderman-Diagramm, DIN 66261): jede Anweisung steht in einem verschachtelten Rechteck, ohne Pfeile." },
  { cat: "Grundlagen", q: "Was ist ein Aktivitätsdiagramm (UML) und was unterscheidet es vom PAP?", a: "Eine moderne UML-Version des Programmablaufplans: Anweisungen stehen in Kästchen, Pfeile zeigen die Laufrichtung. Im Unterschied zum klassischen PAP können auch parallel laufende Prozesse sowie mehrere Start- und Endpunkte abgebildet werden." },
  { cat: "Grundlagen", q: "Was ist der Unterschied zwischen Quellcode und Maschinencode?", a: "Quellcode ist der von Menschen lesbare Programmtext in einer Programmiersprache. Maschinencode sind die spezifischen Bytefolgen, die ein Prozessor direkt ausführen kann und die für Menschen nicht lesbar sind. Compiler/Interpreter übersetzen zwischen beiden." },
  { cat: "Grundlagen", q: "Was ist der Unterschied zwischen Assembler und Hochsprachen?", a: "Assembler ist maschinennah: jede CPU hat ihre eigene Assemblersprache, der Code ist schwer lesbar und nicht auf andere CPUs übertragbar, dafür maximal schnell. Hochsprachen sind unabhängig von der konkreten Hardware, gut lesbar und erlauben deutlich komplexere Programme." },
  { cat: "Grundlagen", q: "Was ist der Unterschied zwischen Compiler und Interpreter?", a: "Compiler: übersetzt den kompletten Code einmalig in eine ausführbare Datei, Fehler zeigen sich schon bei der Kompilierung, Ausführung ist schnell (z.B. C, C++, C#, Java). Interpreter: übersetzt bei jedem Aufruf zeilenweise neu, Fehler zeigen sich erst bei der Ausführung, dafür einfachere Entwicklung, aber langsamer (z.B. JavaScript, PHP, Perl)." },
  { cat: "Grundlagen", q: "Was ist Bytecode / Just-in-Time (JIT) und wo wird es eingesetzt?", a: "Eine Mischung aus Compiler und Interpreter ('Compreter'): Es entsteht ein maschinennaher, aber hardware-unabhängiger Bytecode, den eine Laufzeitumgebung auf dem Zielsystem in Maschinencode umwandelt. Bekanntestes Beispiel: Java mit der JRE (Java Runtime Environment)." },
  { cat: "Grundlagen", q: "Was ist der Unterschied zwischen einem Syntax- und einem Semantikfehler?", a: "Syntaxfehler verstoßen gegen die Schreibregeln/Grammatik der Sprache (z.B. 'innt' statt 'int', fehlendes Semikolon) – der Code lässt sich gar nicht erst korrekt übersetzen/ausführen. Semantikfehler sind syntaktisch korrekt, führen aber zu falschen Ergebnissen (z.B. das Ergebnis wird in der falschen Variable gespeichert)." },

  // JavaScript Grundlagen
  { cat: "JS Grundlagen", q: "Ist JavaScript eine Compiler- oder eine Interpretersprache, und wo läuft der Code?", a: "JavaScript ist eine Scriptsprache (Interpretersprache): der Code wird 'on the fly' beim Aufruf übersetzt. Klassisches (Vanilla) JavaScript ist clientseitig und läuft in der JavaScript-Engine des Browsers." },
  { cat: "JS Grundlagen", q: "Was bedeutet 'Sandbox' im Zusammenhang mit JavaScript im Browser?", a: "JavaScript läuft im Browser in einer abgeschotteten Umgebung mit keinem oder nur stark eingeschränktem Zugriff auf Dateisystem, Hardware und Datenbanken des Clients – zum Schutz des Nutzers vor schädlichem Code." },
  { cat: "JS Grundlagen", q: "Was sind V8, Node.js und Electron?", a: "V8: Googles JavaScript-Laufzeitumgebung (Rendering-Engine von Chrome), auch ohne Browser nutzbar. Node.js: baut auf V8 auf und ermöglicht JavaScript unabhängig vom Browser auszuführen (z.B. für Webserver). Electron: baut auf Node.js auf und ist ein Framework für plattformunabhängige Desktop-Anwendungen (z.B. MS Teams)." },
  { cat: "JS Grundlagen", q: "Wie lässt sich JavaScript in eine HTML-Seite einbinden?", a: "Extern über <script src='datei.js'><\/script> (heute meist kurz vor </body> statt im <head>) oder intern direkt im HTML über <script>…<\/script>-Blöcke an beliebiger Stelle. Beide Varianten lassen sich beliebig kombinieren." },
  { cat: "JS Grundlagen", q: "Welche Notationsregeln gelten in JavaScript?", a: "Jedes Statement steht in einer eigenen Zeile und endet mit Semikolon. JavaScript ist case sensitive (Groß-/Kleinschreibung wird unterschieden), Whitespace wird ignoriert. Kommentare: // für einzeilig, /* ... */ für mehrzeilig." },

  // Variablen & Datentypen
  { cat: "Variablen & Datentypen", q: "Was ist der Unterschied zwischen var und let?", a: "var ist funktionsorientiert (in der gesamten Funktion sichtbar, kann erneut deklariert werden – potenzielle Fehlerquellen). let (ES6) ist blockorientiert (nur innerhalb der { }-Klammern sichtbar) und kann nicht erneut deklariert werden – dadurch weniger fehleranfällig." },
  { cat: "Variablen & Datentypen", q: "Was ist eine Konstante (const) und wie unterscheidet sie sich von einer Variable?", a: "Eine Konstante wird mit const deklariert, ist wie let blockorientiert, muss sofort bei der Deklaration einen Wert erhalten und kann diesen Wert danach nicht mehr ändern – im Gegensatz zu Variablen (let/var), deren Inhalt sich beliebig ändern kann." },
  { cat: "Variablen & Datentypen", q: "Was ist der Unterschied zwischen starker und schwacher (dynamischer) Typisierung?", a: "Starke Typisierung: der Datentyp einer Variable muss bei Deklaration explizit festgelegt werden und ist danach fix (z.B. Java) – schneller, kompakter, Fehler fallen früh auf. Schwache/dynamische Typisierung: der Datentyp wird automatisch beim Zuweisen eines Werts festgelegt und kann sich im Programmverlauf ändern (z.B. JavaScript) – einfacher und flexibler, aber fehleranfälliger." },
  { cat: "Variablen & Datentypen", q: "Welche wichtigen Datentypen kennt JavaScript?", a: "Number (Zahlen, keine Unterscheidung zwischen Integer und Fließkomma), String (Zeichenketten), Boolean (true/false), Object, sowie die Sonderformen undefined (kein Wert zugewiesen) und null (bewusst 'kein Wert')." },
  { cat: "Variablen & Datentypen", q: "Welche Regeln gelten für Variablennamen in JavaScript?", a: "Nicht erlaubt sind Leerzeichen, Satzzeichen, führende Ziffern sowie reservierte Schlüsselwörter (Token) wie var. Best Practice: nur a–z, A–Z, 0–9 und Unterstrich _ verwenden." },
  { cat: "Variablen & Datentypen", q: "Was passiert bei 'test' + 7 und bei '5' * 3 in JavaScript?", a: "'test' + 7 ergibt 'test7' (7 wird als Text interpretiert, Strings werden verkettet). '5' * 3 ergibt 15 (JavaScript interpretiert den String '5' erfolgreich als Zahl). Bei nicht interpretierbaren Strings wie 'test' * 3 entsteht NaN ('Not a Number')." },
  { cat: "Variablen & Datentypen", q: "Wie wandelt man einen String in JavaScript in eine Zahl um?", a: "Über Number(a) oder die Kurzform a * 1 bzw. a + 0 (Multiplikation/Rechenoperation zwingt JavaScript zur Zahlkonvertierung). Ist der String nicht als Zahl interpretierbar, ist das Ergebnis NaN, der Datentyp wird aber trotzdem auf Number gesetzt." },
  { cat: "Variablen & Datentypen", q: "Was sind Template Strings und wie schreibt man sie?", a: "Seit ES6 lassen sich Strings in Backticks ` ... ` schreiben, wobei Variablen/Ausdrücke direkt mit ${…} eingesetzt werden können, z.B. `${a} + ${b} = ${a + b}` – deutlich lesbarer als String-Verkettung mit +." },

  // Operatoren
  { cat: "Operatoren", q: "Was ist der Unterschied zwischen == und ===?", a: "== prüft nur auf gleichen Wert (Datentypen werden dabei ggf. umgewandelt), z.B. 4 == '4' ist true. === prüft auf Identität, also gleichen Wert UND gleichen Datentyp, z.B. 4 === '4' ist false." },
  { cat: "Operatoren", q: "Was bewirken die logischen Operatoren && und ||?", a: "&& (AND/logisches UND) ist nur dann true, wenn beide Aussagen true sind. || (OR/logisches ODER) ist true, wenn mindestens eine der beiden Aussagen true ist." },
  { cat: "Operatoren", q: "Was macht der Operator ! und wofür wird isNaN() benutzt?", a: "! (NOT) kehrt einen Wahrheitswert um (!true wird false). isNaN(wert) prüft, ob sich ein Wert NICHT als Zahl interpretieren lässt: liefert true bei Nicht-Zahlen, false bei Zahlen – häufig zur Kontrolle von Benutzereingaben genutzt." },
  { cat: "Operatoren", q: "Was ist der ternäre Operator und wie sieht seine Syntax aus?", a: "Eine Kurzschreibweise für eine einfache if-else-Anweisung mit drei Operanden: (Bedingung) ? Wert_wenn_true : Wert_wenn_false; Beispiel: (alter >= 16) ? freigabe = true : freigabe = false;" },
  { cat: "Operatoren", q: "Warum ist 'if (varEins = varZwei)' eine typische Fehlerquelle?", a: "Hier steht ein einfaches Gleichheitszeichen (=), das eine Zuweisung ist, keine Vergleichsabfrage (==). Die Zuweisung selbst hat (fast) immer den Wahrheitswert true, wodurch der else-Zweig nie erreicht wird – ein syntaktisch gültiger, aber logisch falscher Code." },

  // Kontrollstrukturen
  { cat: "Kontrollstrukturen", q: "Was ist der Unterschied zwischen einer kopfgesteuerten und einer fußgesteuerten Schleife?", a: "Kopfgesteuert (abweisend, z.B. while): die Bedingung wird VOR dem Schleifenrumpf geprüft – ist sie von Anfang an false, wird der Rumpf gar nicht durchlaufen. Fußgesteuert (annehmend, z.B. do-while): die Bedingung wird ERST NACH dem ersten Durchlauf geprüft – der Rumpf wird also immer mindestens einmal ausgeführt." },
  { cat: "Kontrollstrukturen", q: "Was gibt folgender Code aus: let x = 5; while (x < 5) { console.log(x); x++ }?", a: "Gar nichts – die Bedingung x < 5 ist von Anfang an false (x ist bereits 5), daher wird der Schleifenrumpf bei der kopfgesteuerten while-Schleife kein einziges Mal ausgeführt. x bleibt bei 5." },
  { cat: "Kontrollstrukturen", q: "Was gibt folgender Code aus: let x = 5; do { console.log(x); x++ } while (x < 5)?", a: "5 – die fußgesteuerte do-Schleife führt den Rumpf immer mindestens einmal aus, bevor die Bedingung geprüft wird. Danach ist x = 6, die Bedingung x < 5 ist false, die Schleife endet." },
  { cat: "Kontrollstrukturen", q: "Wie ist der Kopf einer for-Schleife aufgebaut?", a: "for (Initialisierung; Bedingung; Veränderung) { … } – z.B. for (let i = 0; i < 10; i++). Initialisierung setzt den Startwert des Zählers, die Bedingung bestimmt, wie lange wiederholt wird, und die Veränderung wird nach jedem Durchlauf ausgeführt (z.B. Zähler um 1 erhöhen)." },
  { cat: "Kontrollstrukturen", q: "Was ist der Unterschied zwischen == (Gleichheit) und !== (Ungleichheit mit Typ)?", a: "== prüft nur den Wert (mit Typumwandlung), != ist die entsprechende Negation. !== prüft dagegen, ob Wert ODER Datentyp unterschiedlich sind (Gegenstück zu ===) – 4 !== '4' ist also true, da die Datentypen unterschiedlich sind." },

  // Funktionen
  { cat: "Funktionen", q: "Was sind die zwei zentralen Vorteile von Funktionen?", a: "Sie erlauben modularisierten Code (komplexe Aufgaben werden in handliche, einzeln testbare Module aufgeteilt) und sie erlauben die mehrfache Ausführung identischer/ähnlicher Codebereiche, die nur einmal geschrieben werden müssen – das macht Code übersichtlicher, wartbarer und weniger fehleranfällig." },
  { cat: "Funktionen", q: "Was bedeutet 'Kapselung' bei Funktionen?", a: "Eine Funktion ist eine 'Black Box' mit definierten Ein- und Ausgängen: der Code innerhalb ist von außen nicht einsehbar, intern deklarierte Variablen sind von außen nicht ansprechbar. Der Datenaustausch läuft ausschließlich über definierte Schnittstellen (Parameter, Rückgabewert)." },
  { cat: "Funktionen", q: "Was ist der Unterschied zwischen Parametern und Argumenten?", a: "Parameter sind die Platzhalter für Werte in der Funktionsdefinition (z.B. function add(a, b)). Argumente sind die konkreten Werte, die beim Funktionsaufruf tatsächlich übergeben werden (z.B. add(7, 8) → 7 und 8 sind die Argumente)." },
  { cat: "Funktionen", q: "Was bewirkt return in einer Funktion?", a: "Es gibt einen Wert an den aufrufenden Code zurück und beendet sofort die Ausführung der Funktion – der Code danach wird nicht mehr erreicht. Es können mehrere return-Anweisungen in einer Funktion vorkommen (je nach Bedingung)." },
  { cat: "Funktionen", q: "Sind Variablen, die innerhalb einer Funktion mit let deklariert werden, auch außerhalb sichtbar?", a: "Nein – sie sind nur innerhalb der Funktion sichtbar (lokaler Gültigkeitsbereich). Eine gleichnamige Variable außerhalb der Funktion ist eine komplett andere, unabhängige Variable." },
  { cat: "Funktionen", q: "Wie können Parameter mit einem Standardwert vorbelegt werden?", a: "Direkt in der Funktionsdefinition, z.B. function add(a = 0, b = 0) { … }. Wird beim Aufruf kein Argument für diesen Parameter übergeben, wird automatisch der Standardwert verwendet." },
  { cat: "Funktionen", q: "Was ist eine anonyme Funktion / ein Funktionsausdruck (function expression)?", a: "Einer Variable/Konstante wird direkt der Funktionscode zugewiesen, ohne dass die Funktion selbst einen Namen bekommt, z.B. const add = function(a, b) { return a + b; }. Anonyme Funktionen werden nicht 'angehoben' (hoisting) und können erst nach ihrer Deklaration aufgerufen werden." },
  { cat: "Funktionen", q: "Wie schreibt man eine Arrow Function und wann kann man auf Klammern verzichten?", a: "Kurzschreibweise für einen Funktionsausdruck: const add = (a, b) => { return a + b; }. Besteht der Rumpf nur aus einem return, können die { } entfallen: const sub = (a,b) => a-b;. Bei genau einem Parameter können auch die () entfallen: const mal10 = a => a * 10;." },

  // Arrays
  { cat: "Arrays", q: "Wie greift man in JavaScript auf ein Element eines Arrays zu?", a: "Über einen Index in eckigen Klammern, der bei 0 beginnt, z.B. namen[0] liefert das erste Element. Ein Zugriff über einen nicht existierenden Index (z.B. namen[9] bei nur 3 Elementen) liefert undefined." },
  { cat: "Arrays", q: "Kann sich der Inhalt eines mit const definierten Arrays noch ändern?", a: "Ja – const macht nur den Verweis auf das Array konstant (das Array kann nicht durch ein komplett neues ersetzt werden), der Inhalt (einzelne Elemente) lässt sich dennoch beliebig ändern, z.B. playerOne[1] += 100;." },
  { cat: "Arrays", q: "Wie ermittelt man die Anzahl der Elemente eines Arrays und wie durchläuft man es?", a: "array.length liefert die Anzahl (genauer: höchster Index + 1), nutzbar als Zähler in einer for-Schleife. Alternativen: for...of ('nimm das nächste Element') oder forEach(), das eine Callback-Funktion auf jedes Element anwendet." },
  { cat: "Arrays", q: "Was ist der Unterschied zwischen einer for-Schleife/for...of und forEach() beim Durchlaufen von Arrays mit Lücken?", a: "for und for...of greifen auch auf Lücken im Array zu und liefern dort undefined. forEach() dagegen ignoriert nicht existierende (leere) Einträge komplett und wendet die Callback-Funktion nur auf tatsächlich vorhandene Elemente an." },
  { cat: "Arrays", q: "Wie greift man auf ein Element in einem mehrdimensionalen Array zu?", a: "Mit mehreren Indizes hintereinander, z.B. myArray[0][2] für das dritte Element (Index 2) des ersten Unterarrays (Index 0). Damit lassen sich z.B. Tabellen abbilden." },
  { cat: "Arrays", q: "Nenne 4 wichtige Array-Methoden und ihre Funktion.", a: "push(): fügt ein Element am Ende an. pop(): entfernt und liefert das letzte Element. unshift()/shift(): wie push/pop, aber am Anfang des Arrays. sort(): sortiert alphabetisch (Zahlen werden dabei als Strings behandelt!)." },

  // Klassen & Objekte
  { cat: "Klassen & Objekte", q: "Was ist der Unterschied zwischen einer Klasse und einem Objekt?", a: "Eine Klasse ist eine abstrakte Beschreibung ('Bauplan') mit den gemeinsamen Eigenschaften und Methoden aller Objekte dieses Typs – sie besitzt selbst keine konkreten Inhalte. Ein Objekt ist eine konkrete Instanz einer Klasse, abgeleitet über new, mit eigenen, individuellen Werten." },
  { cat: "Klassen & Objekte", q: "Was sind Eigenschaften und was Methoden eines Objekts?", a: "Eigenschaften (Attribute/Properties) beschreiben, was ein Objekt 'ist' oder 'hat' (z.B. 'der Apfel ist rot'). Methoden beschreiben, was ein Objekt 'kann' (z.B. 'das Auto kann beschleunigen') – Methoden sind letztlich die Funktionen eines Objekts." },
  { cat: "Klassen & Objekte", q: "Wie wird eine Klasse in JavaScript definiert und wie erzeugt man daraus ein Objekt?", a: "Mit class Name { constructor(...) { this.eigenschaft = wert; } }. Ein Objekt (eine Instanz) wird über das Schlüsselwort new erzeugt, z.B. const a1 = new Auto('VW', 'rot', 30.5); – die Werte werden dabei an den Constructor übergeben." },
  { cat: "Klassen & Objekte", q: "Was ist der Unterschied zwischen public und private Eigenschaften/Methoden?", a: "private Eigenschaften/Methoden sind nur innerhalb des Objekts lesbar/veränderbar (Schutz vor unkontrolliertem Zugriff von außen). public Eigenschaften/Methoden sind von außen erreichbar und bilden die Schnittstelle des Objekts. Faustregel: Eigenschaften möglichst private, Methoden meist public." },
  { cat: "Klassen & Objekte", q: "Was sind Getter und Setter?", a: "Methoden, über die kontrolliert auf private Eigenschaften zugegriffen wird, statt sie direkt zu manipulieren. Konvention: getEigenschaft() liest den Wert aus (Getter), setEigenschaft() setzt einen neuen Wert (Setter) – so behält das Objekt die volle Kontrolle darüber, wer was lesen/schreiben darf." },
  { cat: "Klassen & Objekte", q: "Wie funktioniert Vererbung in JavaScript und wofür wird super benutzt?", a: "Mit dem Schlüsselwort extends wird eine Kindklasse von einer Elternklasse (Basisklasse) abgeleitet und übernimmt deren Eigenschaften/Methoden, ergänzt um eigene. super() ruft im Constructor der Kindklasse den Constructor der Elternklasse auf, um deren Eigenschaften zu initialisieren." },
  { cat: "Klassen & Objekte", q: "Was ist der Unterschied zwischen einer abstrakten und einer konkreten Klasse?", a: "Konkrete Klassen lassen sich instanziieren, es können also Objekte von ihnen erzeugt werden (z.B. Rotwein). Abstrakte Klassen bilden keine eigenen Objekte, sondern dienen nur als Bauplan/Strukturelement für Unterklassen in der Klassenhierarchie (z.B. 'Alkoholisches Getränk')." },
  { cat: "Klassen & Objekte", q: "Wie werden Klassen in einem UML-Klassendiagramm notiert?", a: "In einem dreigeteilten Rechteck: oben der (meist großgeschriebene) Klassenname, in der Mitte die Eigenschaften, unten die Methoden. Ein Pluszeichen (+) markiert public, ein Minuszeichen (-) markiert private Elemente." },

  // Date & DOM
  { cat: "Date & DOM", q: "Wie erzeugt man in JavaScript ein Datumsobjekt für den aktuellen bzw. einen beliebigen Zeitpunkt?", a: "new Date() erzeugt ein Objekt mit dem aktuellen Datum/Uhrzeit. Für ein beliebiges Datum übergibt man Jahr, Monatsindex (beginnt bei 0!), Tag usw., z.B. new Date(1961, 2, 27) für den 27.3.1961, oder im ISO-Format new Date('2010-03-15')." },
  { cat: "Date & DOM", q: "Was ist das DOM (Document Object Model)?", a: "Eine vom Browser aus dem HTML-Code erzeugte, hierarchische Baumstruktur, in der jedes Element der Webseite einen exakt definierten Platz (Node) hat. Über JavaScript lässt sich das DOM komplett auslesen und verändern, was die angezeigte Webseite direkt beeinflusst." },
  { cat: "Date & DOM", q: "Was liefern document.querySelector() und document.querySelectorAll()?", a: "querySelector('selector') referenziert nur das erste Element, auf das der CSS-Selektor zutrifft. querySelectorAll('selector') referenziert ALLE zutreffenden Elemente und gibt sie als NodeList zurück (kein echtes Array, aber mit length und Index nutzbar)." },
  { cat: "Date & DOM", q: "Was ist der Unterschied zwischen innerHTML und textContent?", a: "innerHTML liest/schreibt den kompletten inneren HTML-Code eines Elements – enthaltener HTML-Code wird vom Browser gerendert. textContent behandelt den Inhalt dagegen als reinen Text; HTML-Code würde nicht gerendert, sondern als Text angezeigt (und ist i.d.R. schneller als innerHTML)." },

  // PHP Grundlagen
  { cat: "PHP Grundlagen", q: "Ist PHP eine client- oder serverseitige Sprache, und was bedeutet das?", a: "PHP ist serverseitig: der Code wird auf dem Server ausgeführt, nicht im Browser des Clients. Der Client sieht nur das fertige Ergebnis (HTML), der PHP-Quellcode selbst ist für ihn nicht einsehbar und kann von ihm auch nicht manipuliert oder unterbunden werden." },
  { cat: "PHP Grundlagen", q: "Wofür steht PHP und wer hat es entwickelt?", a: "Ursprünglich 'Personal HomePage Tools', heute rekursiv 'PHP Hypertext Preprocessor'. Entwickelt 1995 von Rasmus Lerdorf, angelehnt an C und Perl – heute die populärste Sprache für serverseitige, dynamische Websites (u.a. Basis von WordPress)." },
  { cat: "PHP Grundlagen", q: "Was passiert beim Abruf einer .php-Datei im Unterschied zu einer .html-Datei?", a: "Eine .html-Datei wird vom Webserver unverändert an den Client geschickt. Eine .php-Datei wird zuerst an den PHP-Interpreter übergeben, dort ausgeführt (kann z.B. auf Datenbanken zugreifen) – erst das erzeugte Ergebnis (reines HTML) wird an den Client gesendet." },
  { cat: "PHP Grundlagen", q: "Wie werden PHP-Anweisungen im Quellcode markiert und wie sieht die Notation aus?", a: "Mit <?php ... ?>, einsetzbar an beliebiger Stelle im HTML-Code. Variablen beginnen mit $, Statements enden zwingend mit Semikolon, Whitespace wird ignoriert, PHP ist case sensitive. Kommentare wie in JS: // bzw. /* ... */." },
  { cat: "PHP Grundlagen", q: "Welche Datentypen kennt PHP und wie werden sie zugewiesen?", a: "Integer, Float/Double, Boolean, String, Array, Object und NULL. PHP ist schwach typisierend – der Datentyp muss bei der Deklaration nicht angegeben werden, sondern ergibt sich automatisch aus dem zugewiesenen Wert." },
  { cat: "PHP Grundlagen", q: "Wie funktioniert Type Casting in PHP?", a: "Der gewünschte Zieltyp wird in Klammern vor die Variable gesetzt, z.B. (int) $var, (string) $var, (bool) $var, (float) $var. Wird häufig benötigt, um Benutzereingaben (immer vom Typ String) in Zahlen umzuwandeln." },
  { cat: "PHP Grundlagen", q: "Wie werden Strings in PHP verkettet, und worin unterscheidet sich das von JavaScript?", a: "In PHP werden Strings mit einem Punkt (.) verkettet, z.B. 'Das ist '.'ein Test'. Im Unterschied dazu wird in JavaScript für die String-Verkettung das Pluszeichen (+) verwendet." },
  { cat: "PHP Grundlagen", q: "Was macht echo in PHP?", a: "Gibt Inhalte (Text, Variablen, Berechnungsergebnisse) direkt in das Dokument aus, vergleichbar mit document.write() in JavaScript, allerdings ohne Klammern, z.B. echo 'Das ist ein Test'; oder echo \"7 + 3 = \", (7 + 3);." },

  // PHP Arrays
  { cat: "PHP Arrays", q: "Wie legt man ein Array in PHP an und greift auf Elemente zu?", a: "Mit der Funktion array(wert1, wert2, …) oder der Kurzform [wert1, wert2, …]. Der Zugriff erfolgt wie in JavaScript über einen bei 0 beginnenden Index, z.B. $zahlen[0]." },
  { cat: "PHP Arrays", q: "Was ist ein assoziatives Array in PHP?", a: "Ein Array, das statt eines numerischen Index frei wählbare Text-Schlüssel (Keys) verwendet, zugewiesen über key => value, z.B. $preise = array('1 Brot' => 2.55); – Zugriff dann über $preise['1 Brot']." },
  { cat: "PHP Arrays", q: "Wie durchläuft man ein Array in PHP mit for bzw. foreach?", a: "Mit for wird die Anzahl der Elemente über count($array) ermittelt und als Schleifenbedingung genutzt. Mit foreach($array as $wert) wird kein Index benötigt – bei assoziativen Arrays: foreach($array as $key => $wert), um sowohl Schlüssel als auch Wert zu erhalten." },

  // Formulare & GET/POST
  { cat: "Formulare & GET/POST", q: "Welche zwei Attribute sind bei <form> zentral, und was ist ihr Standardverhalten?", a: "method ('get' oder 'post') und action (Pfad zum Auswertungsscript). Fehlt method, wird automatisch get benutzt. Fehlt action, ruft das Formular sich selbst zur Auswertung auf." },
  { cat: "Formulare & GET/POST", q: "Was ist der zentrale Unterschied zwischen GET und POST?", a: "GET übergibt Daten sichtbar als URL-Parameter (einseh-/manipulierbar, als Bookmark speicherbar, begrenzter Umfang ~2048 Zeichen, nur ASCII). POST schickt Daten unsichtbar im Hintergrund als Teil des HTTP-Requests (nicht einfach einsehbar, nicht als Bookmark speicherbar, praktisch unbegrenzter Umfang, auch binäre Daten wie Uploads möglich)." },
  { cat: "Formulare & GET/POST", q: "Wie werden mehrere URL-Parameter bei GET notiert?", a: "Mit einem ? wird der erste Parameter an die URL angehängt, weitere Parameter werden mit & verbunden, jeweils als name=wert, z.B. index.php?name=Peter&alter=42." },
  { cat: "Formulare & GET/POST", q: "In welchen PHP-Variablen landen GET- bzw. POST-Daten, und wie greift man darauf zu?", a: "GET-Werte landen im assoziativen Array $_GET, POST-Werte in $_POST – jeweils mit dem Feld-/Parameternamen als Schlüssel, z.B. $_GET['a'] oder $_POST['vn']." },
  { cat: "Formulare & GET/POST", q: "Was prüfen isset() und empty() in PHP, und wozu werden sie gebraucht?", a: "isset($a) liefert true, wenn die Variable $a existiert und nicht NULL ist. empty($a) liefert true, wenn $a leer/nicht vorhanden ist (auch bei false, 0 oder leerem String). Beide werden benutzt, um GET-/POST-Variablen vor der Verarbeitung zu prüfen." },
  { cat: "Formulare & GET/POST", q: "Wie werden mehrere Auswahlmöglichkeiten (Checkboxen) als PHP-Array übergeben?", a: "Der name des Formularfelds erhält eckige Klammern, z.B. name='lw[]'. Nach dem Absenden existiert dann ein Array (z.B. $_POST['lw']), das alle ausgewählten value-Einträge in der Reihenfolge der Auswahl enthält." },

  // HTML
  { cat: "HTML", q: "Was ist HTML – und was ist es NICHT?", a: "HTML ist eine Auszeichnungssprache zur formalen Beschreibung der Gliederung/Struktur eines Dokuments. HTML ist KEINE Programmiersprache und KEINE Seitenbeschreibungssprache (wie z.B. Postscript) – das Aussehen/die Formatierung wird nicht in HTML, sondern in CSS beschrieben." },
  { cat: "HTML", q: "Aus welchen zwei Bereichen besteht ein HTML-Dokument, und was gehört jeweils hinein?", a: "Head/Kopf: Metadaten (Titel, Zeichensatz, Autor, Datum etc.), nicht sichtbar auf der Seite selbst. Body/Körper: der eigentliche, sichtbare Inhalt des Dokuments." },
  { cat: "HTML", q: "Welche zwei Angaben muss der <head>-Bereich für korrektes HTML5 zwingend enthalten?", a: "Den Seitentitel über <title>…</title> (wird in der Browser-Titelzeile angezeigt) und die Zeichensatzangabe über <meta charset='UTF-8'> (ohne schließendes Tag)." },
  { cat: "HTML", q: "Was ist der Unterschied zwischen Block- und Inline-Elementen?", a: "Block-Elemente erzeugen eigene Absätze und passen sich der Fensterbreite an (z.B. <p>, <div>). Inline-Elemente stehen innerhalb von Absätzen und markieren nur einzelne Bereiche, ohne einen eigenen Absatz zu erzeugen (z.B. <strong>, <span>)." },
  { cat: "HTML", q: "Welche drei Listenarten gibt es in HTML?", a: "Unordered List <ul> (unnummerierte Liste mit Bullet-Markierung), Ordered List <ol> (nummerierte Liste) und Description List <dl> (Beschreibungsliste aus Begriff <dt> und Erklärung <dd>, z.B. für Glossare). Einträge in <ul>/<ol> stehen jeweils in <li>." },
  { cat: "HTML", q: "Wie werden Links notiert und was bedeuten '../' bzw. '/' bei Pfadangaben?", a: "Mit <a href='ziel'>Text</a>. '../' bedeutet: eine Ebene über dem aktuellen Verzeichnis. Ein führendes '/' bedeutet: Pfad ab dem Root-Verzeichnis (oberstes Verzeichnis der Seite). Ohne diese Zeichen wird im selben Verzeichnis gesucht." },
  { cat: "HTML", q: "Wie bindet man ein Bild ein und wofür ist das alt-Attribut wichtig?", a: "Mit <img src='bild.png' alt='Beschreibung'> – ein Inline-Element ohne schließendes Tag. alt (alternate) zeigt einen Ersatztext, wenn das Bild nicht geladen werden kann, und ist außerdem wichtig für Barrierefreiheit/Screenreader." },
  { cat: "HTML", q: "Wie ist eine HTML-Tabelle aufgebaut?", a: "<table>…</table> als Rahmen, Reihen mit <tr>, Zellen mit <td> ('table data'), Kopfzellen mit <th> ('table head'). Mit colspan/rowspan lässt sich der Inhalt einer Zelle über mehrere Spalten bzw. Reihen erstrecken." },
  { cat: "HTML", q: "Was sind HTML-Entities, und wozu braucht man sie?", a: "Codierte Darstellungen für Sonderzeichen oder Zeichen, die der Browser sonst als Steuerzeichen interpretieren würde, z.B. &lt; für <, &amp; für &, &nbsp; für ein festes Leerzeichen. Sie beginnen mit & und enden mit ;, entweder als Name oder als numerischer Unicode-Wert (&#code;)." },
  { cat: "HTML", q: "Nenne einige semantische HTML5-Strukturelemente und ihre Bedeutung.", a: "<main> (Hauptbereich der Seite), <nav> (Navigation/Menü), <article> (abgeschlossener Beitrag), <section> (fasst Abschnitte zusammen), <header>/<footer> (Kopf-/Fußbereich), <aside> (Randleiste, z.B. Werbung) – im Gegensatz zum neutralen <div> tragen sie inhaltliche Bedeutung." },

  // CSS
