  { cat: "CSS", q: "Wie ist eine CSS-Anweisung aufgebaut?", a: "selektor { deklaration: wert; } – der Selektor wählt die Elemente aus, für die die Regel gilt; die Deklaration besteht aus Eigenschaft und Wert, getrennt durch Doppelpunkt, und endet mit Semikolon." },
  { cat: "CSS", q: "Auf welche drei Arten lässt sich CSS mit HTML verbinden?", a: "Extern über <link href='styles.css' rel='stylesheet'> im <head> (empfohlen, wiederverwendbar). Intern über <style>…</style> im <head> (gilt nur für dieses Dokument). Inline über das Attribut style='...' direkt am Element (nur für Tests, gilt nur für dieses eine Element)." },
  { cat: "CSS", q: "Was besagt die 'Kaskade' bei CSS-Konflikten?", a: "Je näher eine CSS-Regel an einem Element steht bzw. je spezifischer sie ist, desto eher überschreibt sie andere, weiter entfernte oder allgemeinere Regeln (Reihenfolge: Browser-Standard-CSS < externes CSS < <style> im Dokument < Inline-Style am Element)." },
  { cat: "CSS", q: "Was bedeutet 'Vererbung' bei CSS?", a: "Viele CSS-Eigenschaften (z.B. Schriftfarbe) gelten nicht nur für das Element, für das sie definiert wurden, sondern automatisch auch für alle darin enthaltenen (Kind-)Elemente – sofern diese die Eigenschaft nicht selbst explizit überschreiben." },
  { cat: "CSS", q: "Was ist der Unterschied zwischen einer Klasse (.name) und einer ID (#name) in CSS?", a: "Eine Klasse kann beliebig oft auf der Seite und auf mehreren Elementen gleichzeitig verwendet werden (Zuweisung über class, mehrere Klassen leerzeichengetrennt). Eine ID darf pro Seite nur genau einmal vergeben werden (Zuweisung über id) und dient der eindeutigen Ansprache eines einzelnen Elements – wichtig v.a. für JavaScript." },
  { cat: "CSS", q: "Was ist der Nachfahrenselektor und wie wird er notiert?", a: "Er filtert Elemente, die innerhalb bestimmter anderer Elemente stehen, notiert durch ein Leerzeichen zwischen den Selektoren, z.B. ul li { … } wirkt nur auf li-Elemente innerhalb eines ul (nicht auf li in einem ol)." },
  { cat: "CSS", q: "Aus welchen drei Bereichen besteht das CSS-Boxmodell?", a: "padding (Innenabstand zwischen Inhalt und Rand des Elements), border (der Rand/Rahmen selbst) und margin (Außenabstand zum nächsten Element). Reihenfolge bei Kurzschreibweise mit 4 Werten: oben – rechts – unten – links (im Uhrzeigersinn)." },
  { cat: "CSS", q: "Was bewirkt box-sizing: border-box?", a: "Standardmäßig beziehen sich width/height nur auf den Inhalt des Elements (padding und border kommen zusätzlich oben drauf). Mit box-sizing: border-box beziehen sich width/height dagegen auf das komplette Element inklusive padding und border." },
  { cat: "CSS", q: "Was ist der Unterschied zwischen position: relative und position: absolute?", a: "relative: das Element wird von seiner ursprünglichen Position aus verschoben, hinterlässt aber eine Lücke (der Platz bleibt reserviert). absolute: das Element wird komplett aus dem normalen Seitenfluss herausgenommen (keine Lücke), die Positionsangaben beziehen sich auf das nächste positionierte Elternelement (oder den Viewport)." },
  { cat: "CSS", q: "Was ist der Unterschied zwischen transition und animation in CSS?", a: "transition definiert nur den zeitlichen Übergang zwischen zwei Zuständen eines Elements (z.B. bei :hover) und muss durch ein Ereignis ausgelöst werden. animation (zusammen mit @keyframes) kann dagegen automatisch starten, beliebig lange laufen und mehrere Zwischenschritte definieren." },
  { cat: "CSS", q: "Wie funktioniert die Pseudoklasse :hover?", a: "Sie wird mit einem Doppelpunkt an einen Selektor angehängt (z.B. a:hover { … }) und trifft zu, sobald sich der Mauszeiger über dem betreffenden Element befindet – häufig genutzt, um z.B. bei Links Farbe oder Unterstreichung beim Überfahren zu ändern." },
];

const DECK_LINUX = [
  // Grundlagen & Historie
  { cat: "Grundlagen & Historie", q: "Was sind die charakteristischen Merkmale eines Linux-artigen Systems?", a: "Trennung von Kernel und Userspace-Programmen, modularer Aufbau (Unix-Philosophie: kleine Programme, die eine Sache gut machen), das Prinzip 'alles ist eine Datei', Multiuser von Anfang an mit klarer Trennung root vs. normale Nutzer, sowie Open Source (freier Quellcode)." },
  { cat: "Grundlagen & Historie", q: "Wie ist Unix entstanden und was ist BSD?", a: "Unix entstand Ende der 1960er in den Bell Laboratories von AT&T (Ken Thompson, Dennis Ritchie). 1977 entstand an der Universität Berkeley eine Abspaltung namens BSD (Berkeley Software Distribution) – von Anfang an frei verfügbar, Grundlage von FreeBSD/OpenBSD/NetBSD, brachte u.a. TCP/IP-Netzwerk sowie die Tools vi und grep hervor." },
  { cat: "Grundlagen & Historie", q: "Wie und wann entstand Linux, und warum nicht einfach BSD nutzen?", a: "Linus Torvalds begann Linux 1991 als Studentenprojekt in Helsinki – zunächst nur der Kernel, kein vollständiges Betriebssystem. Er wollte ein offenes, kostenloses System für PC-Hardware schaffen. BSD war zwar ebenfalls frei, litt aber Anfang der 90er unter rechtlicher Unsicherheit – ein neu geschriebener Kernel wirkte klarer und verbreitete sich schnell." },
  { cat: "Grundlagen & Historie", q: "Woher kommt der Name 'Linux' und was ist Tux?", a: "Linux setzt sich aus 'Linus' (Torvalds) und 'Unix' zusammen. Tux, der Linux-Pinguin, wurde 1996 von Larry Ewing mit GIMP entworfen – Torvalds wollte einen zufriedenen Pinguin als Logo, inspiriert von einem Zoobesuch." },
  { cat: "Grundlagen & Historie", q: "Wann wurde der Linux-Quellcode Open Source, unter welcher Lizenz, und was bedeutet 'Free Software'?", a: "1992 wurde der Quellcode unter der GPL (GNU General Public License) veröffentlicht – frei nutzbar, veränderbar und weiterverteilbar. 'Free Software' bedeutet laut Richard Stallman 'free as in freedom, not as free beer': es geht um die Freiheit zu nutzen, verändern und weitergeben, nicht zwingend um Kostenlosigkeit." },
  { cat: "Grundlagen & Historie", q: "Was ist eine Linux-Distribution und nenne 3 Beispiele mit ihrem jeweiligen Schwerpunkt.", a: "Eine Distribution ist eine Sammlung von Softwarepaketen inkl. Linux-Kernel und Anwendungen, jeweils für bestimmte Einsatzgebiete optimiert. Beispiele: Ubuntu LTS (Langzeit-Support, Server/Unternehmen), Arch Linux (immer neueste Pakete, Rolling Release), Kali Linux (Penetrationstests/IT-Sicherheit), Debian (besonders stabil, konservative Entwicklung)." },
  { cat: "Grundlagen & Historie", q: "Wonach sind Debian-Versionen benannt?", a: "Nach Charakteren aus Toy Story (z.B. Debian 12 'Bookworm', Debian 11 'Bullseye'), mit Ausnahme von Debian 5 'Etch', das auf die Zeichentafel 'Etch A Sketch' anspielt statt auf einen Toy-Story-Charakter." },
  { cat: "Grundlagen & Historie", q: "Wo wird Linux heute überall eingesetzt?", a: "Vor allem auf Servern (Web-, DNS-, Dateiserver), aber auch auf Desktops/Laptops, Routern und Switches, Industrie-PCs, Embedded-Systemen (Smart-TVs, Kassensysteme), mobilen Geräten, Cloud-/Container-Plattformen und nahezu allen Supercomputern." },

  // Shell & Befehle
  { cat: "Shell & Befehle", q: "Was ist die Shell und was bedeutet der Name?", a: "Die Shell ist ein Programm zur Eingabe und Ausführung von Befehlen – die Schnittstelle zwischen Benutzer und Betriebssystem. 'Shell' bedeutet 'Hülle' und beschreibt die Schicht um den Betriebssystemkern." },
  { cat: "Shell & Befehle", q: "Was ist die Bash und woher kommt der Name?", a: "Bash = Bourne Again Shell, ein Wortspiel zur ursprünglichen Bourne Shell (sh) von Stephen Bourne – 'Bourne Again' verweist darauf, dass Bash eine moderne, erweiterte Version davon ist. Sie ist die Standard-Shell in vielen Distributionen (z.B. Debian) und merkt sich u.a. die Befehlshistorie sowie Tab-Vervollständigung." },
  { cat: "Shell & Befehle", q: "Was bedeuten die Zeichen $ und # als Shell-Prompt?", a: "$ zeigt an, dass ein normaler Benutzer angemeldet ist. # zeigt an, dass Root-Rechte vorliegen (Root-Benutzer). Beide Zeichen sind nicht Teil des eingegebenen Befehls, sondern zeigen nur, dass die Shell eingabebereit ist." },
  { cat: "Shell & Befehle", q: "Was bewirken die Umleitungsoperatoren > und >>, und was der Pipe-Operator |?", a: "> überschreibt den Inhalt der Zieldatei mit der Ausgabe eines Befehls, >> hängt die Ausgabe ans Dateiende an. | (Pipe) leitet dagegen die Ausgabe eines Befehls direkt als Eingabe an den nächsten Befehl weiter, statt sie in eine Datei zu schreiben – so lassen sich Befehle zu Verarbeitungsketten verbinden." },
  { cat: "Shell & Befehle", q: "Was machen die Befehle ls, cat und touch, und woher kommen ihre Namen?", a: "ls (list) listet Dateien/Verzeichnisse auf – einer der ersten Unix-Befehle. cat (concatenate) zeigt Dateiinhalte an, ursprünglich zum Zusammenfügen mehrerer Dateien gedacht (cat datei1 datei2 > zusammen.txt). touch legt eine leere Datei an oder aktualisiert nur ihren Zeitstempel ('berührt' die Datei, ohne sie zu ändern)." },
  { cat: "Shell & Befehle", q: "Was ist der Unterschied zwischen cp, mv und rm?", a: "cp (copy) kopiert Dateien/Verzeichnisse, das Original bleibt erhalten. mv (move) verschiebt sie (keine Kopie) und kann auch zum Umbenennen genutzt werden. rm (remove) löscht Dateien dauerhaft." },
  { cat: "Shell & Befehle", q: "Wie sind Befehlsoptionen aufgebaut, und was ist der Unterschied zwischen Kurz- und Langoptionen?", a: "Syntax: <befehl> [optionen] [argumente]. Kurzoptionen haben einen Bindestrich und können kombiniert werden (z.B. -la = -l -a). Langoptionen haben zwei Bindestriche (z.B. --verbose, --recursive) und sind ausführlicher lesbar, bewirken aber dasselbe wie die entsprechende Kurzoption." },
  { cat: "Shell & Befehle", q: "Was ist der Unterschied zwischen man und --help?", a: "man (manual) öffnet ein ausführliches Handbuch mit Erklärungen, Beispielen und Hintergrundinfos (Beenden mit q, Suche mit / vorwärts bzw. ? rückwärts). --help zeigt nur eine kurze Übersicht der wichtigsten Optionen. Empfehlung: man bevorzugen, da ausführlicher." },
  { cat: "Shell & Befehle", q: "Was bewirken die ls-Optionen -l, -a, -i, -s und -h?", a: "-l (long format): ausführliche Anzeige mit Rechten, Größe, Datum. -a (all): zeigt auch versteckte Dateien. -i: zeigt die Inode-Nummer. -s (size): Dateigröße in Blöcken. -h (human readable): Größen besser lesbar (KB/MB/GB)." },
  { cat: "Shell & Befehle", q: "Was macht ein Alias, und wie wird er dauerhaft gespeichert?", a: "Mit alias kurzerName='langerBefehl' lassen sich lange Befehle abkürzen (z.B. alias ll='ls -l --color=auto'). Im Terminal erstellte Aliase gelten nur für die aktuelle Sitzung; dauerhaft werden sie in ~/.bashrc eingetragen und mit source ~/.bashrc neu geladen (oder neues Terminal öffnen)." },
  { cat: "Shell & Befehle", q: "Was ist der Unterschied zwischen den Texteditoren vi, vim, nano und emacs?", a: "vi: klassischer Editor, fast überall vorinstalliert, aber ungewohnte Bedienung. vim (vi improved): alle vi-Funktionen plus Syntax-Highlighting, Undo u.a., nicht immer vorinstalliert. nano: sehr einfach für Einsteiger, aber weniger mächtig. emacs: extrem mächtiger Alleskönner, aber komplex zu lernen." },
  { cat: "Shell & Befehle", q: "Was ist SSH und warum wird es telnet vorgezogen?", a: "SSH (Secure Shell) baut eine verschlüsselte Verbindung zu einem entfernten Rechner auf, auf dem ein SSH-Server läuft – dadurch lässt sich das System fernsteuern, als säße man direkt davor. Es ersetzt unsicheres telnet, weil alle Daten (Passwörter, Befehle, Ausgaben) verschlüsselt übertragen werden." },
  { cat: "Shell & Befehle", q: "Wie lautet die Grundsyntax für eine SSH-Verbindung, und was bewirken -p und -i?", a: "ssh benutzername@server (Benutzername kann entfallen, wenn er lokal und remote gleich ist). -p <port>: Verbindung über einen anderen Port als Standard 22. -i <datei>: verwendet eine bestimmte private SSH-Schlüsseldatei (identity file)." },

  // Rechte & Root
  { cat: "Rechte & Root", q: "Was ist der Unterschied zwischen su und sudo?", a: "su (substitute/switch user) wechselt komplett in eine Root-Shell und benötigt das Root-Passwort. sudo (substitute user do) führt einen einzelnen Befehl mit Root-Rechten aus, ohne dauerhaft in eine Root-Sitzung zu wechseln – dabei wird protokolliert, wer was ausgeführt hat." },
  { cat: "Rechte & Root", q: "Wie wird ein Benutzer für sudo freigeschaltet, und wie entzieht man die Rechte wieder?", a: "usermod -aG sudo <benutzer> fügt den Benutzer der sudo-Gruppe hinzu (Neuanmeldung nötig). usermod -rG sudo <benutzer> entfernt ihn wieder aus der Gruppe. Alternativ lassen sich mit visudo -f /etc/sudoers.d/<benutzer> auch nur einzelne Befehle gezielt erlauben." },
  { cat: "Rechte & Root", q: "Warum sollten sudoers-Dateien immer mit visudo bearbeitet werden?", a: "visudo prüft die Syntax vor dem Speichern und sperrt die Datei gegen gleichzeitige Bearbeitung – fehlerhafte Einträge in den sudoers-Dateien könnten sonst die gesamte sudo-Nutzung blockieren. Der Name kommt historisch vom Editor vi, es wird aber je nach System auch nano o.ä. geöffnet." },
  { cat: "Rechte & Root", q: "Welche drei Standardrechte gibt es unter Linux und wie werden sie mit ls -l dargestellt?", a: "Read (r): lesen, Write (w): ändern/schreiben, Execute (x): ausführen. Sie werden in ls -l als z.B. -rw-rw-r-- dargestellt: erstes Zeichen = Dateityp, danach je 3 Zeichen für Eigentümer, Gruppe und Andere." },
  { cat: "Rechte & Root", q: "Wie berechnet man die oktale Schreibweise von Rechten, z.B. rwx?", a: "r=4, w=2, x=1, die Summe ergibt die Ziffer: rwx=4+2+1=7, rw-=6, r-x=5, -wx=3. Die drei Ziffern stehen immer in der Reihenfolge Eigentümer – Gruppe – Andere, z.B. chmod 755 = rwxr-xr-x." },
  { cat: "Rechte & Root", q: "Was ist der Unterschied zwischen oktaler und symbolischer chmod-Schreibweise?", a: "Oktal setzt den kompletten Rechtezustand neu (z.B. chmod 755 datei). Symbolisch ändert gezielt einzelne Rechte für u (user), g (group), o (others) oder a (all) mit + / - / =, z.B. chmod u+x datei fügt nur dem Eigentümer das Ausführungsrecht hinzu, der Rest bleibt unverändert." },
  { cat: "Rechte & Root", q: "Was ist der Unterschied zwischen chown und chgrp?", a: "chown (change owner) ändert den Eigentümer (optional gleichzeitig auch die Gruppe: chown eigentümer:gruppe datei) und erfordert i.d.R. Root-Rechte. chgrp (change group) ändert nur die Gruppenzugehörigkeit; ein normaler Benutzer kann das nur für eigene Dateien und nur zu Gruppen, in denen er selbst Mitglied ist." },
  { cat: "Rechte & Root", q: "Was ist die umask, und was bewirkt umask 022?", a: "Die umask (user mask) legt fest, welche Rechte bei neu erstellten Dateien/Verzeichnissen standardmäßig entfernt werden. Ausgangsrechte sind 666 für Dateien und 777 für Verzeichnisse. Bei umask 022 werden Schreibrechte für Gruppe und Andere entfernt: Dateien werden 644 (rw-r--r--), Verzeichnisse 755 (rwxr-xr-x)." },
  { cat: "Rechte & Root", q: "Was bewirkt das Sticky Bit, und wo wird es typischerweise eingesetzt?", a: "Es erlaubt gemeinsames Schreiben in ein Verzeichnis, schützt aber fremde Dateien vor Löschen/Umbenennen durch andere – nur Dateibesitzer, Verzeichnisbesitzer oder Root dürfen das. Klassisches Beispiel: /tmp (angezeigt als abschließendes t in ls -l, z.B. drwxrwxrwt)." },
  { cat: "Rechte & Root", q: "Was bewirkt SetGID auf einem Verzeichnis, und was SetUID bei einem Programm?", a: "SetGID (Verzeichnis): neu angelegte Dateien/Unterverzeichnisse erben automatisch die Gruppe des Verzeichnisses statt der primären Gruppe des Erstellers – nützlich für gemeinsame Projektordner. SetUID (Programm): das Programm läuft mit den Rechten seines Besitzers statt des aufrufenden Benutzers, z.B. passwd (gehört root, damit normale Nutzer /etc/shadow ändern können)." },
  { cat: "Rechte & Root", q: "Wie erkennt man Sticky Bit, SetGID und SetUID in der Ausgabe von ls -l?", a: "Sticky Bit steht als t an der letzten Stelle (Andere-Ausführen), z.B. drwxrwxrwt. SetGID zeigt sich als s an der 7. Stelle (Gruppe-Ausführen), z.B. drwxr-sr-x. SetUID zeigt sich als s an der 4. Stelle (Eigentümer-Ausführen), z.B. -rwsr-xr-x." },
  { cat: "Rechte & Root", q: "Was besagt das Principle of Least Privilege (PoLP), und wie unterscheidet es sich von Zero Trust?", a: "PoLP: Benutzer und Prozesse erhalten nur die Rechte, die sie wirklich benötigen – weniger Rechte bedeuten geringeres Sicherheitsrisiko. Zero Trust ist umfassender: es beinhaltet PoLP, ergänzt aber zusätzlich das Prinzip der ständigen Verifizierung jedes Zugriffs ('Vertraue nichts automatisch')." },

  // Verzeichnisse & Pfade
  { cat: "Verzeichnisse & Pfade", q: "Was ist der Unterschied zwischen der Linux- und der Windows-Verzeichnisstruktur?", a: "Linux hat nur eine einzige Wurzel /, unter der alle Dateien und Laufwerke hängen. Windows hat mehrere Wurzeln – jedes Laufwerk (C:\\, D:\\ usw.) bildet eine eigene Wurzel." },
  { cat: "Verzeichnisse & Pfade", q: "Wofür stehen /etc, /usr und /var?", a: "/etc (et cetera): systemweite Konfigurationsdateien. /usr (historisch 'user', heute Systemprogramme/Ressourcen wie /usr/bin, /usr/lib): durch die Paketverwaltung installierte, systemweite Software. /var (variable): dynamische, sich im Betrieb ändernde Daten wie Logs (/var/log) oder Cache (/var/cache)." },
  { cat: "Verzeichnisse & Pfade", q: "Was ist der historische Unterschied zwischen /bin bzw. /sbin und /usr, und was ist 'usrmerge'?", a: "/bin und /sbin enthielten historisch die essenziellen Befehle fürs Booten/den Rettungsmodus (/sbin für Admin-Befehle). /usr enthält systemweite 'Userland'-Software. Bei 'usrmerge' sind /bin und /sbin auf modernen Systemen nur noch Symlinks auf /usr/bin bzw. /usr/sbin – inhaltlich gibt es dann keinen echten Unterschied mehr." },
  { cat: "Verzeichnisse & Pfade", q: "Was sind /dev, /proc und /sys, und warum heißen sie 'virtuelle Verzeichnisse'?", a: "Sie werden beim Systemstart vom Kernel dynamisch im Arbeitsspeicher erzeugt statt auf der Festplatte zu liegen. /dev enthält Gerätedateien, /proc Informationen zu laufenden Prozessen, /sys Kernel- und Hardware-Schnittstellen. Trotzdem lassen sie sich mit normalen Tools wie cat oder ls lesen, da 'fast alles eine Datei ist'." },
  { cat: "Verzeichnisse & Pfade", q: "Was ist der Unterschied zwischen /tmp und /run?", a: "/tmp enthält temporäre Dateien, die meist beim Neustart gelöscht werden. /run enthält ebenfalls Laufzeitdaten seit dem letzten Start (z.B. PID-Dateien, Sockets von Diensten), ist aber – im Gegensatz zu den rein virtuellen /proc und /sys – ein Ort für echte temporäre Dateien, die von Programmen tatsächlich abgelegt werden." },
  { cat: "Verzeichnisse & Pfade", q: "Was ist der Filesystem Hierarchy Standard (FHS)?", a: "Ein Standard, an dem sich die meisten Linux-Distributionen orientieren: er legt fest, welche Standardverzeichnisse es gibt und wofür sie vorgesehen sind – dadurch sind Systeme unterschiedlicher Distributionen leichter zu administrieren und zu verstehen." },
  { cat: "Verzeichnisse & Pfade", q: "Was ist der Unterschied zwischen relativen und absoluten Pfaden?", a: "Relative Pfade beziehen sich auf das aktuelle Arbeitsverzeichnis und können je nach Standort auf unterschiedliche Ziele zeigen (z.B. ls -l ../../). Absolute Pfade beginnen immer an der Wurzel / und sind unabhängig vom aktuellen Verzeichnis eindeutig (z.B. ls -l /home/stephan/Musik)." },
  { cat: "Verzeichnisse & Pfade", q: "Wofür stehen pwd, die Tilde (~) und die Verzeichniszeiger . und ..?", a: "pwd (print working directory) gibt den absoluten Pfad des aktuellen Verzeichnisses aus. ~ ist eine Abkürzung für das Home-Verzeichnis des angemeldeten Benutzers (bei root: /root statt /home/root). . verweist auf das aktuelle Verzeichnis, .. auf das übergeordnete Verzeichnis." },
  { cat: "Verzeichnisse & Pfade", q: "Wie sucht man mit find nach Dateien, und welche Kriterien gibt es?", a: "find <startpunkt> <optionen> durchsucht das Dateisystem live ab einem Startpunkt, z.B. find /etc -type f -name '*.conf'. Wichtige Kriterien: -name/-iname (Name, mit/ohne Beachtung von Groß-/Kleinschreibung), -type f/d/l (Dateityp), -size, -user, -group, -mtime/-atime (Änderungs-/Zugriffszeit), -perm (Rechte)." },
  { cat: "Verzeichnisse & Pfade", q: "Was ist der Unterschied zwischen find und locate?", a: "find durchsucht das Dateisystem live und kann nach vielen Kriterien suchen (Größe, Typ, Besitzer usw.), ist aber langsamer. locate sucht nur nach Dateinamen, dafür extrem schnell, weil es über eine vorgenerierte Datenbank arbeitet – diese muss aber regelmäßig mit updatedb aktualisiert werden, sonst werden neue/verschobene Dateien nicht gefunden." },
  { cat: "Verzeichnisse & Pfade", q: "Was ist der Unterschied zwischen einem symbolischen Link und einem Hardlink?", a: "Ein symbolischer Link verweist nur auf den Pfad einer Datei (wie eine Windows-Verknüpfung) und wird ungültig, wenn das Ziel gelöscht/verschoben wird; er kann auch auf Verzeichnisse und über Dateisystemgrenzen hinweg zeigen. Ein Hardlink ist ein zweiter echter Dateiname für denselben Dateiinhalt, bleibt auch beim Löschen des anderen Namens gültig, funktioniert aber nur innerhalb desselben Dateisystems und normalerweise nicht für Verzeichnisse." },

  // Bootprozess
  { cat: "Bootprozess", q: "Woher kommt der Begriff 'Booten', und welche Hauptkomponenten arbeiten beim Bootprozess zusammen?", a: "Booten ist die Kurzform von 'Bootstrap Loading' – eine Metapher für ein System, das sich 'am eigenen Stiefelriemen' aus eigener Kraft hochzieht. Zusammenarbeitende Komponenten: Firmware (BIOS/UEFI), Speichermedien, Linux-Kernel und das Init-/Startsystem (z.B. systemd)." },
  { cat: "Bootprozess", q: "Was macht das BIOS, und wo an seine Grenzen stößt es bei moderner Hardware?", a: "BIOS (Basic Input/Output System) ist das erste Programm eines klassischen PCs: es initialisiert die Hardware (POST – Power-On Self Test) und startet den Bootloader. Es stammt von 1981 und kann u.a. keine Festplatten über 2 TB booten, keine NVMe-SSDs nutzen und bietet keine modernen Remote-Management-Funktionen." },
  { cat: "Bootprozess", q: "Was ist UEFI, und welche wichtigen Sicherheitsfeatures bringt es mit?", a: "UEFI (Unified Extensible Firmware Interface) ist der moderne BIOS-Nachfolger: erweiterbar, mit eigener Shell, Unterstützung großer Datenträger/Partitionen. Wichtige Features: Secure Boot (prüft die Bootkette auf signierte Software) und TPM-Unterstützung (Trusted Platform Module)." },
  { cat: "Bootprozess", q: "Was macht Secure Boot, und was ist Shim?", a: "Secure Boot stellt sicher, dass beim Systemstart nur signierte (vertrauenswürdige) Bootsoftware geladen wird – Schutz vor manipulierten Bootloadern. Shim ist ein kleiner, von Microsoft signierter Loader, der zwischen Secure Boot und GRUB vermittelt, damit auch nicht von Microsoft signierte Linux-Bootloader unter Secure Boot starten können." },
  { cat: "Bootprozess", q: "Was ist ein TPM (Trusted Platform Module)?", a: "Ein Sicherheitschip, der Schlüssel und sensible Daten sicher speichert, eigene kryptografische Schlüssel erzeugen kann und dafür sorgt, dass ein System nicht unbemerkt verändert wird – genutzt u.a. für Secure Boot, Festplattenverschlüsselung und Systemintegrität. Aktueller Standard ist TPM 2.0." },
  { cat: "Bootprozess", q: "Was ist der Unterschied zwischen MBR und GPT?", a: "MBR (Master Boot Record): klassisches Partitionsschema, 512 Byte, erster Sektor, max. 4 primäre Partitionen, max. Partitionsgröße ca. 2 TiB. GPT (GUID Partition Table): moderner UEFI-Nachfolger, unterstützt bis zu 128 Partitionen und bis zu 8 ZiB Größe, mit redundanter Partitionstabelle am Ende des Datenträgers." },
  { cat: "Bootprozess", q: "Woran erkennt man einen gültigen MBR-Bootsektor?", a: "An der Magic Number: die letzten 2 Bytes des MBR sind immer 0x55 und 0xAA – dieses feste Binärmuster verhindert, dass zufällige Daten fälschlich als Bootsektor interpretiert werden." },
  { cat: "Bootprozess", q: "Was ist GRUB, und wo liegen seine Konfigurationsdateien?", a: "GRUB (Grand Unified Bootloader) findet den Linux-Kernel (vmlinuz) und startet ihn, übergibt Kernel-Parameter und kann auch andere Betriebssysteme starten. Konfiguriert wird er über /etc/default/grub (von update-grub in /boot/grub/grub.cfg übersetzt – diese Datei nie manuell bearbeiten)." },
  { cat: "Bootprozess", q: "Was passiert nach dem Laden des Kernels bis zum fertig gestarteten System (4 Schritte)?", a: "1) Kernel und initramfs werden in den RAM geladen und der Kernel entpackt/initialisiert sich. 2) Der Kernel erkennt und initialisiert Hardware/Treiber. 3) Das Root-Dateisystem wird eingebunden (ggf. vorher geprüft/repariert). 4) Der Kernel übergibt an das init-System (meist systemd, PID 1), das Dienste und Login-Möglichkeiten startet." },
  { cat: "Bootprozess", q: "Was ist der Unterschied zwischen SysVinit (init.d) und systemd?", a: "SysVinit startet Dienste nacheinander über Shell-Skripte in fester Reihenfolge – einfach und nachvollziehbar, aber langsamer und mit begrenzter Abhängigkeitsverwaltung. systemd verwaltet Dienste als Units, kann viele parallel starten (schnellerer Boot), berücksichtigt Abhängigkeiten automatisch und sammelt Logs zentral über journald (abrufbar mit journalctl)." },

  // Festplatten & RAID
  { cat: "Festplatten & RAID", q: "Wie werden Festplatten unter Linux benannt, im Unterschied zu Windows-Laufwerksbuchstaben?", a: "Als Gerätedateien im Verzeichnis /dev, z.B. /dev/sda (ganze Festplatte), /dev/sda1 (erste Partition), /dev/nvme0n1 (NVMe-SSD) bzw. /dev/nvme0n1p1 (erste Partition davon) – statt Laufwerksbuchstaben wie C: oder D:." },
  { cat: "Festplatten & RAID", q: "Was ist der Unterschied zwischen HDD, SSD (SATA) und NVMe-SSD?", a: "HDD: klassische mechanische Festplatte mit rotierenden Magnetscheiben, günstig aber langsam. SSD: elektronischer Speicher ohne bewegliche Teile, schnell, meist über SATA angebunden. NVMe-SSD: nutzt das PCIe-Interface und ein für SSDs optimiertes Protokoll – deutlich schneller als SATA-SSDs." },
  { cat: "Festplatten & RAID", q: "Welche vier Schritte sind nötig, um eine neue Partition dauerhaft nutzbar zu machen?", a: "1) Partitionieren (z.B. mit fdisk). 2) Dateisystem erstellen (z.B. mkfs.ext4). 3) Mounten (Einhängen in den Verzeichnisbaum, z.B. unter /mnt/data). 4) Automatisch einbinden per Eintrag in /etc/fstab, damit es auch nach einem Neustart eingehängt wird." },
  { cat: "Festplatten & RAID", q: "Was ist der Unterschied zwischen fdisk und parted?", a: "fdisk: klassisches, interaktives Terminal-Tool zur manuellen Partitionierung, unterstützt MBR und GPT. parted: flexibler, erlaubt präzise Größenangaben und kann nicht-interaktiv (skriptbar) genutzt werden – gut für Automatisierung und große Datenträger." },
  { cat: "Festplatten & RAID", q: "Was steht in /etc/fstab, und warum wird die UUID statt des Gerätenamens empfohlen?", a: "/etc/fstab (file system table) legt fest, welche Dateisysteme beim Systemstart automatisch eingebunden werden (Gerät/UUID, Mountpoint, Dateisystemtyp, Optionen, Prüfreihenfolge). Die UUID ist zuverlässiger als /dev/sda1, weil sich Gerätenamen ändern können, wenn Datenträger in anderer Reihenfolge erkannt werden – die UUID bleibt dagegen stabil." },
  { cat: "Festplatten & RAID", q: "Was ist ein Journaling-Dateisystem, und nenne zwei Beispiele.", a: "Es merkt sich vor Änderungen in einem 'Notizbuch' (Journal), was gleich passieren soll. Bei einem Absturz kann das System im Journal nachschauen und offene Änderungen abschließen oder verwerfen – das hält das Dateisystem konsistent. Beispiele: ext4 und XFS." },
  { cat: "Festplatten & RAID", q: "Was bedeutet Copy-on-Write, und was sind btrfs-Subvolumes?", a: "Copy-on-Write: geänderte Daten werden nicht überschrieben, sondern an eine neue Stelle geschrieben – die alten Daten bleiben zunächst erhalten (ermöglicht Snapshots). btrfs-Subvolumes sind eigene, flexible Bereiche innerhalb eines btrfs-Dateisystems, die sich – anders als feste Partitionen – den gemeinsamen Speicherplatz teilen." },
  { cat: "Festplatten & RAID", q: "Wofür stehen RAID und was sind die drei Hauptgründe für seinen Einsatz?", a: "RAID = Redundant Array of Independent Disks. Gründe: höhere Ausfallsicherheit/Verfügbarkeit (Daten bleiben bei Festplattenausfall verfügbar), mehr Geschwindigkeit (parallele Zugriffe) und größere logische Laufwerke (mehrere physische Platten erscheinen als ein Laufwerk)." },
  { cat: "Festplatten & RAID", q: "Warum ist RAID kein Ersatz für ein Backup?", a: "RAID schützt nur vor Hardwareausfall, nicht aber vor versehentlichem Löschen, Malware/Ransomware, Fehlkonfiguration oder physischer Zerstörung (Feuer, Diebstahl, Wasserschaden). Ein Backup bleibt daher trotzdem notwendig." },
  { cat: "Festplatten & RAID", q: "Was sind die Kerneigenschaften von RAID 0, RAID 1 und RAID 5?", a: "RAID 0 (Striping): max. Geschwindigkeit, keine Redundanz – ein Ausfall zerstört den ganzen Verbund. RAID 1 (Mirroring): Daten werden gespiegelt, 1 Platte darf ausfallen, aber nur die Hälfte des Speichers nutzbar. RAID 5 (verteilte Parität, min. 3 Platten): guter Kompromiss aus Speicherplatz, Geschwindigkeit und Ausfallsicherheit (1 Platte darf ausfallen)." },
  { cat: "Festplatten & RAID", q: "Was unterscheidet RAID 6 von RAID 5, und was ist RAID 10?", a: "RAID 6 speichert zwei unabhängige Paritätsinformationen pro Stripe (min. 4 Platten) – bis zu 2 Platten dürfen ausfallen, dafür langsamer beim Schreiben und weniger nutzbarer Speicher als RAID 5. RAID 10 (= RAID 1+0, min. 4 Platten) kombiniert Spiegelung und Striping: schnell und ausfallsicher, aber nur ca. 50% Kapazität nutzbar." },
  { cat: "Festplatten & RAID", q: "Was ist Parität bei RAID, und was ist ein Rebuild?", a: "Parität ist eine zusätzliche Kontrollinformation, aus der bei Ausfall einer Platte die fehlenden Daten rechnerisch (z.B. per XOR) wiederhergestellt werden können. Ein Rebuild ist der Wiederherstellungsprozess: die fehlenden Daten werden aus den übrigen Daten und der Parität neu berechnet und auf eine Ersatzplatte geschrieben – dabei sind die verbleibenden Platten stark belastet und ein weiterer Ausfall während des Rebuilds kann bei RAID 5 den ganzen Verbund zerstören." },
  { cat: "Festplatten & RAID", q: "Was ist mdadm, und wie heißen Software-RAID-Geräte unter Linux?", a: "mdadm (multiple devices administration) ist das zentrale Linux-Werkzeug zum Erstellen, Verwalten und Überwachen von Software-RAIDs. Ein Software-RAID erscheint als eigenes Blockgerät, z.B. /dev/md0 – der Gerätename verrät dabei nichts über das verwendete RAID-Level." },

  // Paketmanagement
  { cat: "Paketmanagement", q: "Was ist 'Dependency Hell', und wie mildern Distributionen dieses Problem ab?", a: "Dependency Hell entsteht, wenn Programme unterschiedliche (inkompatible) Versionen derselben Bibliothek benötigen und schon ein kleines Update eine ganze Kette von Änderungen/Konflikten nach sich zieht. Distributionen wie Debian mildern das durch Package Maintainer ab, die Pakete aufeinander abstimmen und testen, bevor sie in die offiziellen Repositories kommen." },
  { cat: "Paketmanagement", q: "Was ist der Unterschied zwischen dpkg und apt?", a: "dpkg ist ein Low-Level-Werkzeug: installiert/entfernt einzelne .deb-Pakete, löst Abhängigkeiten aber nicht automatisch auf. apt (High-Level, baut intern auf dpkg auf) löst Abhängigkeiten automatisch auf, verwaltet Paketquellen (Repositories) und kann ganze Systeme aktualisieren." },
  { cat: "Paketmanagement", q: "Welche wichtigen dpkg-Befehle gibt es, und was ist der Unterschied zwischen -r und -P?", a: "dpkg -i <paket.deb>: installieren. dpkg -l: alle installierten Pakete anzeigen. dpkg -r <paket> (remove): entfernt das Paket, lässt aber Konfigurationsdateien zurück. dpkg -P <paket> (purge, großes P!): entfernt das Paket vollständig inklusive Konfigurationsdateien." },
  { cat: "Paketmanagement", q: "Welche wichtigen apt-Befehle gibt es?", a: "apt update: Paketlisten aus den Quellen aktualisieren (vor Installationen wichtig). apt install <paket>: Paket installieren. apt upgrade: installierte Pakete aktualisieren. apt search <paket>: nach Paketen suchen. apt show <paket>: Paketinfos anzeigen. apt autoremove: nicht mehr benötigte, automatisch installierte Abhängigkeiten entfernen." },
  { cat: "Paketmanagement", q: "Wo werden APT-Paketquellen (Repositories) konfiguriert, und was bedeuten die Debian-Komponenten main/contrib/non-free?", a: "In /etc/apt/sources.list bzw. zusätzlichen Dateien unter /etc/apt/sources.list.d/. main: freie Software nach Debian-Richtlinien. contrib: freie, community-beigesteuerte Software mit unfreien Abhängigkeiten. non-free: proprietäre Software, die nicht den Debian-Richtlinien entspricht." },
  { cat: "Paketmanagement", q: "Was ist ein Mirror im Zusammenhang mit Paketquellen?", a: "Ein zusätzlicher Server, der eine Kopie des Debian-Paketarchivs bereithält und regelmäßig mit dem Original synchronisiert ('spiegelt') – dadurch können Nutzer Pakete schneller und näher am eigenen Standort herunterladen." },
  { cat: "Paketmanagement", q: "Was sind die Nachteile der klassischen Installation aus dem Quellcode (compilieren)?", a: "Zeitaufwendig (Kompilieren kann lange dauern), aufwendige manuelle Schritte (configure, make, make install), fehleranfällig, benötigt zusätzliche Build-Werkzeuge (Compiler u.a.) und erfordert, dass alle Abhängigkeiten in passender Version selbst besorgt werden." },

  // Benutzerverwaltung
  { cat: "Benutzerverwaltung", q: "Was steht in /etc/passwd, und warum liegen Passwort-Hashes heute in /etc/shadow statt dort?", a: "/etc/passwd enthält Benutzername, UID, primäre GID, Home-Verzeichnis und Shell – die Datei muss für alle lesbar sein, damit Programme sie nachschlagen können. Da /etc/shadow nur von root gelesen werden darf, verhindert die Auslagerung der Passwort-Hashes dorthin, dass jeder Benutzer diese Hashes kopieren und für Wörterbuch-/Brute-Force-Angriffe nutzen kann." },
  { cat: "Benutzerverwaltung", q: "Was ist der Unterschied zwischen primärer und sekundärer Gruppe, und was ist das User-Private-Group-Modell?", a: "Die primäre Gruppe ist die Standardgruppe eines Benutzers (neue Dateien gehören ihr standardmäßig), sekundäre Gruppen dienen zur Vergabe zusätzlicher Rechte (z.B. sudo, docker). Beim User-Private-Group-Modell bekommt jeder Benutzer automatisch eine eigene, gleichnamige primäre Gruppe – so landen neue Dateien nicht automatisch in einer von mehreren Benutzern geteilten Gruppe." },
  { cat: "Benutzerverwaltung", q: "Was ist der Unterschied zwischen useradd und adduser?", a: "useradd ist ein systemnahes Low-Level-Werkzeug, das einen Benutzer mit den in /etc/login.defs definierten Standardwerten anlegt. adduser ist ein komfortabler, interaktiver Wrapper darum, der u.a. Passwort abfragt, das Home-Verzeichnis automatisch erstellt und Vorlagen aus /etc/skel/ kopiert." },
  { cat: "Benutzerverwaltung", q: "Was bewirken die usermod-Optionen -aG, -g und -G, und worauf muss man dabei achten?", a: "-aG <gruppen>: fügt (append) den Benutzer zusätzlichen Gruppen hinzu, ohne bestehende zu entfernen. -g <gruppe>: ändert die primäre Gruppe. -G <gruppen> OHNE -a: überschreibt alle bisherigen sekundären Gruppen – dadurch können versehentlich Rechte wie sudo verloren gehen." },
  { cat: "Benutzerverwaltung", q: "Was ist der Unterschied zwischen userdel und userdel -r?", a: "userdel entfernt den Benutzer nur aus den zentralen Benutzer-/Gruppendateien, das Home-Verzeichnis bleibt erhalten. userdel -r entfernt zusätzlich Home-Verzeichnis und Mail-Spool. Solange noch Prozesse unter der UID laufen, kann der Benutzer nicht gelöscht werden." },
  { cat: "Benutzerverwaltung", q: "Was ist der Unterschied zwischen den eingeschränkten Shells rbash, nologin und /bin/false?", a: "rbash (restricted shell): eingeschränkte, aber nutzbare Shell (z.B. kein cd, keine Pfadangaben). nologin: Anmeldung wird mit Hinweistext verweigert – typisch für Dienstkonten wie www-data. /bin/false: die Anmeldung wird sofort beendet, meist ohne jede Meldung." },
  { cat: "Benutzerverwaltung", q: "Wozu dienen /etc/skel/ und /etc/login.defs?", a: "/etc/skel/ (skeleton directory) enthält Vorlagen/Standarddateien, die beim Anlegen eines neuen Benutzers automatisch in dessen Home-Verzeichnis kopiert werden. /etc/login.defs legt zentrale Standardwerte für neue Benutzerkonten fest, z.B. UID-Bereiche oder Passwortregeln." },

  // Prozessmanagement
  { cat: "Prozessmanagement", q: "Was ist ein Prozess, und was bedeuten PID, PPID, UID/GID und CMD?", a: "Ein Prozess ist ein gerade ausgeführtes Programm, verwaltet vom Kernel. PID (Process ID): eindeutige Kennung. PPID (Parent Process ID): Kennung des Elternprozesses. UID/GID: Benutzer/Gruppe, unter der der Prozess läuft. CMD: der ausgeführte Befehl." },
  { cat: "Prozessmanagement", q: "Was ist der Unterschied zwischen fork() und exec()?", a: "fork() erzeugt einen neuen Prozess als Kopie des aufrufenden Prozesses. exec() startet dabei keinen neuen Prozess, sondern lädt ein anderes Programm in den bereits erzeugten (bestehenden) Prozess." },
  { cat: "Prozessmanagement", q: "Was bedeuten die Prozesszustände R, S, D, T und Z?", a: "R (Running): läuft oder ist bereit. S (Sleeping): wartet auf ein Ereignis. D (Uninterruptible Sleep): wartet im Kernel, meist auf I/O. T (Stopped): angehalten (z.B. durch Ctrl+Z). Z (Zombie): bereits beendet, aber noch als Prozesseintrag sichtbar." },
  { cat: "Prozessmanagement", q: "Was zeigt ps aux an, und was bedeuten die Optionen a, u und x?", a: "ps aux zeigt alle Prozesse mit ausführlichen Infos (Benutzer, CPU-/Speicherverbrauch). a: Prozesse aller Benutzer mit Terminal. u: benutzerorientiertes Format mit Zusatzinfos. x: auch Prozesse ohne kontrollierendes Terminal (z.B. Daemonen)." },
  { cat: "Prozessmanagement", q: "Was ist der Unterschied zwischen top und htop?", a: "top zeigt Prozesse und Systeminfos (Load Average, CPU-/Speicherauslastung) live in Echtzeit an, mit Tastenkürzeln wie P (nach CPU sortieren) oder k (Prozess beenden). htop ist eine interaktivere, farbige Alternative mit Scrollen, Baumansicht, Suche/Filter und Bedienung über Funktionstasten." },
  { cat: "Prozessmanagement", q: "Was ist der Unterschied zwischen pgrep und pidof, und warum ist pgrep besser als ps aux | grep?", a: "pgrep sucht Prozesse nach Namen/Muster (auch im vollen Startbefehl mit -f). pidof sucht gezielt nach der PID eines Programmnamens. Bei ps aux | grep <name> erscheint der Suchbefehl grep selbst oft in der Trefferliste – pgrep vermeidet dieses Problem und ist zuverlässiger." },
  { cat: "Prozessmanagement", q: "Was bewirken die Signale SIGTERM, SIGKILL, SIGHUP, SIGSTOP und SIGCONT?", a: "SIGTERM (15): Prozess geordnet/freundlich beenden. SIGKILL (9): Prozess sofort beenden (kann nicht abgefangen werden). SIGHUP (1): Terminal getrennt / bei Diensten oft 'neu laden'. SIGSTOP (19): Prozess anhalten. SIGCONT (18): Prozess fortsetzen." },
  { cat: "Prozessmanagement", q: "Was ist der Unterschied zwischen einem Job und einer Jobnummer im Vergleich zur PID?", a: "Ein Job ist ein von der aktuellen Shell verwalteter Prozess (Vorder-/Hintergrund). Die Jobnummer wird von der Shell vergeben und gilt nur in der aktuellen Sitzung (genutzt von jobs, fg, bg). Die PID ist die systemweite Prozess-ID, mit der z.B. kill arbeitet." },
  { cat: "Prozessmanagement", q: "Wie startet man einen Prozess im Hintergrund, und wie holt man ihn zurück in den Vordergrund?", a: "<befehl> & startet ihn direkt im Hintergrund. Ctrl+Z hält einen laufenden Vordergrundprozess an. bg setzt einen angehaltenen Prozess im Hintergrund fort, fg holt ihn (bzw. mit fg %<jobnummer> einen bestimmten Job) zurück in den Vordergrund." },
  { cat: "Prozessmanagement", q: "Was ist der Unterschied zwischen nohup und disown?", a: "nohup startet einen NEUEN Befehl so, dass er beim Logout/Schließen des Terminals (SIGHUP) weiterläuft (Ausgabe landet standardmäßig in nohup.out). disown koppelt einen bereits laufenden Job im Nachhinein von der Shell ab, damit er beim Beenden der Shell kein SIGHUP erhält." },
  { cat: "Prozessmanagement", q: "Was ist der Nice-Wert eines Prozesses, und wie ändert man ihn?", a: "Der Nice-Wert (Bereich -20 bis +19, Standard 0) beeinflusst die Scheduler-Priorität: niedrigere Werte = höhere Priorität, höhere Werte = niedrigere Priorität ('netter' gegenüber anderen Prozessen). nice -n <wert> <programm> startet einen Prozess mit bestimmtem Nice-Wert, renice <wert> -p <PID> ändert ihn nachträglich. Negative Werte erfordern Root-Rechte." },
  { cat: "Prozessmanagement", q: "Wozu dienen screen und tmux?", a: "Beide ermöglichen persistente Terminalsitzungen, die auch nach Verbindungsabbruch oder Logout erhalten bleiben – Prozesse laufen im Hintergrund weiter und Sitzungen lassen sich später wieder verbinden (attach). tmux ist die modernere Alternative mit Fenstern, teilbaren Panes und besserer Anpassbarkeit." },

  // Shell Scripting
  { cat: "Shell Scripting", q: "Was ist die Shebang-Zeile, und woher kommt der Name?", a: "#!/bin/bash als erste Zeile eines Skripts legt fest, welcher Interpreter (welche Shell) das Skript ausführen soll. Der Name 'Shebang' leitet sich von der gesprochenen Bezeichnung der Zeichen # (hash/sharp) und ! (bang) ab: 'hash bang' → 'shebang'." },
  { cat: "Shell Scripting", q: "Wie macht man ein Shell-Skript ausführbar, und warum braucht es ./ beim Aufruf?", a: "chmod +x script.sh setzt das Ausführungsrecht. ./script.sh ist nötig, weil Linux ausführbare Programme standardmäßig nur in Verzeichnissen sucht, die im Suchpfad $PATH stehen – das aktuelle Verzeichnis gehört normalerweise nicht dazu." },
  { cat: "Shell Scripting", q: "Wie werden Variablen in Bash gesetzt und ausgelesen, und was ist bei der Typisierung anders als in Java?", a: "Zuweisung ohne Leerzeichen um das Gleichheitszeichen, z.B. name=\"Max\", Zugriff über $name. Bash hat keine feste Typisierung: Werte werden zunächst als Text behandelt, der Typ ergibt sich erst aus dem Verwendungskontext (anders als z.B. bei Java mit int/String)." },
  { cat: "Shell Scripting", q: "Wie liest man Benutzereingaben in Bash ein?", a: "Mit read wird eine Eingabe in eine Variable gespeichert, z.B. read name. Mit read -p \"Text: \" name lässt sich eine Eingabeaufforderung direkt kombinieren, ohne separate echo-Zeile." },
  { cat: "Shell Scripting", q: "Wie ist eine if/elif/else-Bedingung in Bash aufgebaut?", a: "if [ BEDINGUNG ]; then BEFEHL elif [ BEDINGUNG2 ]; then BEFEHL else BEFEHL fi. [ … ] ist eine Kurzschreibweise für den Befehl test, vor und nach den Klammern müssen Leerzeichen stehen, Variablen sollten in Anführungszeichen gesetzt werden." },
  { cat: "Shell Scripting", q: "Welche Vergleichsoperatoren gibt es für Zahlen und welche für Zeichenketten in Bash?", a: "Zahlen: -eq (gleich), -ne (ungleich), -lt (kleiner), -le (kleiner/gleich), -gt (größer), -ge (größer/gleich). Zeichenketten: = (gleich), != (ungleich), -z (leer), -n (nicht leer)." },
  { cat: "Shell Scripting", q: "Wie ist eine case-Anweisung aufgebaut, und wann ist sie sinnvoll?", a: "case WERT in MUSTER1) BEFEHL ;; MUSTER2) BEFEHL ;; *) BEFEHL ;; esac. Sinnvoll als übersichtliche Alternative zu mehreren if/elif-Abfragen, besonders bei Auswahlmenüs oder festen Parameterwerten. * fängt den Standardfall ab, ;; beendet jeden Fall." },
  { cat: "Shell Scripting", q: "Wie ist der Kopf einer for-Schleife und einer while-Schleife in Bash aufgebaut, und wann nutzt man welche?", a: "for VARIABLE in LISTE; do BEFEHL done – geeignet für feste Listen oder bekannte Anzahl Durchläufe. while [ BEDINGUNG ]; do BEFEHL done – geeignet, wenn die Anzahl der Durchläufe von einer Bedingung abhängt (Zähler, Statusprüfungen)." },
  { cat: "Shell Scripting", q: "Was ist der Unterschied zwischen $(…) und $((…)) in Bash?", a: "$( … ) ist Command Substitution: führt einen Befehl aus und setzt dessen Ausgabe ein, z.B. datum=$(date). $(( … )) ist arithmetische Auswertung: berechnet einen mathematischen Ausdruck und setzt das Ergebnis ein, z.B. echo $((3 + 2)) gibt 5 aus." },
  { cat: "Shell Scripting", q: "Was ist ein Exit-Code, und wie fragt man ihn ab?", a: "Jeder Befehl liefert nach Ausführung einen Exit-Code zurück: 0 bedeutet Erfolg, jeder andere Wert Fehler/Sonderfall (programmspezifisch). Mit echo $? direkt nach dem Befehl lässt sich der Exit-Code des zuletzt ausgeführten Befehls anzeigen – if wertet in Bash direkt den Exit-Code eines Befehls aus (0 = wahr)." },
  { cat: "Shell Scripting", q: "Was ist der Unterschied zwischen exit und return in Skripten/Funktionen?", a: "exit beendet sofort das gesamte Skript und gibt optional einen Exit-Code zurück (exit ohne Zahl übernimmt den Code des zuletzt ausgeführten Befehls). return beendet dagegen nur eine Funktion – das Skript läuft danach weiter." },
  { cat: "Shell Scripting", q: "Welche Standard-Ein-/Ausgabekanäle gibt es, und wie leitet man sie um?", a: "0 = stdin (Standardeingabe), 1 = stdout (Standardausgabe), 2 = stderr (Fehlerausgabe). Umleitungen: > leitet stdout in eine Datei, 2> leitet stderr um, > /dev/null bzw. 2> /dev/null verwirft die jeweilige Ausgabe komplett ('digitaler Papierkorb')." },
  { cat: "Shell Scripting", q: "Welche Skriptparameter gibt es ($0, $1, $@, $#), und was macht shift?", a: "$0: Skriptname. $1, $2, …: übergebene Argumente einzeln. $@: alle Argumente zusammen. $#: Anzahl der übergebenen Argumente. shift verschiebt alle Positionsparameter um eine Stelle nach links (aus $2 wird $1 usw.), der bisherige $1 entfällt – nützlich, wenn der erste Parameter schon verarbeitet wurde." },
  { cat: "Shell Scripting", q: "Wie definiert man eine Funktion in Bash, und wie gibt sie einen Wert zurück?", a: "meine_funktion() { BEFEHLE } definiert eine Funktion, aufgerufen einfach über ihren Namen. Anders als in vielen Sprachen wird ein Wert nicht mit return, sondern über die Standardausgabe (echo) zurückgegeben, z.B. summe=$(addiere 5 6) übernimmt die Ausgabe der Funktion addiere." },

  // LAMP & Docker
  { cat: "LAMP & Docker", q: "Wofür steht LAMP, und warum spricht man von einem 'Stack'?", a: "LAMP = Linux + Apache + MySQL/MariaDB + PHP. Man spricht von einem Stack, weil die Komponenten wie ein Schichtmodell aufeinander aufbauen (Linux unten, PHP oben) – vergleichbar mit dem TCP/IP-Schichtenmodell." },
  { cat: "LAMP & Docker", q: "Welche Rolle spielen Apache, MariaDB und PHP im LAMP-Stack?", a: "Apache: Webserver, nimmt Anfragen aus dem Internet entgegen und liefert Inhalte an den Browser zurück. MariaDB/MySQL: Datenbank für Inhalte, Einstellungen und Benutzer. PHP: serverseitige Skriptsprache, erzeugt dynamische Inhalte und verbindet Apache mit der Datenbank." },
  { cat: "LAMP & Docker", q: "Wo liegt der Apache-Webroot, und was sind sites-available/sites-enabled?", a: "Der Webroot (Standardverzeichnis für ausgelieferte Dateien) liegt unter /var/www/html/. Konfigurationsdateien liegen unter /etc/apache2/: sites-available/ enthält Konfigurationen für virtuelle Hosts (vHosts), sites-enabled/ die tatsächlich aktivierten davon." },
  { cat: "LAMP & Docker", q: "Was ist der Unterschied zwischen systemctl restart und systemctl reload bei Apache?", a: "restart wird bei tieferen Änderungen benötigt (z.B. neue Module, andere PHP-Version) – der Dienst wird komplett neu gestartet. reload reicht aus, wenn nur Konfigurationsdateien angepasst wurden (z.B. ein Virtual Host geändert) und ist schonender, da laufende Verbindungen weniger gestört werden." },
  { cat: "LAMP & Docker", q: "Was ist Docker, und wie unterscheidet es sich grundlegend von einer virtuellen Maschine?", a: "Docker ist eine Plattform zur Containerisierung: Anwendungen laufen isoliert in Containern zusammen mit allem, was sie brauchen (Code, Bibliotheken, Konfiguration). Im Unterschied zur VM (eigenes vollständiges Betriebssystem, langsamer Start, hoher Ressourcenverbrauch) nutzt ein Container den Kernel des Hosts, startet in Sekunden(bruchteilen) und benötigt deutlich weniger Ressourcen." },
  { cat: "LAMP & Docker", q: "Was sind Namespaces und Cgroups bei Docker?", a: "Namespaces sorgen für Isolation: jeder Container sieht nur seine eigenen Prozesse, sein eigenes Dateisystem und seine eigene Netzwerkumgebung. Cgroups (Control Groups) begrenzen und überwachen Ressourcen (z.B. CPU, RAM), damit ein Container das Host-System nicht überlasten kann." },
  { cat: "LAMP & Docker", q: "Was ist der Unterschied zwischen einem Docker Image, einem Container und einem Dockerfile?", a: "Ein Image ist die Vorlage/der Bauplan für einen Container (unveränderlich). Ein Container ist eine laufende Instanz eines Images. Ein Dockerfile ist die Bauanleitung, aus der ein Image gebaut wird (docker build)." },
  { cat: "LAMP & Docker", q: "Warum sind Docker-Volumes wichtig, und was ist der Unterschied zu einem Bind Mount?", a: "Container sind flüchtig – ihr interner Zustand geht beim Beenden/Neustarten verloren, deshalb gehören dauerhafte Daten in Volumes (von Docker verwaltet, z.B. unter /var/lib/docker) oder Bind Mounts (verbinden direkt einen Host-Ordner mit dem Container, z.B. -v ./daten:/var/www/html)." },
  { cat: "LAMP & Docker", q: "Wie werden Container von außen erreichbar gemacht, und wie kommunizieren mehrere Container miteinander?", a: "Über Portweiterleitung mit -p Host-Port:Container-Port, z.B. docker run -d -p 80:80 wordpress. Für die Kommunikation zwischen Containern wird ein Docker-Netzwerk benötigt (docker network create); verbundene Container sprechen sich dann über ihren Container-/Servicenamen an statt über localhost." },
  { cat: "LAMP & Docker", q: "Was ist der Unterschied zwischen docker run und Docker Compose?", a: "docker run startet einen einzelnen Container direkt über die Kommandozeile – gut für schnelle Tests. Docker Compose nutzt eine YAML-Konfigurationsdatei, um mehrere zusammengehörige Container gemeinsam zu starten und ihre Abhängigkeiten/Startreihenfolge zu beschreiben (docker compose up) – geeignet für komplexere Anwendungen wie einen kompletten LAMP-Stack." },

  // Kali & Passwortsicherheit
  { cat: "Kali & Passwortsicherheit", q: "Was ist Kali Linux, und wofür wird es eingesetzt?", a: "Eine auf Debian basierende Spezial-Distribution für IT-Sicherheit und Penetrationstests, mit vielen Sicherheits- und Analysewerkzeugen. Einsatzgebiete: Sicherheitsüberprüfungen, Schwachstellenanalyse, Schulung/Ausbildung und digitale Forensik – kein Alltags-Linux, und der Einsatz an fremden Systemen ist nur mit ausdrücklicher Genehmigung erlaubt (sonst strafbar)." },
  { cat: "Kali & Passwortsicherheit", q: "Warum ist Kali Linux heute nicht mehr standardmäßig als Root eingeloggt?", a: "Früher lief Kali komplett als Root, was aber ein hohes Sicherheitsrisiko war (jeder Fehler wirkt systemweit, Schadsoftware hätte volle Kontrolle) und schlechte Gewohnheiten förderte. Heute gilt der moderne Sicherheitsansatz: Standardnutzer + gezielte, temporäre Rechteerhöhung bei Bedarf." },
  { cat: "Kali & Passwortsicherheit", q: "Nenne 5 bekannte Kali-Linux-Werkzeuge und wofür sie jeweils genutzt werden.", a: "Nmap: Netzwerk-Scanner (erreichbare Hosts, offene Ports). Wireshark: Analyse von Netzwerkverkehr (Packet Capture). Metasploit Framework: Schwachstellenanalyse und -bewertung. Hydra: Brute-Force-Tool zur Überprüfung der Passwortstärke von Anmeldediensten. John the Ripper: Analyse von Passwort-Hashes." },
  { cat: "Kali & Passwortsicherheit", q: "Wie werden Passwörter technisch gespeichert und geprüft?", a: "Passwörter werden nicht im Klartext gespeichert, sondern als Hashwert (Einweg-Funktion – aus dem Hash lässt sich das Passwort nicht zurückrechnen). Beim Login wird das eingegebene Passwort gehasht und mit dem gespeicherten Hash verglichen." },
  { cat: "Kali & Passwortsicherheit", q: "Warum ist die Passwortlänge wichtiger als reine Zeichenvielfalt?", a: "Die Anzahl möglicher Passwörter wächst exponentiell mit der Länge (Zeichenanzahl^Länge) – z.B. bei 62 Zeichen: 4-stellig ca. 14,7 Mio. Kombinationen, 8-stellig ca. 218 Billionen. Sonderzeichen allein machen ein kurzes Passwort nicht sicher; entscheidend bleibt vor allem die Anzahl der Zeichen." },
  { cat: "Kali & Passwortsicherheit", q: "Was ist der Unterschied zwischen 2FA und MFA?", a: "2FA (Zwei-Faktor-Authentifizierung): Anmeldung mit genau zwei unterschiedlichen Faktoren, z.B. Wissen (Passwort) + Besitz (Smartphone/Authenticator-App). MFA (Multi-Faktor-Authentifizierung) ist die Erweiterung: Nutzung von zwei ODER MEHR Faktoren, ggf. auch Biometrie (Fingerabdruck/Gesicht)." },
  { cat: "Kali & Passwortsicherheit", q: "Wie funktioniert ein TOTP-Code (Time-based One-Time Password)?", a: "Beim Einrichten wird ein gemeinsames Geheimnis zwischen Server und Authenticator-App ausgetauscht (oft per QR-Code). Aus diesem Geheimnis und der aktuellen Uhrzeit (in festen Zeitfenstern, meist 30 Sekunden) berechnen beide Seiten unabhängig denselben kurzen Zahlencode – TOTP funktioniert daher auch offline, basiert technisch auf HMAC mit einer Hashfunktion." },
  { cat: "Kali & Passwortsicherheit", q: "Welche zwei Methoden helfen, sich lange, sichere Passwörter zu merken?", a: "Passphrase-Methode: mehrere ungewöhnliche Wörter kombinieren, z.B. 'Sudo!Pinguin?Terminal42'. Satz-Methode: einen Satz ausdenken und daraus Anfangsbuchstaben + Zeichen/Zahl bilden, z.B. aus 'Ich trinke 10 Kaffee am Tag!' wird 'It10KaT!'." },
  { cat: "Kali & Passwortsicherheit", q: "Warum ist Passwort-Wiederverwendung besonders bei E-Mail-Konten riskant?", a: "Ein E-Mail-Konto ermöglicht das Zurücksetzen der Passwörter vieler anderer Dienste – wird es kompromittiert, sind potenziell alle daran hängenden Konten gefährdet. Grundsatz: ein Dienst – ein Passwort, ergänzt durch einen Passwortmanager und aktivierte 2FA/MFA." },

  // Praxis: Git & Netzwerk
  { cat: "Praxis: Git & Netzwerk", q: "Was ist Git, und was ist der Unterschied zu GitHub?", a: "Git ist eine Software zur Versionsverwaltung: sie speichert Zustände von Dateien als Commits (Schnappschüsse) und läuft zunächst vollständig lokal. GitHub (bzw. GitLab) ist dagegen eine Online-Plattform, auf der Git-Projekte (Repositories) gespeichert und geteilt werden können – Git lässt sich auch völlig ohne GitHub nutzen." },
  { cat: "Praxis: Git & Netzwerk", q: "Was sind die drei Bereiche im Git-Workflow, und welche Befehle gehören dazu?", a: "Arbeitsverzeichnis (eigene Dateien) → git add verschiebt Änderungen in die Staging Area (Zwischenbereich, vorgemerkte Änderungen) → git commit -m \"…\" speichert sie dauerhaft im Repository als Commit. git status zeigt dazwischen den aktuellen Zustand." },
  { cat: "Praxis: Git & Netzwerk", q: "Was ist ein Branch in Git, und wie legt man einen neuen an?", a: "Ein Branch (Zweig) ist eine parallele Arbeitslinie, mit der sich neue Funktionen entwickeln lassen, ohne den funktionierenden Hauptstand (meist main) zu verändern. git switch -c neue-funktion legt einen neuen Branch an und wechselt direkt hinein; git merge führt ihn später wieder in main zusammen." },
  { cat: "Praxis: Git & Netzwerk", q: "Was ist ein Remote in Git, und was machen git push und git pull?", a: "Ein Remote ist eine Kopie des Repositorys auf einem Server (z.B. GitHub), üblicherweise origin genannt. git push lädt lokale Commits zum Remote hoch, git pull holt neue Commits vom Remote herunter." },
  { cat: "Praxis: Git & Netzwerk", q: "Wozu dient eine .gitignore-Datei?", a: "Sie legt fest, welche Dateien/Ordner Git NICHT überwachen und nicht mit hochladen soll (z.B. temporäre Dateien, virtuelle Umgebungen, Passwörter). Jede Zeile ist ein Muster, das passende Dateien/Ordner von der Versionsverwaltung ausschließt." },
  { cat: "Praxis: Git & Netzwerk", q: "Nenne die fünf gefährlichsten destruktiven Linux-Befehle und was sie jeweils zerstören.", a: "rm -rf / (--no-preserve-root): löscht rekursiv das ganze System. dd if=... of=/dev/sda: überschreibt Bootloader/ganze Platte mit Nullen. mkfs.ext4 auf falscher Platte: zerstört das Dateisystem. Fork-Bomb (:(){ :|:& };:): füllt Prozesstabelle/RAM und macht das System unbedienbar. chmod -R 777 /: zerstört Sicherheit/Dienste, da z.B. sshd bei zu offenen Rechten den Start verweigert." },
  { cat: "Praxis: Git & Netzwerk", q: "Warum wird systemd-networkd heute gegenüber dem alten ifupdown/interfaces bevorzugt?", a: "ifupdown und /etc/network/interfaces gelten als veraltet und sind z.B. in Debian 13 nicht mehr standardmäßig installiert. systemd-networkd ist der moderne, empfohlene Weg zur Netzwerkkonfiguration unter aktuellen Debian-Versionen und arbeitet enger mit dem restlichen systemd-Ökosystem zusammen." },
];

const DECK_PM = [
  // Grundlagen & Ziele
  { cat: "Grundlagen & Ziele", q: "Wie definiert die DIN 69901 ein Projekt?", a: "Ein Vorhaben, das im Wesentlichen durch die Einmaligkeit der Bedingungen in ihrer Gesamtheit gekennzeichnet ist, z.B. Zielvorgabe sowie zeitliche, finanzielle und personelle Begrenzungen, Abgrenzung gegenüber anderen Vorhaben und eine projektspezifische Organisation." },
  { cat: "Grundlagen & Ziele", q: "Was ist das 'magische Dreieck' des Projektmanagements?", a: "Die drei Zielgrößen Zeit/Termin, Kosten/Budget und Ergebnis/Qualität, die in Konkurrenz zueinander stehen: z.B. erhöht das Halten des Termins durch zusätzliche Mitarbeiter die Kosten, oder zusätzliche Tests zur Qualitätssicherung verschieben Termin und erhöhen die Kosten." },
  { cat: "Grundlagen & Ziele", q: "Wofür steht die SMART-Formel bei der Zielformulierung?", a: "Spezifisch (konkret formuliert), Messbar (überprüfbar), Attraktiv/Akzeptiert, Realistisch (erreichbar) und Terminiert (mit festem Zeitrahmen)." },
  { cat: "Grundlagen & Ziele", q: "Wer sind Stakeholder, und welche Aufgabe hat der Projektleiter ihnen gegenüber?", a: "Stakeholder sind Personen oder Organisationen, deren Interessen durch das Projekt betroffen sind (z.B. Kunde, Team, Nutzer). Der Projektmanager muss ihre Ansprüche an das Projekt so weit wie möglich erfüllen, wobei wichtigere Stakeholder mehr Aufmerksamkeit/Maßnahmen erhalten." },

  // Rollen & Organisation
  { cat: "Rollen & Organisation", q: "Was sind die typischen Projektrollen Auftraggeber, Auftragnehmer, Controlling, Lenkungskreis und Projektleiter?", a: "Auftraggeber: gibt das Projekt in Auftrag, Vertragspartner, nimmt es ab. Auftragnehmer: Vertragspartner, trägt das Risiko, beauftragt die Projektleitung. Controlling: überwacht Fortschritt/Kosten (Soll-Ist-Vergleiche). Lenkungskreis: wichtige Stakeholder/Fachexperten, berät/entscheidet/genehmigt neutral übergeordnet. Projektleiter: steuert das Projekt und verantwortet die Zielerreichung." },
  { cat: "Rollen & Organisation", q: "Welche vier Kompetenzen werden von einer Projektleitung erwartet?", a: "Fachkompetenz (fachliche Kenntnisse), Sozialkompetenz (Kommunikations-/Konfliktlösungs-/Teamfähigkeit), Führungskompetenz (Durchsetzungsvermögen, Mitarbeiter motivieren können) und Selbstkompetenz (Entscheidungsstärke, Zielstrebigkeit, Durchhaltevermögen)." },
  { cat: "Rollen & Organisation", q: "Was unterscheidet reine Projektorganisation, Matrix-Projektorganisation und Stabsprojektorganisation?", a: "Reine Projektorganisation: Mitarbeiter werden komplett aus ihren Abteilungen gelöst und dem Projektleiter auch disziplinarisch unterstellt. Matrix-Projektorganisation: Mitarbeiter sind sowohl dem Linienvorgesetzten als auch dem Projektleiter unterstellt. Stabsprojektorganisation: Das Projekt ist an eine Stabsstelle delegiert, der Projektleiter hat nur koordinierende Funktion, kein Weisungsrecht." },
  { cat: "Rollen & Organisation", q: "Nenne je 2 Vorteile interner Projektbearbeitung und externer Vergabe an Projektberater.", a: "Intern: gefestigte Vertraulichkeit, Kenntnis der Unternehmenskultur, leichtere Steuerung interner Ressourcen. Extern: bei seltenen Projekten günstiger als eigenen PM zu beschäftigen, neue Perspektiven, flexibler Zugang zu Ressourcen." },

  // Phasen & Dokumente
  { cat: "Phasen & Dokumente", q: "Welche 5 Phasen umfasst das klassische Phasenmodell nach DIN 69901-2?", a: "Initiierung (Projektvorbereitung, Ideenfindung, Grobplanung), Definition (Anforderungen klären, SMARTe Ziele, Meilensteine festlegen), Planung (Detailplanung: PSP, Vorgangsliste, Termine, Budget), Steuerung (Status/Termine/Budget verfolgen, Änderungen managen) und Abschluss (Übergabe, Test, Abnahme, Lessons Learned)." },
  { cat: "Phasen & Dokumente", q: "Was ist der Unterschied zwischen Lastenheft und Pflichtenheft?", a: "Das Lastenheft beschreibt aus Sicht des Auftraggebers, WAS gemacht werden soll (Anforderungen, Ist-Aufnahme, Sollkonzept). Das Pflichtenheft beschreibt aus Sicht des Auftragnehmers, WIE die Anforderungen technisch umgesetzt werden sollen." },
  { cat: "Phasen & Dokumente", q: "Was ist ein Projektstrukturplan (PSP), und was ist die kleinste Einheit darin?", a: "Der PSP (englisch: work breakdown structure) gliedert ein Projekt hierarchisch in überschaubare Elemente – enthält noch keine zeitlichen Abhängigkeiten, bildet aber die Basis für Termin- und Kostenpläne. Die kleinste Einheit ist das Arbeitspaket: hat genau einen Verantwortlichen, einen abgeschlossenen Inhalt, endet mit einem Ergebnis und wird durch einen PSP-Code eindeutig identifiziert." },
  { cat: "Phasen & Dokumente", q: "Nach welchen drei Gesichtspunkten kann ein Projektstrukturplan gegliedert werden?", a: "Funktionsorientiert (nach Tätigkeitsarten, z.B. Erdarbeiten, Maurerarbeiten), objektorientiert (nach Bauteilen/Objekten, z.B. Zufahrt, Gebäude) und phasenorientiert (nach Projektphasen, z.B. Entwurf, Bau, Inbetriebnahme)." },
  { cat: "Phasen & Dokumente", q: "Was ist der Unterschied zwischen einem Arbeitspaket und einem Vorgang?", a: "Ein Arbeitspaket ist eine übergeordnete Einheit aus dem PSP (Was soll getan werden?). Ein Vorgang ist eine detailliertere Unterteilung davon mit definiertem Start-/Endzeitpunkt und benötigten Ressourcen – Teil der Termin- und Ablaufplanung (Was kann mit welcher Dauer in welcher Reihenfolge erledigt werden?)." },
  { cat: "Phasen & Dokumente", q: "Was sind Meilensteine, und wozu dienen sie?", a: "Wichtige Kontrollpunkte/Zwischenziele, an denen Projektphasen enden und geplante Zwischenergebnisse dokumentiert und kontrolliert werden. Bei Abweichungen zum Plan kann frühzeitig reagiert werden; Meilensteine sind auch Entscheidungspunkte für das weitere Vorgehen." },

  // Planung
  { cat: "Planung", q: "Was ist der Unterschied zwischen Bottom-up- und Top-down-Zeitschätzung?", a: "Bottom-up: die Dauer der einzelnen Vorgänge wird geschätzt und zum Gesamtaufwand zusammengefasst. Top-down: zunächst wird der Aufwand für das Gesamtprojekt geschätzt und dieser dann auf die einzelnen Tätigkeiten verteilt." },
  { cat: "Planung", q: "Was ist die Methode Schätzklausur?", a: "Eine Methode zur Ermittlung des Aufwands (Zeit oder Kosten) im Projekt, bei der mehrere Experten ihre Schätzwerte diskutieren und sich im Rahmen der Klausur auf einen gemeinsamen Wert einigen (alternativ: Mittelwert nach Entfernen der höchsten/niedrigsten Schätzung)." },
  { cat: "Planung", q: "Was zeigt ein Gantt-Diagramm, und wie erkennt man darin einen Zeitpuffer?", a: "Ein Balkendiagramm, das alle geplanten Vorgänge auf einer Zeitachse zeigt: Gesamtdauer, geplante Anfangs-/Endzeitpunkte und welche Vorgänge parallel bzw. hintereinander ablaufen. Ein Vorgang mit Zeitpuffer ist einer, der verschoben werden könnte, ohne den Gesamtendtermin zu gefährden." },
  { cat: "Planung", q: "Was zeigt die Netzplantechnik, und was bedeuten FAZ, FEZ, SAZ, SEZ?", a: "Der Netzplan ist ein Instrument zur Zeit-/Terminplanung, das zeigt, welche Vorgänge zeitkritisch sind. FAZ: frühester Anfangszeitpunkt, FEZ: frühester Endzeitpunkt (= FAZ + Dauer), SAZ: spätester Anfangszeitpunkt, SEZ: spätester Endzeitpunkt (= SAZ minus Dauer)." },
  { cat: "Planung", q: "Wie berechnet man Gesamtpuffer (GP) und freien Puffer (FP) im Netzplan, und was ist der kritische Pfad?", a: "GP = SEZ minus FEZ (wie weit sich ein Vorgang verschieben lässt, ohne den Projektendtermin zu gefährden). FP = FAZ des Nachfolgers minus FEZ (Verschiebung ohne den Nachfolger zu beeinflussen). Der kritische Pfad besteht aus den Vorgängen ohne Zeitpuffer – jede Verzögerung dort verschiebt direkt den Projektendtermin." },
  { cat: "Planung", q: "Was zeigt ein Kapazitätsplan, und welche Maßnahmen gibt es bei Kapazitätsüberlastung?", a: "Er dokumentiert die Verfügbarkeit und Beanspruchung von Ressourcen (Mitarbeiter, Arbeitsmittel). Bei Überlastung: Arbeitspakete verschieben (nur wenn nicht auf dem kritischen Pfad), Mitarbeiter von anderen Aufgaben entlasten, weitere Mitarbeiter einsetzen (erhöht Budget/Einarbeitungszeit), oder – im agilen PM – den Leistungsumfang verkleinern." },
  { cat: "Planung", q: "Wie berechnet man die benötigte Mitarbeiterzahl aus Aufwand und Terminrahmen?", a: "Benötigte Mitarbeiter = Gesamtaufwand (Tage) geteilt durch Terminrahmen (Tage). Beispiel: 405 Tage Aufwand bei 90 Tagen Laufzeit ergibt 405/90 = 4,5 Mitarbeiter. Zusätzlich sind Einarbeitungszeiten, Urlaub und Krankheitsvertretung zu berücksichtigen." },

  // Steuerung & Risiko
  { cat: "Steuerung & Risiko", q: "Was ist eine Meilensteintrendanalyse, und wie interpretiert man fallende bzw. steigende Trends?", a: "Ein vorwärts gerichtetes Controllinginstrument: zu jedem Berichtszeitpunkt wird geschätzt, wann ein Meilenstein erreicht wird, und diese Einschätzungen werden über die Zeit zu einem Trend verbunden. Fallender Trend: vorzeitiges Erreichen (evtl. zu viele Kapazitäten gebunden). Steigender Trend: Verzögerung, Termin kann evtl. nicht gehalten werden." },
  { cat: "Steuerung & Risiko", q: "Nenne die 5 Kategorien von Projektrisiken.", a: "Marktrisiken (z.B. Nachfrageänderungen, neue Wettbewerber), Personalrisiken (z.B. Krankheit, Fluktuation), technische Risiken (z.B. Anlagenausfall, Qualitätsmängel), finanzielle Risiken (z.B. nicht kalkulierte Ausgaben) und Risiken aus politischen Rahmenbedingungen bzw. der natürlichen Umwelt." },
  { cat: "Steuerung & Risiko", q: "Was besagt das ALARP-Prinzip, und welche 5 Risikostrategien gibt es?", a: "ALARP (As Low As Reasonably Possible): Risiken auf ein wirtschaftlich/technisch vertretbares Minimum reduzieren. Strategien: Vermeidung (Auftrag nicht annehmen), Verlagerung (Versicherung, Change Requests an Auftraggeber), Verminderung (z.B. Überstunden), Begrenzung (z.B. Währungsabsicherung) und Akzeptanz (keine Vorsorge)." },
  { cat: "Steuerung & Risiko", q: "Wie wird im Risiko-Portfolio entschieden, welche Risiken vermieden bzw. akzeptiert werden?", a: "Risiken werden nach Eintrittswahrscheinlichkeit und Schadensausmaß (Folgen) bewertet. Hohe Wahrscheinlichkeit + schwere Folgen: unbedingt vermeiden. Niedrige Wahrscheinlichkeit + leichte Folgen: kann akzeptiert werden. Bei mittleren Kombinationen wird geprüft, ob Vermeidungskosten den erwarteten Nutzen übersteigen (z.B. Versicherung sinnvoll oder Pufferzeiten einplanen)." },
  { cat: "Steuerung & Risiko", q: "Nenne die 8 Qualitätsmerkmale von Software nach ISO 25010.", a: "Zuverlässigkeit, Funktionalität, Wartbarkeit, Sicherheit, Effizienz/Performance, Benutzbarkeit, Kompatibilität und Portabilität." },

  // Agiles PM
  { cat: "Agiles PM & Scrum", q: "Was ist der Unterschied zwischen dem Wasserfall-Modell und dem V-Modell?", a: "Beim Wasserfall-Modell laufen die Projektphasen streng nacheinander ab, ohne Rücksprung – erst am Ende wird umfangreich getestet. Das V-Modell stellt jeder Entwicklungsphase eine passende Testphase gegenüber (z.B. Komponententest zur Komponentenentwurf, Systemtest zum Systementwurf) und integriert so die Qualitätssicherung von Anfang an." },
  { cat: "Agiles PM & Scrum", q: "Was ist das Spiralmodell?", a: "Ein iteratives Vorgehensmodell, bei dem die Projektphasen mehrfach durchlaufen werden und das Ergebnis schrittweise erweitert/verbessert wird. Durch frühe funktionsfähige Prototypen kann der Anwender früh prüfen, ob das Projekt seine Anforderungen erfüllt – das Fehlentwicklungsrisiko sinkt, weil bei jedem Durchlauf gegengesteuert werden kann." },
  { cat: "Agiles PM & Scrum", q: "Was ist der zentrale Unterschied zwischen klassischem und agilem Projektmanagement bei Zeitproblemen?", a: "Klassisch: bei Problemen wird meist der Termin verschoben (Nachtragsbudget, Change Request). Agil: der Termin bleibt fix, stattdessen wird der Leistungsumfang verringert – es erfolgen Teilauslieferungen mit geringerer Funktionalität, wichtige Funktionen werden priorisiert und früh in einfacher Form ausgeliefert." },
  { cat: "Agiles PM & Scrum", q: "Welche drei Rollen gibt es in Scrum, und was macht jede davon?", a: "Scrum Master: sorgt für den korrekten Scrum-Prozess, ist Ansprechpartner für Prozessfragen. Product Owner: kennt die Kundenanforderungen, verantwortet das Product Backlog und die Priorisierung ('Was'). Development Team: setzt die Anforderungen selbstorganisiert um und trägt Mitverantwortung für den Gesamtprozess." },
  { cat: "Agiles PM & Scrum", q: "Welche fünf Ereignisse (Events) gibt es in Scrum?", a: "Sprint Planning (Auswahl der Anforderungen für den Sprint), Sprint (Arbeitsphase, meist 2-4 Wochen), Daily Scrum (tägliches Stand-up-Meeting, max. 15 Min.), Sprint Review (Stakeholder sehen den Arbeitsstand) und Sprint Retrospective (Team reflektiert Zusammenarbeit/Prozess, nicht das Produkt)." },
  { cat: "Agiles PM & Scrum", q: "Was ist der Unterschied zwischen Product Backlog, Sprint Backlog und Increment?", a: "Product Backlog: alle für das Produkt insgesamt umzusetzenden Anforderungen, nie vollständig abgeschlossen. Sprint Backlog: die für den aktuellen Sprint ausgewählten Anforderungen (wie eine To-do-Liste, oft als Kanban Board dargestellt). Increment: das Teilprodukt, das durch einen Sprint tatsächlich entsteht." },
  { cat: "Agiles PM & Scrum", q: "Worauf liegt der Fokus bei Kanban?", a: "Auf der visuellen Darstellung des Arbeitsfortschritts (Kanban Board) und der Begrenzung von 'Work in Progress' (WIP) – wie viele Aufgaben gleichzeitig in Bearbeitung sein dürfen, um Engpässe sichtbar zu machen und den Fluss der Arbeit zu verbessern." },

  // Teamführung & Kommunikation
  { cat: "Teamführung & Kommunikation", q: "Was ist der Unterschied zwischen intrinsischer und extrinsischer Motivation?", a: "Intrinsische Motivation kommt von innen heraus und wirkt dauerhaft (die Arbeit selbst macht Freude). Extrinsische Motivation wirkt von außen (z.B. finanzielle Anreize), eher kurzfristig, wobei das Anspruchsniveau mit der Zeit steigt." },
  { cat: "Teamführung & Kommunikation", q: "Welche drei grundlegenden Führungsstile gibt es?", a: "Autoritärer Führungsstil: die Führungskraft entscheidet allein und kontrolliert genau, Mitarbeiter führen nur aus. Kooperativer Führungsstil: Mitarbeiter werden einbezogen und erhalten eigenen Handlungsspielraum. Laissez-faire-Stil: die Führungskraft kümmert sich kaum, Mitarbeiter entscheiden mit voller Freiheit selbst." },
  { cat: "Teamführung & Kommunikation", q: "Was besagt das Kommunikationsquadrat von Schulz von Thun (die 4 Seiten einer Nachricht)?", a: "Sachebene (Daten/Fakten), Selbstkundgabe (was der Sender über sich preisgibt), Beziehungsebene (Verhältnis zwischen Sender und Empfänger) und Appellebene (welchen Einfluss der Sender nehmen will). Sender und Empfänger können jeweils unterschiedliches Gewicht auf die vier Seiten legen, was zu Kommunikationsstörungen führen kann." },
  { cat: "Teamführung & Kommunikation", q: "Was ist der Unterschied zwischen Du-Botschaften und Ich-Botschaften?", a: "Du-Botschaften (z.B. Befehle, Vorwürfe, Unterstellungen) wirken oft wie Angriffe auf der Beziehungsebene und provozieren Widerstand, was zu einer Negativ-Spirale führen kann. Ich-Botschaften benennen stattdessen die Tatsache (Sachaussage ohne Wertung), das eigene Gefühl, die Beziehungsebene und die Erwartung – das reduziert Konflikte." },
  { cat: "Teamführung & Kommunikation", q: "Welche 5 Phasen der Teamentwicklung beschreibt Bruce Tuckman?", a: "Einstiegs-/Kennenlernphase (Unsicherheit, Zurückhaltung), Konflikt-/Streitphase (Machtkämpfe, geringe Leistung), Regelungs-/Übereinkommensphase (Normen werden gefunden, Rollen geklärt), Arbeits-/Leistungsphase (Team arbeitet erfolgreich zusammen) und Auflösungsphase (Abschluss, Feedback, Lessons Learned)." },
];

const DECK_MARKETING = [
  // Marktanalyse
  { cat: "Marktanalyse", q: "Was umfasst Marketing laut Definition, und welches Ziel verfolgt es?", a: "Marketing umfasst alle betrieblichen Tätigkeiten der Planung, Koordination, Kontrolle und Information, die auf aktuelle und potenzielle Märkte ausgerichtet sind. Ziel ist es, Kundenbedürfnisse zu befriedigen – ausgehend von der Marktanalyse werden Strategien entwickelt und über das Marketing-Mix umgesetzt." },
  { cat: "Marktanalyse", q: "Was ist der Unterschied zwischen Marktkapazität, Marktpotenzial, Marktvolumen und Marktanteil?", a: "Marktkapazität: maximal denkbare Absatzmenge, ohne Kaufkraft zu berücksichtigen. Marktpotenzial: berücksichtigt die tatsächliche Kaufkraft. Marktvolumen: tatsächliche Absatzmenge/Umsätze aller Hersteller am Markt. Marktanteil: Anteil des eigenen Unternehmensumsatzes am Marktvolumen." },
  { cat: "Marktanalyse", q: "Was ist der Unterschied zwischen Primärer und Sekundärer Marktforschung?", a: "Primäre Marktforschung (Field-Research): Erstgewinnung eigener Informationen, z.B. Befragungen, Panelerhebungen, Markttests. Sekundäre Marktforschung (Desk-Research): Auswertung bereits vorhandener Daten (innerbetrieblich z.B. Umsatzstatistiken, außerbetrieblich z.B. IHK-Berichte) – weniger aufwendig, aber Daten können veraltet sein." },
  { cat: "Marktanalyse", q: "Was ist der Unterschied zwischen Markterkundung und Marktforschung?", a: "Markterkundung: unsystematisches, gelegentliches Sammeln von Informationen (z.B. Kundengespräche, Messebesuche). Marktforschung: systematische, wissenschaftliche Untersuchung des Markts, entweder als Marktanalyse (Zeitpunkt-Untersuchung, z.B. einmalige Befragung) oder Marktbeobachtung (Zeitraum-Untersuchung, z.B. Panel)." },
  { cat: "Marktanalyse", q: "Was ist der Unterschied zwischen Lastenheft und Pflichtenheft im Marketing-Kontext?", a: "Das Lastenheft wird vom Kunden vorgegeben und beschreibt als Anforderungskatalog, WAS zu tun ist (Grundlage für Angebotseinholung). Das Pflichtenheft stellt die Lösung des Anbieters dar und beschreibt, WIE und WOMIT die im Lastenheft gewünschten Funktionen umgesetzt werden sollen." },

  // Portfolio & SWOT
  { cat: "Portfolio & SWOT", q: "Wofür wird die Produktlebenszyklus-Analyse genutzt, und welche 5 Phasen durchläuft ein Produkt?", a: "Sie leitet aus Umsatz-, Deckungsbeitrags- und Gewinnprognose die passenden Strategien für ein Produkt ab. Phasen: Einführung, Wachstum, Reife, Sättigung, Degeneration – mit jeweils typischen Käufertypen, Marktstrukturen und Strategien." },
  { cat: "Portfolio & SWOT", q: "Was ist der Unterschied zwischen Produktlebenszyklus-Analyse und Portfolio-Analyse?", a: "Die Produktlebenszyklus-Analyse untersucht die Entwicklung eines EINZELNEN Produkts über die Zeit. Die Portfolio-Analyse bewertet dagegen die aktuelle und zukünftige Situation ALLER Artikel im Sortiment und leitet für jeden Artikel eine eigene Strategie ab." },
  { cat: "Portfolio & SWOT", q: "Wie berechnet man den relativen Marktanteil und das Marktwachstum?", a: "Relativer Marktanteil (%) = Unternehmensumsatz geteilt durch Umsatz des stärksten Mitbewerbers, mal 100. Marktwachstum (%) = Veränderung des Marktumsatzes geteilt durch Marktumsatz im Vorjahr, mal 100. Beide bilden zusammen die Achsen der BCG-Portfolio-Matrix." },
  { cat: "Portfolio & SWOT", q: "Was kennzeichnet die vier Felder der BCG-Portfolio-Matrix (Question Marks, Stars, Cash Cows, Poor Dogs)?", a: "Question Marks: hohes Marktwachstum, geringer Marktanteil → Offensivstrategie (selektiv fördern). Stars: hohes Wachstum, hoher Marktanteil → Wachstumsstrategie (intensiv entwickeln). Cash Cows: geringes Wachstum, hoher Marktanteil → Abschöpfungsstrategie (im Markt halten). Poor Dogs: geringes Wachstum, geringer Marktanteil → Desinvestitionsstrategie (eliminieren)." },
  { cat: "Portfolio & SWOT", q: "Wofür steht SWOT, und was ist der Unterschied zwischen Unternehmens-Analyse und Umwelt-Analyse?", a: "SWOT = Strengths, Weaknesses, Opportunities, Threats. Unternehmens-Analyse (SW, 'Blick nach innen'): eigene Stärken/Schwächen im Vergleich zu Wettbewerbern (Polaritätsprofil). Umwelt-Analyse (OT, 'Blick nach außen'): Chancen/Risiken aus der sich verändernden Umwelt (Makro- und Mikroumwelt)." },
  { cat: "Portfolio & SWOT", q: "Was untersucht die PESTEL-Analyse (Makroumwelt)?", a: "Political (z.B. neue Regierung), economical (z.B. Konjunktur, Zinsen), social (z.B. Altersstruktur), technological (z.B. KI, 3D-Druck), ecological (z.B. Klimaziele) und legal (z.B. Produzentenhaftung, AGG) – Faktoren, die kaum vom Unternehmen beeinflussbar sind." },
  { cat: "Portfolio & SWOT", q: "Was sind SO-, ST-, WO- und WT-Strategien in der SWOT-Matrix?", a: "SO-Strategien: eigene Stärken nutzen, um Chancen zu ergreifen. ST-Strategien: eigene Stärken nutzen, um Gefahren abzuwehren. WO-Strategien: eigene Schwächen beseitigen, um Chancen zu nutzen. WT-Strategien: eigene Schwächen beseitigen, um Gefahren abzuwenden." },

  // Produktpolitik
  { cat: "Produktpolitik", q: "Welche vier Qualitätsarten eines Produkts gibt es?", a: "Gebrauchstechnische Qualität (Haltbarkeit, Funktionalität), ästhetische Qualität (Farbe, Form, Design), ökologische Qualität (Recycling) und sozio-kulturelle Qualität (Image, Prestige)." },
  { cat: "Produktpolitik", q: "Was ist der Unterschied zwischen Marktinnovation und Unternehmensinnovation, und was ist Produktdifferenzierung vs. Produktdiversifikation?", a: "Marktinnovation: ein Produkt, das es am Gesamtmarkt noch nicht gab. Unternehmensinnovation: ein für das Unternehmen neues Produkt, das am Markt aber schon existiert – als Produktdifferenzierung (neues Produkt in gleicher Produktgruppe) oder Produktdiversifikation (neue Produktgruppe)." },
  { cat: "Produktpolitik", q: "Was ist der Unterschied zwischen Produktvariation und Produkteliminierung?", a: "Produktvariation: Veränderung eines bestehenden Produkts (physisch-funktionell, ästhetisch, Image, Name oder Zusatzleistungen), z.B. VW Golf zusätzlich als Cabrio. Produkteliminierung: ein Produkt wird komplett aus dem Programm genommen, z.B. der Golf wird nicht mehr hergestellt." },
  { cat: "Produktpolitik", q: "Was ist der Unterschied zwischen Programmbreite und Programmtiefe (Sortimentstiefe)?", a: "Programmbreite: Anzahl der Produktgruppen (für jeweilige Zielgruppen), die nebeneinander bestehen (z.B. VW breit, Ferrari schmal). Sortimentstiefe: Anzahl der Modellvarianten innerhalb einer Produktgruppe. Erweiterung der Breite = Diversifikation, Erweiterung der Tiefe = Differenzierung." },
  { cat: "Produktpolitik", q: "Was ist der Unterschied zwischen horizontaler und vertikaler Programmerweiterung?", a: "Horizontal (gleiche Wirtschaftsstufe): medial (sachlich zusammenhängend, z.B. VW baut jetzt auch Motorräder) oder lateral (sachlich getrennt, z.B. VW verkauft jetzt Sportkleidung). Vertikal (andere Wirtschaftsstufe): Vorstufe (z.B. VW stellt eigene Reifen her) oder Nachstufe (z.B. VW bietet eigene Leasinggesellschaft)." },
  { cat: "Produktpolitik", q: "Was ist der Unterschied zwischen Kernsortiment und Randsortiment?", a: "Kernsortiment: Hauptbestandteil des Sortiments, wird vom Kunden erwartet und muss vollständig sein (kann auch Verlustprodukte enthalten). Randsortiment: ergänzt das Kernsortiment, wird nicht zwingend erwartet – Verlustprodukte hier können problemlos eliminiert werden." },
  { cat: "Produktpolitik", q: "Welche fünf Markenarten gibt es und was ist jeweils ein Beispiel?", a: "Produktmarke/Einzelmarke: jedes Produkt hat einen eigenen Namen (z.B. Persil). Familienmarke: eine Produktgruppe trägt einen gemeinsamen Namen (z.B. Nivea). Firmenmarke: alle Produkte tragen den Firmennamen (z.B. Nestle). Handelsmarke: der Händler bestimmt den Namen (z.B. Elite). Herstellermarke: der Hersteller bestimmt den Namen (z.B. Coca Cola)." },
